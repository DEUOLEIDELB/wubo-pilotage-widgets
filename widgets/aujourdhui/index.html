<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Pilotage">
<meta name="theme-color" content="#FAF5F2">
<link rel="apple-touch-icon" href="../../apple-touch-icon.png">
<link rel="shortcut icon" href="favicon.ico">
<link rel="icon" type="image/svg+xml" href="../../icon.svg">
<link rel="manifest" href="../../manifest.webmanifest">
<title>Aujourd'hui - Pilotage Wubo</title>
<link rel="stylesheet" href="../../lib/styles.css">
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script src="../../lib/dom.js"></script>
<script src="../../lib/grist-api.js"></script>
<script src="../../lib/modal-swipe.js"></script>
<script src="../../lib/wubo-ui.js"></script>
<style>
  #app {
    max-width: 480px;
    margin: 0 auto;
    padding: calc(env(safe-area-inset-top) + 76px) 14px calc(150px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .bloc {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .bloc.current { border: 1px solid var(--current); border-left-width: 4px; background: var(--current-soft); }
  .bloc.done { background: var(--done-bg); }
  .bloc.done ul { color: var(--text-faint); }
  .bloc.skip { background: var(--done-bg); }
  .bloc.skip ul { color: var(--text-faint); text-decoration: line-through; }

  .bloc-head { display: flex; justify-content: space-between; align-items: center; gap: 6px; }
  .bloc-tranche { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); }
  .bloc.current .bloc-tranche { color: var(--current); }
  .bloc-time { font-size: 11px; color: var(--text-faint); }

  .bloc ul { padding: 0; margin: 0; list-style: none; font-size: 13px; line-height: 1.35; }
  .bloc ul li { padding: 5px 6px; border-radius: 4px; display: flex; align-items: center; gap: 7px; cursor: pointer; }
  .bloc ul li:hover, .bloc ul li:active { background: rgba(0,0,0,0.04); }
  .bloc ul li .titre-tache { flex: 1; }
  .bloc ul li.done .titre-tache { text-decoration: line-through; color: var(--text-faint); }

  /* Chevron pour dérouler les sous-tâches */
  .bloc ul li .toggle-subs {
    background: transparent;
    border: none;
    padding: 2px 4px;
    font-size: 11px;
    color: var(--text-faint);
    cursor: pointer;
    line-height: 1;
    margin-left: auto;
    font-variant-numeric: tabular-nums;
  }
  .bloc ul li .toggle-subs:hover { color: var(--current); }

  .subtasks-inline {
    padding: 2px 0 4px 18px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    border-left: 2px solid var(--border);
    margin-left: 6px;
  }
  .subtask-inline {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 6px;
    font-size: 12px;
    color: var(--text);
    cursor: pointer;
    border-radius: 3px;
  }
  .subtask-inline:active { background: rgba(0,0,0,0.04); }
  .subtask-inline.done .subtask-titre { text-decoration: line-through; color: var(--text-faint); }
  .subtask-inline .subtask-titre { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .add-tache {
    margin-top: 4px;
    padding: 5px 8px;
    background: transparent;
    border: 1px dashed var(--border-strong);
    border-radius: 4px;
    color: var(--text-dim);
    font-size: 11px;
    cursor: pointer;
    text-align: center;
    width: 100%;
  }
  .add-tache:hover { border-color: var(--current); color: var(--current); }

  .bloc-note {
    font-size: 11px;
    color: var(--warning);
    padding-top: 6px;
    border-top: 1px dashed var(--border);
  }

  .bloc-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 2px; }
  .bloc-actions button { flex: 1; min-width: 88px; }

  .modal {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.4);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 100;
    overscroll-behavior: contain;
  }
  .modal.hidden { display: none; }
  .modal-content {
    background: var(--surface);
    width: 100%;
    max-width: 480px;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    padding: 16px;
    padding-bottom: calc(16px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 88vh;
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
  }
  .modal-head { display: flex; justify-content: space-between; align-items: center; }
  .modal-content textarea {
    min-height: 110px;
    max-height: 260px;
    font-size: 14px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .modal-content .meta-info { font-size: 11px; color: var(--text-dim); padding: 4px 0; }
  .modal-content .field { display: flex; flex-direction: column; gap: 4px; }
  .modal-content .field label { font-size: 10px; }

  #error { background: var(--danger); color: white; padding: 10px; border-radius: 6px; font-size: 12px; display: none; }
  #error button { margin-top: 6px; background: white; color: var(--danger); border: 1px solid white; }

  /* Undo toast flottant apres zap */
  .undo-toast {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    top: calc(12px + env(safe-area-inset-top));
    background: var(--accent);
    color: var(--text);
    border: 1px solid var(--accent-strong);
    border-radius: 8px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 2px 2px 0 var(--text);
    z-index: 200;
    font-size: 13px;
    font-weight: 500;
    max-width: 92vw;
    animation: toastIn 0.2s ease-out;
  }
  .undo-toast button {
    background: var(--text);
    color: var(--accent);
    border: none;
    border-radius: 4px;
    padding: 6px 12px;
    min-height: 32px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .undo-toast button:hover { opacity: 0.85; }
  @keyframes toastIn {
    from { opacity: 0; transform: translate(-50%, -8px); }
    to { opacity: 1; transform: translate(-50%, 0); }
  }

  /* Icône deadline externe à côté du titre de tâche */
  .ext-deadline-icon {
    flex-shrink: 0;
    font-size: 13px;
    color: var(--danger);
    margin-right: 2px;
  }

  /* Flash visuel après modification d'une tâche */
  @keyframes flashUpdate {
    0% { background: var(--current-soft); }
    100% { background: transparent; }
  }
  .just-updated { animation: flashUpdate 2s ease-out; }

  /* Panneau "À rattraper" : DA Wubo, sobre. Bordure jaune pour signaler l'attention
     sans alarme. Chaque bloc = ligne minimaliste avec actions inline. */
  .rattrapage {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent);
    border-radius: 6px;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .rattrapage-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
  }
  .rattrapage-head .titre {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
  }
  .rattrapage-head .hint {
    font-size: 11px;
    color: var(--text-dim);
  }
  .ratt-bulk {
    align-self: flex-start;
    font-size: 12px;
    padding: 6px 10px;
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--text);
    border-radius: 4px;
    cursor: pointer;
    font-weight: 600;
  }
  .ratt-bulk:active { background: var(--done-bg); }
  .ratt-bloc {
    background: var(--bg);
    border-radius: 4px;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .ratt-bloc-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 6px;
    font-size: 12px;
  }
  .ratt-bloc-head .when {
    font-weight: 700;
    color: var(--text);
  }
  .ratt-bloc-head .statut {
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-size: 10px;
    color: var(--text-dim);
    font-weight: 600;
  }
  .ratt-tasks {
    display: flex;
    flex-direction: column;
    gap: 3px;
    font-size: 13px;
  }
  .ratt-task {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text);
  }
  .ratt-missed-badge {
    font-size: 10px;
    font-weight: 700;
    color: var(--danger);
    background: transparent;
    border: 1px solid var(--danger);
    padding: 0 4px;
    border-radius: 2px;
    line-height: 1.4;
  }
  .ratt-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 2px;
  }
  .ratt-actions button {
    flex: 1;
    min-width: 80px;
    padding: 8px 8px;
    font-size: 13px;
  }
  .missed-indicator {
    display: inline-flex;
    align-items: center;
    font-size: 10px;
    font-weight: 700;
    color: var(--danger);
    margin-left: 4px;
    padding: 0 4px;
    background: transparent;
    border: 1px solid var(--danger);
    border-radius: 2px;
    line-height: 1.3;
  }
</style>
</head>
<body>

<main id="app">
  <header class="page-header">
    <div class="page-header-title">
      <h1 id="date">...</h1>
      <div class="sub" id="meta"></div>
    </div>
    <div id="profile-slot" class="profile-wrap"></div>
  </header>

  <div id="rattrapage"></div>
  <div id="drift"></div>
  <div id="error"></div>
  <div id="blocs"></div>
</main>

<nav class="bottom-nav">
  <div class="nav-tabs">
    <a href="../aujourdhui/" class="tab active">Jour</a>
    <a href="../semaine/" class="tab">Semaine</a>
    <a href="../dashboard/" class="tab">Objectifs</a>
    <a href="../deadlines/" class="tab">Échéances</a>
  </div>
  <div class="nav-actions">
    <button class="accent nav-dump" onclick="openDump()">+ Dump</button>
    <button class="ghost nav-refresh" onclick="refresh()" title="Rafraîchir">↻</button>
  </div>
</nav>

<div id="dump-modal" class="modal hidden" onclick="backdropClose(event, 'dump-modal')">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h3>Dump rapide</h3>
      <button class="ghost small" onclick="closeDump()">Annuler</button>
    </div>
    <select id="dump-contexte">
      <option value="Libre">Libre</option>
      <option value="Post-RDV">Post-RDV</option>
      <option value="Idee">Idée</option>
      <option value="Probleme">Problème</option>
      <option value="Decision">Décision</option>
    </select>
    <textarea id="dump-content" placeholder="Écris sans filtre. Claude rangera."></textarea>
    <div class="sticky-save">
      <button class="ghost small" onclick="closeDump()">Annuler</button>
      <button class="primary" onclick="submitDump()">Envoyer au dump</button>
    </div>
  </div>
</div>

<!-- Bloc edit modal : statut + note + tâches liées (même pattern que Semaine) -->
<div id="bloc-modal" class="modal hidden" onclick="backdropClose(event, 'bloc-modal')">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h3 id="bloc-modal-title">Bloc</h3>
      <button class="ghost small" onclick="closeBlocEdit()">Fermer</button>
    </div>
    <div id="bloc-modal-meta" style="font-size:12px;color:var(--text-dim)"></div>
    <div class="field">
      <label>Statut</label>
      <select id="bloc-statut">
        <option value="Planifie">Planifié</option>
        <option value="En cours">En cours</option>
        <option value="Fait">Fait</option>
        <option value="Zappe">Zappé</option>
      </select>
    </div>
    <div class="field">
      <label>Note de fin de bloc</label>
      <textarea id="bloc-note" placeholder="Ce que tu as fait, la raison du zap, etc." style="min-height:80px"></textarea>
    </div>
    <div class="sticky-save">
      <button class="ghost small" onclick="closeBlocEdit()">Annuler</button>
      <button class="primary" onclick="saveBlocEdit()">Enregistrer</button>
    </div>
  </div>
</div>

<div id="task-modal" class="modal hidden" onclick="backdropClose(event, 'task-modal')">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h3 id="task-modal-title">Modifier la tâche</h3>
      <button class="ghost small" onclick="closeTaskEdit()">Annuler</button>
    </div>
    <div class="meta-info" id="task-meta"></div>
    <div class="field"><label>Titre</label><input id="task-titre"></div>
    <div class="field">
      <label>Description / bullet points (fragmentation)</label>
      <textarea id="task-desc" placeholder="- sous-détail 1&#10;- sous-détail 2"></textarea>
    </div>
    <div class="field"><label>Livrable</label><input id="task-livrable"></div>
    <div class="field">
      <label>Projet (catégorie)</label>
      <select id="task-projet">
        <option value="">Aucun projet</option>
      </select>
    </div>
    <div class="field">
      <label>Statut</label>
      <select id="task-statut">
        <option value="Pas commence">Pas commencé</option>
        <option value="En cours">En cours</option>
        <option value="Fait">Fait</option>
        <option value="Bloque">Bloqué</option>
        <option value="Abandonne">Abandonné</option>
      </select>
    </div>
    <div class="field" style="display:grid; grid-template-columns: 1fr 1fr; gap: 6px;">
      <div><label>Estim. heures</label><input id="task-heures" type="number" step="0.5" min="0"></div>
      <div><label>Échéance</label><input id="task-date" type="date"></div>
    </div>
    <div class="field">
      <label style="display:flex;gap:6px;align-items:center;font-size:12px;cursor:pointer">
        <input type="checkbox" id="task-ext-deadline" style="width:auto">
        <span>Vraie deadline externe (AAP, event, atelier école)</span>
      </label>
    </div>
    <div class="field"><label>Qui travaille dessus ?</label><div id="task-collabs" class="collab-chips"></div></div>
    <div id="task-reporter" class="field" style="display:none">
      <label>Reporter</label>
      <div style="display:flex;gap:4px;flex-wrap:wrap">
        <button type="button" class="ghost small" onclick="reportTaskDays(1)">+1 jour</button>
        <button type="button" class="ghost small" onclick="reportTaskDays(3)">+3 jours</button>
        <button type="button" class="ghost small" onclick="reportTaskDays(7)">+1 semaine</button>
      </div>
      <div id="push-count-info" style="font-size:10px;color:var(--warning);margin-top:3px"></div>
    </div>
    <div id="subtasks-section" style="display:none">
      <label>Sous-tâches</label>
      <div id="subtasks-list" class="task-list-mini"></div>
      <button type="button" class="ghost small" onclick="onAddSubtaskClick()" style="margin-top:4px">+ Sous-tâche</button>
    </div>
    <div class="sticky-save">
      <button class="ghost small" onclick="closeTaskEdit()">Annuler</button>
      <button id="task-delete-btn" class="danger small" onclick="deleteCurrentTask()" style="display:none">Supprimer</button>
      <button id="task-archive-btn" class="ghost small" onclick="archiveCurrentTask()" style="display:none">Archiver</button>
      <button class="primary" onclick="saveTaskEdit()">Enregistrer</button>
    </div>
  </div>
</div>

<style>
  .task-list-mini { display:flex; flex-direction:column; gap:3px; margin-top:4px; }
  .task-list-mini .subtask { padding: 5px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 12px; display:flex; align-items:center; gap:6px; }
  .task-list-mini .subtask .status-pill { flex-shrink: 0; }
</style>

<script>
const { $el, $clear } = Dom;
const TRANCHES = ['Matin', 'Aprem', 'Soir'];
const TRANCHE_TIMES = { Matin: '8-12h', Aprem: '13-17h', Soir: '18-22h' };
let currentTaskEditId = null;
let currentTaskNewBlocId = null;
let currentTaskOriginalDate = null;
let currentPushCount = 0;
let tachesById = {};
// Sous-tâches à créer en même temps que la tâche parent (mode création)
let pendingSubtasks = [];
// ID de la tâche flashée brièvement après édition (pour l'animation .just-updated)
let justUpdatedTaskId = null;
// Liste courante des collaborateurs sur la tâche en cours d'édition (format Grist ['L', ...])
let currentTaskCollabs = ['L'];
// Tâches dont les sous-tâches sont dépliées en ligne (persist session)
const expandedTaskIds = (() => {
  try {
    const raw = sessionStorage.getItem('wubo_jour_expanded');
    return new Set(raw ? JSON.parse(raw) : []);
  } catch (_) { return new Set(); }
})();
function persistExpanded() {
  try { sessionStorage.setItem('wubo_jour_expanded', JSON.stringify(Array.from(expandedTaskIds))); } catch (_) {}
}
function toggleSubsInline(taskId) {
  if (expandedTaskIds.has(taskId)) expandedTaskIds.delete(taskId);
  else expandedTaskIds.add(taskId);
  persistExpanded();
  render();
}
// Toggle rapide Fait / Pas commencé d'une sous-tâche (click inline ou dans la modal)
async function toggleSubtaskDone(sub) {
  const next = (sub.statut === 'Fait') ? 'Pas commence' : 'Fait';
  const fields = { statut: next };
  if (next === 'Fait') fields.date_fait = WuboGrist.nowUnix();
  try {
    await WuboGrist.updateRecord('Taches', sub.id, fields);
    justUpdatedTaskId = sub.id;
    WuboGrist.toast(next === 'Fait' ? 'Sous-tâche faite' : 'Sous-tâche ré-ouverte', 'success', 1400);
    await render();
    // Si la modal tâche parent est ouverte, on redessine la liste pour refléter
    if (currentTaskEditId && currentTaskEditId === sub.parent_tache) {
      fillTaskEditForm(currentTaskEditId);
    }
  } catch (e) {
    WuboGrist.toast('Erreur : ' + e.message, 'error');
  }
}
// Delete définitif d'une sous-tâche (croix dans la modal)
async function deleteSubtaskHard(sub) {
  const ok = await WuboUI.confirm({
    title: 'Supprimer la sous-tâche ?',
    message: `"${sub.titre || '(sans titre)'}"`,
    yesLabel: 'Supprimer',
    danger: true
  });
  if (!ok) return;
  try {
    // Retire du bloc si présente
    const blocs = await WuboGrist.fetchRows('Blocs_temps');
    for (const b of blocs) {
      const ids = WuboGrist.refListIds(b.taches_liees);
      if (ids.includes(sub.id)) {
        const next = ids.filter(x => x !== sub.id);
        try { await WuboGrist.updateRecord('Blocs_temps', b.id, { taches_liees: ['L', ...next] }); } catch (_) {}
      }
    }
    await WuboGrist.deleteRecord('Taches', sub.id);
    WuboGrist.toast('Sous-tâche supprimée', 'info');
    await render();
    if (currentTaskEditId && currentTaskEditId === sub.parent_tache) {
      fillTaskEditForm(currentTaskEditId);
    }
  } catch (e) {
    WuboGrist.toast('Erreur : ' + e.message, 'error');
  }
}

function statutClass(s) {
  if (!s) return 'todo';
  const k = s.toLowerCase();
  if (k.includes('fait')) return 'done';
  if (k.includes('en cours')) return 'wip';
  if (k.includes('bloque')) return 'blocked';
  if (k.includes('abandon')) return 'abandoned';
  return 'todo';
}

function unixToInputDate(ts) {
  if (!ts) return '';
  const d = new Date(ts * 1000);
  return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
}
function inputDateToUnix(s) {
  if (!s) return null;
  const [y, m, d] = s.split('-').map(Number);
  return Math.floor(Date.UTC(y, m-1, d) / 1000);
}

function currentTranche() {
  const h = new Date().getHours();
  if (h >= 8 && h < 13) return 'Matin';
  if (h >= 13 && h < 18) return 'Aprem';
  if (h >= 18 && h < 22) return 'Soir';
  return null;
}

function weekNumber(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

function showError(msg) {
  const e = document.getElementById('error');
  $clear(e);
  e.appendChild($el('div', {}, msg));
  if (!WuboGrist.inGristIframe()) {
    e.appendChild($el('button', { class: 'small', onclick: () => { WuboGrist.resetApiKey(); location.reload(); } }, 'Changer de cle API'));
  }
  e.style.display = 'block';
}
function clearError() {
  const e = document.getElementById('error');
  e.textContent = '';
  e.style.display = 'none';
}

function renderBloc(tranche, bloc) {
  const cur = currentTranche();
  const statut = bloc ? bloc.statut : null;
  const isCurrent = bloc && (statut === 'En cours' || (cur === tranche && statut === 'Planifie'));
  const classNames = ['bloc'];
  if (isCurrent) classNames.push('current');
  else if (statut === 'Fait') classNames.push('done');
  else if (statut === 'Zappe') classNames.push('skip');

  const tagClass = statut === 'Fait' ? 'done' : statut === 'Zappe' ? 'skip' : isCurrent ? 'current' : '';
  const tagLabel = statut === 'Fait' ? 'Fait' : statut === 'Zappe' ? 'Zappé' : isCurrent ? 'En cours' : 'Planifié';

  const head = $el('div', {
    class: 'bloc-head',
    style: bloc ? 'cursor:pointer' : '',
    onclick: bloc ? (e) => {
      // Ne pas ouvrir la modal si on clique sur le tag ou un bouton d'action
      if (e.target.closest('.tag') || e.target.closest('button')) return;
      openBlocEdit(bloc.id);
    } : null
  },
    $el('div', {},
      $el('span', { class: 'bloc-tranche' }, tranche),
      $el('span', { class: 'bloc-time' }, ' · ' + TRANCHE_TIMES[tranche])
    ),
    $el('span', { class: 'tag ' + tagClass }, tagLabel)
  );

  const el = $el('div', { class: classNames.join(' '), 'data-tranche': tranche }, head);
  if (bloc) el.setAttribute('data-bloc-id', String(bloc.id));
  if (!bloc) {
    // Bloc vide : CTA pour planifier immédiatement cette tranche aujourd'hui
    el.appendChild($el('button', {
      class: 'add-tache',
      style: 'margin-top:4px',
      onclick: () => createBlocToday(tranche)
    }, '+ Planifier ' + tranche));
    return el;
  }

  const tIds = WuboGrist.refListIds(bloc.taches_liees);
  const ul = $el('ul', {});
  tIds.forEach(tid => {
    const t = tachesById[tid];
    if (!t) return;
    const subs = Object.values(tachesById).filter(x => x.parent_tache === tid && x.statut !== 'Archive');
    const liClassList = ['tache-row'];
    if (justUpdatedTaskId === tid) liClassList.push('just-updated');
    if (t.statut === 'Fait') liClassList.push('done');
    const li = $el('li', {
      class: liClassList.join(' '),
      onclick: (e) => {
        // Ne pas ouvrir la modal si on a cliqué sur le chevron
        if (e.target.closest('.toggle-subs')) return;
        openTaskEdit(tid);
      }
    },
      $el('span', { class: 'status-pill ' + statutClass(t.statut) })
    );
    if (t.est_deadline_externe) {
      li.appendChild($el('span', { class: 'ext-deadline-icon', title: 'Deadline externe dure' }, '⏰'));
    }
    li.appendChild($el('span', { class: 'titre-tache' }, t.titre));
    if (t.times_missed && t.times_missed > 0) {
      li.appendChild($el('span', {
        class: 'missed-indicator',
        title: `Cette tâche a été ratée ${t.times_missed} fois (bloc passé non-fait)`
      }, `× ${t.times_missed}`));
    }
    // Chevron pour dérouler les sous-tâches
    if (subs.length > 0) {
      const isOpen = expandedTaskIds.has(tid);
      const chevronLabel = isOpen ? `▾ ${subs.length}` : `▸ ${subs.length}`;
      li.appendChild($el('button', {
        class: 'toggle-subs',
        onclick: (e) => {
          e.stopPropagation();
          toggleSubsInline(tid);
        }
      }, chevronLabel));
    }
    ul.appendChild(li);
    // Liste inline des sous-tâches si ouvert
    if (subs.length > 0 && expandedTaskIds.has(tid)) {
      const subsContainer = $el('div', { class: 'subtasks-inline' });
      subs.forEach(s => {
        const row = $el('div', {
          class: 'subtask-inline' + (s.statut === 'Fait' ? ' done' : ''),
          onclick: async (e) => {
            e.stopPropagation();
            await toggleSubtaskDone(s);
          }
        },
          $el('span', { class: 'status-pill ' + statutClass(s.statut) }),
          $el('span', { class: 'subtask-titre', title: s.titre }, s.titre || '(sans titre)')
        );
        subsContainer.appendChild(row);
      });
      ul.appendChild(subsContainer);
    }
  });
  el.appendChild(ul);
  el.appendChild($el('button', { class: 'add-tache', onclick: () => openTaskNew(bloc.id) }, '+ Ajouter une tâche'));

  if (bloc.note_fin_bloc) el.appendChild($el('div', { class: 'bloc-note' }, bloc.note_fin_bloc));

  if (isCurrent) {
    const actions = $el('div', { class: 'bloc-actions' });
    if (statut === 'Planifie') {
      actions.appendChild($el('button', { class: 'primary small', onclick: () => blocAction(bloc.id, 'En cours') }, '▶ Démarrer'));
    }
    actions.appendChild($el('button', { class: 'success small', onclick: () => blocAction(bloc.id, 'Fait') }, '✓ Terminer'));
    actions.appendChild($el('button', { class: 'ghost small', onclick: () => blocAction(bloc.id, 'Zappe') }, 'Zapper'));
    el.appendChild(actions);
  }

  return el;
}

async function render() {
  clearError();
  const now = new Date();
  document.getElementById('date').textContent =
    now.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });

  let blocs = [];
  let allBlocsFetched = [];
  tachesById = {};
  let fetchOk = true;
  try {
    const [bRaw, tRaw] = await Promise.all([
      WuboGrist.fetchRows('Blocs_temps'),
      WuboGrist.fetchRows('Taches')
    ]);
    // Filtre multi-user : en mode 'mine', on garde proprietaire === user ou Shared
    const b = WuboGrist.filterByOwner(bRaw);
    const t = WuboGrist.filterByOwner(tRaw);
    allBlocsFetched = b;
    const today = WuboGrist.todayISO();
    blocs = b.filter(x => WuboGrist.gristDateToISO(x.date) === today);
    blocsByIdCache = {};
    b.forEach(x => { blocsByIdCache[x.id] = x; });
    t.forEach(x => { tachesById[x.id] = x; });
  } catch (e) {
    showError(e.message);
    fetchOk = false;
  }

  const fait = blocs.filter(b => b.statut === 'Fait').length;
  const total = blocs.length;
  document.getElementById('meta').textContent = fetchOk
    ? `Sprint S${weekNumber(now)} · ${fait}/${total} blocs faits`
    : `Sprint S${weekNumber(now)} · hors ligne`;

  if (!fetchOk) return;

  // Panneau rattrapage : blocs passés sans "Fait"
  renderRattrapage(allBlocsFetched);

  const driftNode = document.getElementById('drift');
  $clear(driftNode);
  const cur = currentTranche();
  if (cur) {
    const bloc = blocs.find(b => b.tranche === cur);
    if (bloc && bloc.statut === 'Planifie') {
      const alert = $el('div', { class: 'drift-alert' }, `${cur} actif mais toujours "Planifié". `);
      alert.appendChild($el('button', { class: 'small', onclick: () => blocAction(bloc.id, 'En cours') }, 'Démarrer'));
      driftNode.appendChild(alert);
    }
  }

  const container = document.getElementById('blocs');
  $clear(container);
  TRANCHES.forEach(tranche => container.appendChild(renderBloc(tranche, blocs.find(b => b.tranche === tranche))));

  // Nettoie le flag après que l'animation ait été appliquée (elle dure 2s)
  if (justUpdatedTaskId !== null) {
    const id = justUpdatedTaskId;
    setTimeout(() => { if (justUpdatedTaskId === id) justUpdatedTaskId = null; }, 2100);
  }

  scrollToCurrentTranche();
}

// Scroll la tranche courante au centre du viewport apres le render.
// Seulement si ce n'est pas la premiere tranche (Matin) : pas utile de scroller quand tout est deja visible en haut.
let _didInitialScroll = false;
function scrollToCurrentTranche() {
  const cur = currentTranche();
  if (!cur) return;
  if (cur === 'Matin') return;
  // On ne scroll qu'une seule fois par session (au premier render).
  if (_didInitialScroll) return;
  _didInitialScroll = true;
  requestAnimationFrame(() => {
    const el = document.querySelector(`.bloc.current[data-tranche="${cur}"]`);
    if (el && typeof el.scrollIntoView === 'function') {
      try { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
      catch (_) { el.scrollIntoView(); }
    }
  });
}

// ============ Rattrapage : blocs passés non-faits ============
// Un bloc avec date < today ET statut != Fait/Zappe/Archive = signal d'alerte.
// "Je n'ai pas avancé comme prévu, il faut comprendre et replanifier."
const MONTHS_FR = ['janv.', 'févr.', 'mars', 'avr.', 'mai', 'juin', 'juil.', 'août', 'sept.', 'oct.', 'nov.', 'déc.'];
const DAY_NAMES_FR = ['dim', 'lun', 'mar', 'mer', 'jeu', 'ven', 'sam'];

function fmtPastDate(dateUnix) {
  const d = new Date(dateUnix * 1000);
  const todayMs = new Date();
  todayMs.setHours(0,0,0,0);
  const diffDays = Math.round((todayMs.getTime() - d.getTime()) / 86400000);
  if (diffDays === 1) return 'Hier';
  if (diffDays === 2) return 'Avant-hier';
  if (diffDays <= 6) return `Il y a ${diffDays}j`;
  return `${DAY_NAMES_FR[d.getUTCDay()]} ${d.getUTCDate()} ${MONTHS_FR[d.getUTCMonth()]}`;
}

let missedBlocsCache = [];
function renderRattrapage(allBlocs) {
  const node = document.getElementById('rattrapage');
  $clear(node);
  const todayISO = WuboGrist.todayISO();
  const missed = allBlocs.filter(b => {
    const iso = WuboGrist.gristDateToISO(b.date);
    if (!iso || iso >= todayISO) return false;
    const s = (b.statut || '').toLowerCase();
    if (s.includes('fait')) return false;
    if (s.includes('zapp')) return false;
    if (s.includes('archive')) return false;
    return true;
  }).sort((a, b) => (a.date || 0) - (b.date || 0));

  missedBlocsCache = missed;
  if (missed.length === 0) return;

  const toShow = missed.slice(0, 5);
  const block = $el('div', { class: 'rattrapage' });
  block.appendChild($el('div', { class: 'rattrapage-head' },
    $el('span', { class: 'titre' }, `À rattraper · ${missed.length}`),
    missed.length > 1
      ? $el('button', { class: 'ratt-bulk', onclick: () => bulkRattrapage() }, 'Tout traiter')
      : $el('span', { class: 'hint' }, 'bloc sans statut Fait')
  ));

  toShow.forEach(bloc => block.appendChild(renderRattBloc(bloc)));

  if (missed.length > toShow.length) {
    block.appendChild($el('div', {
      style: { fontSize: '11px', color: 'var(--text-dim)', textAlign: 'center' }
    }, `+ ${missed.length - toShow.length} autre${missed.length - toShow.length > 1 ? 's' : ''}`));
  }

  node.appendChild(block);
}

// Choix groupé pour tous les blocs à rattraper d'un coup
async function bulkRattrapage() {
  if (missedBlocsCache.length === 0) return;
  const action = await WuboUI.choice({
    title: `Appliquer à tous (${missedBlocsCache.length})`,
    message: 'Action groupée sur les blocs à rattraper',
    options: [
      { id: 'fait', label: 'Tout marquer Fait', sub: 'Rétroactif, sans raison' },
      { id: 'pas-fait', label: 'Tout marquer Pas fait', sub: 'Une raison commune sera demandée' },
      { id: 'replan', label: 'Tout replanifier à demain', sub: 'Mêmes tranches, demain' }
    ]
  });
  if (!action) return;
  try {
    if (action === 'fait') {
      for (const b of missedBlocsCache) {
        await WuboGrist.updateRecord('Blocs_temps', b.id, { statut: 'Fait' });
      }
      WuboGrist.toast(`${missedBlocsCache.length} bloc(s) marqué(s) Fait`, 'success');
    } else if (action === 'pas-fait') {
      const raison = await WuboUI.prompt({
        title: 'Raison commune',
        placeholder: 'Pourquoi tu n\'as pas fait ?',
        multiline: true
      });
      if (raison === null) return;
      for (const b of missedBlocsCache) {
        const fields = { statut: 'Zappe' };
        if (raison.trim()) fields.note_fin_bloc = raison.trim();
        await WuboGrist.updateRecord('Blocs_temps', b.id, fields);
        const tIds = WuboGrist.refListIds(b.taches_liees);
        for (const tid of tIds) {
          const t = tachesById[tid];
          if (!t || t.statut === 'Fait' || t.statut === 'Archive') continue;
          try {
            await WuboGrist.updateRecord('Taches', tid, {
              times_missed: (t.times_missed || 0) + 1,
              push_count: (t.push_count || 0) + 1
            });
          } catch (_) {}
        }
      }
      WuboGrist.toast(`${missedBlocsCache.length} bloc(s) zappé(s)`, 'warn');
    } else if (action === 'replan') {
      const allBlocs = await WuboGrist.fetchRows('Blocs_temps', { force: true });
      const tomorrowISO = (() => { const d = new Date(); d.setDate(d.getDate() + 1); return WuboGrist.dateToISO(d); })();
      for (const b of missedBlocsCache) {
        let target = allBlocs.find(x => WuboGrist.gristDateToISO(x.date) === tomorrowISO && x.tranche === b.tranche);
        if (!target) {
          const [y, m, d] = tomorrowISO.split('-').map(Number);
          const ts = Math.floor(Date.UTC(y, m-1, d) / 1000);
          const { id } = await WuboGrist.addRecord('Blocs_temps', {
            date: ts, tranche: b.tranche, statut: 'Planifie', proprietaire: (WuboGrist.getUser() || 'Taki')
          });
          target = { id, taches_liees: null };
          allBlocs.push({ id, date: ts, tranche: b.tranche, statut: 'Planifie', taches_liees: null });
        }
        const tIds = WuboGrist.refListIds(b.taches_liees);
        const movable = tIds.filter(id => {
          const t = tachesById[id];
          return t && t.statut !== 'Fait' && t.statut !== 'Archive';
        });
        if (movable.length > 0) {
          const existing = WuboGrist.refListIds(target.taches_liees);
          const merged = Array.from(new Set([...existing, ...movable]));
          await WuboGrist.updateRecord('Blocs_temps', target.id, { taches_liees: ['L', ...merged] });
          target.taches_liees = ['L', ...merged];
          for (const id of movable) {
            const t = tachesById[id];
            if (!t) continue;
            try {
              await WuboGrist.updateRecord('Taches', id, {
                push_count: (t.push_count || 0) + 1,
                times_missed: (t.times_missed || 0) + 1
              });
            } catch (_) {}
          }
        }
        const remaining = tIds.filter(id => !movable.includes(id));
        await WuboGrist.updateRecord('Blocs_temps', b.id, {
          statut: 'Zappe',
          note_fin_bloc: `Replanifié ${tomorrowISO}`,
          taches_liees: ['L', ...remaining]
        });
      }
      WuboGrist.toast(`${missedBlocsCache.length} bloc(s) replanifié(s) à demain`, 'success');
    }
    await render();
  } catch (e) {
    WuboGrist.toast('Erreur : ' + e.message, 'error');
  }
}

function renderRattBloc(bloc) {
  const wrap = $el('div', { class: 'ratt-bloc' });
  wrap.appendChild($el('div', { class: 'ratt-bloc-head' },
    $el('span', { class: 'when' }, `${fmtPastDate(bloc.date)} · ${bloc.tranche}`),
    $el('span', { class: 'statut' }, bloc.statut || '-')
  ));

  const tIds = WuboGrist.refListIds(bloc.taches_liees);
  if (tIds.length > 0) {
    const tasksNode = $el('div', { class: 'ratt-tasks' });
    tIds.forEach(tid => {
      const t = tachesById[tid];
      if (!t) return;
      const row = $el('div', { class: 'ratt-task' });
      row.appendChild($el('span', { class: 'status-pill ' + statutClass(t.statut) }));
      row.appendChild($el('span', { style: { flex: '1', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } }, t.titre || '(sans titre)'));
      if (t.times_missed && t.times_missed > 0) {
        row.appendChild($el('span', { class: 'ratt-missed-badge', title: 'Ratée ' + t.times_missed + ' fois' }, `× ${t.times_missed}`));
      }
      tasksNode.appendChild(row);
    });
    wrap.appendChild(tasksNode);
  } else {
    wrap.appendChild($el('div', { style: { fontSize: '11px', color: 'var(--text-faint)', fontStyle: 'italic' } }, 'Aucune tâche liée'));
  }

  const actions = $el('div', { class: 'ratt-actions' });
  actions.appendChild($el('button', {
    class: 'success small',
    onclick: () => rattrapageFait(bloc)
  }, '✓ J\'ai fait'));
  actions.appendChild($el('button', {
    class: 'ghost small',
    onclick: () => rattrapageZappe(bloc)
  }, 'Pas fait'));
  actions.appendChild($el('button', {
    class: 'primary small',
    onclick: () => rattrapageReplan(bloc)
  }, 'Replanifier'));
  wrap.appendChild(actions);
  return wrap;
}

async function rattrapageFait(bloc) {
  try {
    await WuboGrist.updateRecord('Blocs_temps', bloc.id, { statut: 'Fait' });
    const tIds = WuboGrist.refListIds(bloc.taches_liees);
    const active = tIds.map(id => tachesById[id]).filter(t => t && t.statut !== 'Fait' && t.statut !== 'Archive');
    if (active.length > 0) {
      const ok = await WuboUI.confirm({
        title: 'Marquer les tâches Fait ?',
        message: `${active.length} tâche(s) dans ce bloc.`,
        yesLabel: 'Oui',
        noLabel: 'Non'
      });
      if (ok) {
        for (const t of active) {
          try { await WuboGrist.updateRecord('Taches', t.id, { statut: 'Fait', date_fait: WuboGrist.nowUnix() }); } catch (_) {}
        }
      }
    }
    WuboGrist.toast('Bloc marqué Fait', 'success');
    await render();
  } catch (e) {
    WuboGrist.toast('Erreur : ' + e.message, 'error');
  }
}

async function rattrapageZappe(bloc) {
  const raison = await WuboUI.prompt({
    title: 'Pourquoi ?',
    placeholder: 'Raison courte',
    defaultValue: bloc.note_fin_bloc || '',
    multiline: true
  });
  if (raison === null) return;
  try {
    const fields = { statut: 'Zappe' };
    if (raison.trim()) fields.note_fin_bloc = raison.trim();
    await WuboGrist.updateRecord('Blocs_temps', bloc.id, fields);
    const tIds = WuboGrist.refListIds(bloc.taches_liees);
    let counted = 0;
    for (const tid of tIds) {
      const t = tachesById[tid];
      if (!t) continue;
      if (t.statut === 'Fait' || t.statut === 'Archive') continue;
      try {
        await WuboGrist.updateRecord('Taches', tid, {
          times_missed: (t.times_missed || 0) + 1,
          push_count: (t.push_count || 0) + 1
        });
        counted++;
      } catch (_) {}
    }
    WuboGrist.toast(`Bloc zappé, ${counted} tâche(s) marquée(s)`, 'warn');
    await render();
  } catch (e) {
    WuboGrist.toast('Erreur : ' + e.message, 'error');
  }
}

async function rattrapageReplan(bloc) {
  const todayStr = WuboGrist.todayISO();
  const tomorrow = (() => { const d = new Date(); d.setDate(d.getDate() + 1); return WuboGrist.dateToISO(d); })();
  const dayIn3 = (() => { const d = new Date(); d.setDate(d.getDate() + 3); return WuboGrist.dateToISO(d); })();
  const weekIn = (() => { const d = new Date(); d.setDate(d.getDate() + 7); return WuboGrist.dateToISO(d); })();

  const when = await WuboUI.choice({
    title: 'Replanifier quand ?',
    options: [
      { id: todayStr, label: "Aujourd'hui", sub: todayStr },
      { id: tomorrow, label: 'Demain', sub: tomorrow },
      { id: dayIn3, label: 'Dans 3 jours', sub: dayIn3 },
      { id: weekIn, label: 'Dans 1 semaine', sub: weekIn },
      { id: 'custom', label: 'Autre date…' }
    ]
  });
  if (!when) return;

  let targetISO = when;
  if (when === 'custom') {
    targetISO = await WuboUI.prompt({
      title: 'Date',
      placeholder: 'YYYY-MM-DD',
      defaultValue: tomorrow,
      validate: v => /^\d{4}-\d{2}-\d{2}$/.test(v.trim()) ? null : 'Format YYYY-MM-DD'
    });
    if (!targetISO) return;
    targetISO = targetISO.trim();
  }

  const tranche = await WuboUI.choice({
    title: 'Quelle tranche ?',
    options: [
      { id: 'Matin', label: 'Matin', sub: '8-12h' },
      { id: 'Aprem', label: 'Aprem', sub: '13-17h' },
      { id: 'Soir', label: 'Soir', sub: '18-22h' }
    ]
  });
  if (!tranche) return;

  try {
    const allBlocs = await WuboGrist.fetchRows('Blocs_temps', { force: true });
    let targetBloc = allBlocs.find(b => WuboGrist.gristDateToISO(b.date) === targetISO && b.tranche === tranche);
    const [y, m, d] = targetISO.split('-').map(Number);
    const targetDateUnix = Math.floor(Date.UTC(y, m-1, d) / 1000);
    if (!targetBloc) {
      const { id } = await WuboGrist.addRecord('Blocs_temps', {
        date: targetDateUnix, tranche, statut: 'Planifie', proprietaire: (WuboGrist.getUser() || 'Taki')
      });
      targetBloc = { id, taches_liees: null };
    }
    const tIds = WuboGrist.refListIds(bloc.taches_liees);
    const movable = tIds.filter(id => {
      const t = tachesById[id];
      return t && t.statut !== 'Fait' && t.statut !== 'Archive';
    });
    if (movable.length > 0) {
      const existingIds = WuboGrist.refListIds(targetBloc.taches_liees);
      const merged = Array.from(new Set([...existingIds, ...movable]));
      await WuboGrist.updateRecord('Blocs_temps', targetBloc.id, { taches_liees: ['L', ...merged] });
      for (const id of movable) {
        const t = tachesById[id];
        if (!t) continue;
        try {
          await WuboGrist.updateRecord('Taches', id, {
            push_count: (t.push_count || 0) + 1,
            times_missed: (t.times_missed || 0) + 1,
            date_cible: targetDateUnix
          });
        } catch (_) {}
      }
    }
    const remainingTaskIds = tIds.filter(id => !movable.includes(id));
    await WuboGrist.updateRecord('Blocs_temps', bloc.id, {
      statut: 'Zappe',
      note_fin_bloc: `Replanifié ${targetISO} ${tranche}`,
      taches_liees: ['L', ...remainingTaskIds]
    });
    WuboGrist.toast(`${movable.length} tâche(s) → ${targetISO} ${tranche}`, 'success');
    await render();
  } catch (e) {
    WuboGrist.toast('Erreur : ' + e.message, 'error');
  }
}

// Timers actifs d'undo (par bloc) + statut precedent memorise
const undoTimers = new Map();
// Cache des blocs pour acceder au statut precedent avant update
let blocsByIdCache = {};

// ============ Bloc edit (note + statut) ============
let currentBlocEditId = null;
function openBlocEdit(blocId) {
  const bloc = blocsByIdCache[blocId];
  if (!bloc) return;
  currentBlocEditId = blocId;
  const d = new Date(bloc.date * 1000);
  const dayName = d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'short' });
  document.getElementById('bloc-modal-title').textContent = `${dayName.charAt(0).toUpperCase() + dayName.slice(1)} · ${bloc.tranche}`;
  const metaBits = [];
  if (bloc.proprietaire) metaBits.push(bloc.proprietaire);
  const tIds = WuboGrist.refListIds(bloc.taches_liees);
  if (tIds.length) metaBits.push(`${tIds.length} tâche${tIds.length > 1 ? 's' : ''}`);
  document.getElementById('bloc-modal-meta').textContent = metaBits.join(' · ');
  document.getElementById('bloc-statut').value = bloc.statut || 'Planifie';

// Crée un bloc Planifie aujourd'hui pour la tranche donnée, puis ouvre la création de tâche sur ce bloc.
async function createBlocToday(tranche) {
  const todayISO = WuboGrist.todayISO();
  const [y, m, d] = todayISO.split('-').map(Number);
  const dateUnix = Math.floor(Date.UTC(y, m-1, d) / 1000);
  try {
    const { id } = await WuboGrist.addRecord('Blocs_temps', {
      date: dateUnix,
      tranche,
      statut: 'Planifie',
      proprietaire: WuboGrist.getUser() || 'Taki'
    });
    WuboGrist.toast(`Bloc ${tranche} créé`, 'success');
    await render();
    if (id) openTaskNew(id);
  } catch (e) {
    WuboGrist.toast('Erreur : ' + e.message, 'error');
  }
}

async function blocAction(blocId, statut) {
  const fields = { statut };
  if (statut === 'Fait') {
    const note = await WuboUI.prompt({
      title: 'Note de fin de bloc',
      placeholder: 'Ce que tu as fait (optionnel)'
    });
    if (note === null) return;
    if (note) fields.note_fin_bloc = note;
  }
  // Recuperer le statut precedent pour permettre l'undo
  const prevBloc = blocsByIdCache[blocId];
  const prevStatut = prevBloc ? prevBloc.statut : 'Planifie';
  // Si un timer existait deja pour ce bloc, on l'annule (pas de double-undo)
  if (undoTimers.has(blocId)) {
    clearTimeout(undoTimers.get(blocId).timerId);
    hideUndoToast();
    undoTimers.delete(blocId);
  }
  try {
    await WuboGrist.updateRecord('Blocs_temps', blocId, fields);
    if (statut === 'Zappe') {
      // Redistribue les taches liees vers demain meme tranche (FIFO simple)
      await redistributeZappedTasks(blocId, prevBloc).catch(err => {
        console.warn('Redistribution partielle ou echouee :', err);
      });
      showUndoToast(blocId, prevStatut);
      WuboGrist.toast('Bloc zappé. Tâches reportées à demain.', 'warn');
    } else if (statut === 'En cours') {
      WuboGrist.toast('Bloc démarré', 'success');
    } else if (statut === 'Fait') {
      WuboGrist.toast('Bloc terminé', 'success');
    } else {
      WuboGrist.toast('Bloc mis à jour', 'info');
    }
    await render();
  } catch (e) {
    WuboGrist.toast('Erreur : ' + e.message, 'error');
  }
}

// Redistribue les taches du bloc zappe vers le meme creneau demain.
// Regle simple : FIFO sur les taches non-Fait, toutes mises dans le bloc demain meme tranche.
// Si pas de bloc demain a la bonne tranche, alert fallback.
async function redistributeZappedTasks(blocId, prevBloc) {
  if (!prevBloc) return;
  const taskIds = WuboGrist.refListIds(prevBloc.taches_liees);
  if (taskIds.length === 0) return;
  const movable = taskIds
    .map(id => tachesById[id])
    .filter(t => t && t.statut !== 'Fait' && t.statut !== 'Archive');
  if (movable.length === 0) return;

  // Cherche le bloc demain meme tranche
  const allBlocs = await WuboGrist.fetchRows('Blocs_temps');
  const tomorrowISO = (() => {
    const d = new Date();
    d.setDate(d.getDate() + 1);
    return WuboGrist.dateToISO(d);
  })();
  const target = allBlocs.find(b =>
    WuboGrist.gristDateToISO(b.date) === tomorrowISO && b.tranche === prevBloc.tranche
  );

  if (!target) {
    WuboGrist.toast(`${movable.length} tâche(s) non replacées : pas de bloc ${prevBloc.tranche} demain`, 'warn', 4500);
    return;
  }

  // Ajoute les taches au bloc cible (en concatenant a l'existant), incremente push_count
  const existingIds = WuboGrist.refListIds(target.taches_liees);
  const toAdd = movable.map(t => t.id).filter(id => !existingIds.includes(id));
  if (toAdd.length > 0) {
    const newList = ['L', ...existingIds, ...toAdd];
    await WuboGrist.updateRecord('Blocs_temps', target.id, { taches_liees: newList });
  }
  // Retire les taches du bloc zappe (pour ne pas les laisser flotter sur le bloc zappe)
  const keepInZapped = taskIds.filter(id => {
    const t = tachesById[id];
    return t && (t.statut === 'Fait' || t.statut === 'Archive');
  });
  await WuboGrist.updateRecord('Blocs_temps', blocId, { taches_liees: ['L', ...keepInZapped] });

  // Incremente push_count pour chaque tache replacee
  for (const t of movable) {
    const newCount = (t.push_count || 0) + 1;
    try {
      await WuboGrist.updateRecord('Taches', t.id, { push_count: newCount });
    } catch (e) {
      console.warn(`push_count non incremente pour tache ${t.id} :`, e.message);
    }
  }
}

function showUndoToast(blocId, prevStatut) {
  hideUndoToast();
  const toast = $el('div', { class: 'undo-toast', id: 'undo-toast' },
    $el('span', {}, 'Bloc zappé.'),
    $el('button', { onclick: () => undoAction(blocId, prevStatut) }, 'Annuler')
  );
  document.body.appendChild(toast);
  const timerId = setTimeout(() => {
    hideUndoToast();
    undoTimers.delete(blocId);
  }, 8000);
  undoTimers.set(blocId, { timerId, prevStatut });
  // Nettoyage sur navigation / cache page
  window.addEventListener('pagehide', hideUndoToast, { once: true });
}

function hideUndoToast() {
  const existing = document.getElementById('undo-toast');
  if (existing) existing.remove();
}

async function undoAction(blocId, prevStatut) {
  const entry = undoTimers.get(blocId);
  if (entry) { clearTimeout(entry.timerId); undoTimers.delete(blocId); }
  hideUndoToast();
  try {
    await WuboGrist.updateRecord('Blocs_temps', blocId, { statut: prevStatut });
    // Note : la redistribution des taches n'est PAS annulee (complexe a restaurer).
    // On previent l'utilisateur que les taches zappees ont deja ete deplacees si c'est le cas.
    WuboGrist.toast('Zap annulé', 'success');
    await render();
  } catch (e) {
    WuboGrist.toast('Erreur undo : ' + e.message, 'error');
  }
}

// Remplit la modal task-edit avec les données d'une tâche, SANS ouvrir ni fermer la modal.
// Utilisé pour openTaskEdit (première ouverture) et replaceTaskEdit (swap in-place).
function fillTaskEditForm(taskId) {
  const t = tachesById[taskId];
  if (!t) return;
  currentTaskEditId = taskId;
  currentTaskNewBlocId = null;
  currentTaskOriginalDate = t.date_cible || null;
  currentPushCount = t.push_count || 0;
  pendingSubtasks = [];
  window._newTaskParent = null;
  document.getElementById('task-modal-title').textContent = 'Modifier la tâche';
  document.getElementById('task-titre').value = t.titre || '';
  document.getElementById('task-desc').value = t.description || '';
  document.getElementById('task-livrable').value = t.livrable || '';
  document.getElementById('task-statut').value = t.statut || 'Pas commence';
  document.getElementById('task-heures').value = t.estim_heures || '';
  document.getElementById('task-date').value = unixToInputDate(t.date_cible);
  const extCb = document.getElementById('task-ext-deadline');
  if (extCb) extCb.checked = !!t.est_deadline_externe;
  // Collaborateurs : charge la liste existante
  currentTaskCollabs = Array.isArray(t.collaborateurs) ? t.collaborateurs.slice() : ['L'];
  const collabsEl = document.getElementById('task-collabs');
  if (collabsEl && window.WuboUI) WuboUI.renderCollaborateursPicker(collabsEl, currentTaskCollabs, list => { currentTaskCollabs = list; });
  // Remplit le dropdown projet (async, non bloquant) et pré-sélectionne le projet courant
  const projetSel = document.getElementById('task-projet');
  if (projetSel) WuboGrist.populateProjetSelect(projetSel, t.projet).catch(() => {});
  const meta = [];
  if (t.score) meta.push(`score ${t.score}`);
  if (currentPushCount > 0) meta.push(`reportée ${currentPushCount}x`);
  document.getElementById('task-meta').textContent = meta.join(' · ');
  document.getElementById('task-reporter').style.display = 'flex';
  document.getElementById('push-count-info').textContent = currentPushCount > 0 ? `Cette tâche a été reportée ${currentPushCount} fois (bonus score +${Math.min(currentPushCount*3, 10)})` : '';
  const subs = Object.values(tachesById).filter(x => x.parent_tache === taskId);
  renderSubtasks(subs);
  document.getElementById('subtasks-section').style.display = '';
  // Bouton Archiver visible seulement si la tâche est deja Fait
  const archiveBtn = document.getElementById('task-archive-btn');
  if (archiveBtn) archiveBtn.style.display = (t.statut === 'Fait') ? '' : 'none';
  // Bouton Supprimer visible sur toute tâche existante
  const deleteBtn = document.getElementById('task-delete-btn');
  if (deleteBtn) deleteBtn.style.display = '';
  // Mise a jour live quand l'utilisateur change le statut dans la modal
  const statutSelect = document.getElementById('task-statut');
  if (statutSelect && archiveBtn) {
    statutSelect.onchange = () => {
      archiveBtn.style.display = (statutSelect.value === 'Fait') ? '' : 'none';
    };
  }
  // Scroll top du contenu modal pour que le nouveau contenu soit visible
  const modalContent = document.querySelector('#task-modal .modal-content');
  if (modalContent) modalContent.scrollTop = 0;
}

}

async function deleteCurrentTask() {
  if (!currentTaskEditId) return;
  const t = tachesById[currentTaskEditId];
  const titre = t ? (t.titre || '(sans titre)') : '';
  const ok = await WuboUI.confirm({
    title: 'Supprimer ?',
    message: `"${titre}" — irréversible`,
    yesLabel: 'Supprimer',
    danger: true
  });
  if (!ok) return;
  try {
    const id = currentTaskEditId;
    // Retirer la tâche des blocs qui la référencent
    const blocs = await WuboGrist.fetchRows('Blocs_temps');
    for (const b of blocs) {
      const ids = WuboGrist.refListIds(b.taches_liees);
      if (ids.includes(id)) {
        const next = ids.filter(x => x !== id);
        try { await WuboGrist.updateRecord('Blocs_temps', b.id, { taches_liees: ['L', ...next] }); } catch (_) {}
      }
    }
    await WuboGrist.deleteRecord('Taches', id);
    closeTaskEdit();
    WuboGrist.toast('Tâche supprimée', 'info');
    await render();
  } catch (e) {
    WuboGrist.toast('Erreur : ' + e.message, 'error');
  }
}

  if (collabsEl && window.WuboUI) WuboUI.renderCollaborateursPicker(collabsEl, currentTaskCollabs, list => { currentTaskCollabs = list; });

  document.getElementById('task-date').value = unixToInputDate(Math.floor(d.getTime()/1000));

  if (projetSel) WuboGrist.populateProjetSelect(projetSel, null).catch(() => {});
  document.getElementById('task-reporter').style.display = 'none';
  // Nouvelle tache parent : on affiche la section sous-taches pour remplir pendingSubtasks.
  // Nouvelle sous-tache : on la cache (pas de sous-sous-tache ici).
  if (parentTaskId) {
    document.getElementById('subtasks-section').style.display = 'none';
  } else {
    document.getElementById('subtasks-section').style.display = '';
    renderPendingSubtasksList();
  }
  const archiveBtn = document.getElementById('task-archive-btn');
  if (archiveBtn) archiveBtn.style.display = 'none';
  const deleteBtn = document.getElementById('task-delete-btn');
  if (deleteBtn) deleteBtn.style.display = 'none';

  const modalContent = document.querySelector('#task-modal .modal-content');
  if (modalContent) modalContent.scrollTop = 0;
  openModal('task-modal');
}

function renderSubtasks(subs) {
  const node = document.getElementById('subtasks-list');
  $clear(node);
  if (subs.length === 0) {
    node.appendChild($el('div', { class: 'empty', style: { fontSize: '11px' } }, 'Aucune sous-tâche'));
    return;
  }
  subs.forEach(s => {
    const isDone = s.statut === 'Fait';
    const row = $el('div', {
      class: 'subtask' + (isDone ? ' done' : ''),
      onclick: async (e) => {
        // Ignorer si click sur la croix
        if (e.target.closest('.sub-del')) return;
        await toggleSubtaskDone(s);
      }
    });
    row.appendChild($el('span', { class: 'status-pill ' + statutClass(s.statut) }));
    row.appendChild($el('span', {
      class: 'sub-label',
      style: { flex: '1', textDecoration: isDone ? 'line-through' : 'none', color: isDone ? 'var(--text-faint)' : 'var(--text)' }
    }, s.titre || '(sans titre)'));
    row.appendChild($el('button', {
      type: 'button',
      class: 'sub-del ghost small',
      title: 'Supprimer définitivement',
      style: { padding: '2px 8px', fontSize: '12px', color: 'var(--danger)', border: '1px solid var(--border)' },
      onclick: async (e) => {
        e.stopPropagation();
        await deleteSubtaskHard(s);
      }
    }, '✕'));
    node.appendChild(row);
  });
}

// Rendu des sous-tâches pending (création en même temps que la tâche parent)
function renderPendingSubtasksList() {
  const node = document.getElementById('subtasks-list');
  $clear(node);
  if (pendingSubtasks.length === 0) {
    node.appendChild($el('div', { class: 'empty', style: { fontSize: '11px' } }, 'Aucune sous-tâche pour l\'instant'));
    return;
  }
  pendingSubtasks.forEach((sub, idx) => {
    const row = $el('div', { class: 'subtask', style: { cursor: 'default' } });
    const input = $el('input', {
      type: 'text',
      value: sub.titre || '',
      placeholder: 'Titre de la sous-tâche',
      style: { flex: '1', fontSize: '12px', padding: '3px 6px' },
      oninput: (e) => { pendingSubtasks[idx].titre = e.target.value; }
    });
    const delBtn = $el('button', {
      type: 'button',
      class: 'ghost small',
      style: { padding: '2px 8px' },
      onclick: () => { pendingSubtasks.splice(idx, 1); renderPendingSubtasksList(); }
    }, '✕');
    row.appendChild(input);
    row.appendChild(delBtn);
    node.appendChild(row);
  });
}

async function saveTaskEdit() {
  const titre = document.getElementById('task-titre').value.trim();
  if (!titre) {
    WuboGrist.toast('Titre obligatoire', 'warn');
    return;
  }
  const heures = parseFloat(document.getElementById('task-heures').value) || 0;
  const dateStr = document.getElementById('task-date').value;
  const dateUnix = inputDateToUnix(dateStr);
  const extCb = document.getElementById('task-ext-deadline');
  const projetSel = document.getElementById('task-projet');
  const projetVal = projetSel && projetSel.value ? parseInt(projetSel.value, 10) : null;
  const fields = {
    titre,
    description: document.getElementById('task-desc').value,
    livrable: document.getElementById('task-livrable').value,
    statut: document.getElementById('task-statut').value,
    estim_heures: heures,
    est_deadline_externe: extCb ? !!extCb.checked : false,
    collaborateurs: currentTaskCollabs
  };
  if (projetVal) fields.projet = projetVal;
  if (dateUnix) fields.date_cible = dateUnix;

  try {
    if (currentTaskEditId) {
      // Incremente push_count si date changee vers futur
      const wasReported = currentTaskOriginalDate && dateUnix && dateUnix > currentTaskOriginalDate;
      if (wasReported) {
        fields.push_count = currentPushCount;
      }
      await WuboGrist.updateRecord('Taches', currentTaskEditId, fields);
      justUpdatedTaskId = currentTaskEditId;
      if (wasReported) {
        const d = new Date(dateUnix * 1000);
        const iso = `${d.getUTCDate()}/${String(d.getUTCMonth()+1).padStart(2,'0')}`;
        WuboGrist.toast(`Tâche reportée au ${iso}`, 'success');
      } else {
        WuboGrist.toast('Tâche mise à jour', 'success');
      }
      closeTaskEdit();
      await render();
    } else {
      fields.date_creation = WuboGrist.daysFromToday(0);
      fields.push_count = 0;
      fields.proprietaire = WuboGrist.getUser() || 'Taki';
      fields.cash_impact = 2;
      fields.urgency = 2;
      fields.strategic_value = 2;
      if (window._newTaskParent) fields.parent_tache = window._newTaskParent;

      // Création tâche parent - on récupère l'id direct
      const { id: newId } = await WuboGrist.addRecord('Taches', fields);

      // Lier au bloc si un bloc est spécifié
      if (currentTaskNewBlocId && newId) {
        const blocRows = await WuboGrist.fetchRows('Blocs_temps');
        const bloc = blocRows.find(b => b.id === currentTaskNewBlocId);
        if (bloc) {
          const existingIds = WuboGrist.refListIds(bloc.taches_liees);
          const newList = ['L', ...existingIds, newId];
          await WuboGrist.updateRecord('Blocs_temps', currentTaskNewBlocId, { taches_liees: newList });
        }
      }

      // Création des sous-tâches pending (uniquement si tâche parent, pas sous-tâche)
      let subCount = 0;
      if (!window._newTaskParent && newId && pendingSubtasks.length > 0) {
        for (const sub of pendingSubtasks) {
          const subTitre = (sub.titre || '').trim();
          if (!subTitre) continue;
          try {
            await WuboGrist.addRecord('Taches', {
              titre: subTitre,
              statut: 'Pas commence',
              cash_impact: 1,
              urgency: 1,
              strategic_value: 1,
              push_count: 0,
              proprietaire: (WuboGrist.getUser() || 'Taki'),
              date_creation: WuboGrist.daysFromToday(0),
              parent_tache: newId
            });
            subCount++;
          } catch (e) {
            console.warn('Sous-tâche non créée :', e.message);
          }
        }
      }

      if (newId) justUpdatedTaskId = newId;
      if (subCount > 0) {
        WuboGrist.toast(`Tâche créée avec ${subCount} sous-tâche${subCount > 1 ? 's' : ''}`, 'success');
      } else {
        WuboGrist.toast(window._newTaskParent ? 'Sous-tâche créée' : 'Tâche créée', 'success');
      }
      closeTaskEdit();
      await render();
    }
  } catch (e) {
    WuboGrist.toast('Erreur : ' + e.message, 'error');
  }
}

async function refresh() {
  const btn = document.querySelector('.nav-refresh');
  if (!btn) return;
  const orig = btn.textContent;
  btn.textContent = '⟳';
  btn.disabled = true;
  try { await render(); btn.textContent = '✓'; }
  catch (e) { btn.textContent = '✕'; }
  setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 1200);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeDump();
    closeTaskEdit();
  }
});

(async () => {
  await WuboGrist.initGrist();
  // Onboarding si pas encore d'user, puis pose le bouton profil
  if (window.WuboUI) {
    await WuboUI.ensureUser(document.getElementById('profile-slot'));
  }
  try { if (typeof grist !== 'undefined' && grist.onRecords) grist.onRecords(() => render()); } catch (_) {}
  window.addEventListener('wubo-data-fresh', () => render());
  dumpBinding = WuboGrist.bindDumpTextarea(
    document.getElementById('dump-content'),
    document.getElementById('dump-contexte')
  );
  if (window.ModalSwipe) {
    ModalSwipe.enable('task-modal', closeTaskEdit);
    ModalSwipe.enable('dump-modal', closeDump);
    ModalSwipe.enable('bloc-modal', closeBlocEdit);
  }
  render();
  setInterval(render, 120000);
})();
</script>

</body>
</html>
