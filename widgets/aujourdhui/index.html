<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<!-- Prefetch des autres widgets : navigation perçue plus fluide (HTML/CSS/JS chargés à l'avance) -->

<link rel="prefetch" href="../dashboard/" as="document">

<style>
  #app {
    max-width: 480px;
    margin: 0 auto;
    padding: calc(env(safe-area-inset-top) + 76px) 14px calc(150px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* Chevron pour dérouler les sous-tâches inline (sur .tache-row) */
  .tache-row .toggle-subs {
    background: transparent;
    border: none;
    padding: 2px 6px;
    font-size: 11px;
    color: var(--text-faint);
    cursor: pointer;
    align-self: flex-start;
    font-variant-numeric: tabular-nums;
  }
  .tache-row .toggle-subs:hover { color: var(--current); }

  .subtasks-inline {
    padding: 2px 0 4px 18px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    border-left: 2px solid var(--border);
    margin-left: 6px;
  }
  .subtask-inline {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 6px;
    font-size: 12px;
    color: var(--text);
    cursor: pointer;
    border-radius: 3px;
  }
  .subtask-inline:active { background: rgba(0,0,0,0.04); }
  .subtask-inline.done .subtask-titre { text-decoration: line-through; color: var(--text-faint); }
  .subtask-inline .subtask-titre { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .add-tache {
    margin-top: 4px;
    padding: 5px 8px;
    background: transparent;
    border: 1px dashed var(--border-strong);
    border-radius: 4px;
    color: var(--text-dim);
    font-size: 11px;
    cursor: pointer;
    text-align: center;
    width: 100%;
  }
  .add-tache:hover { border-color: var(--current); color: var(--current); }

  /* ============ NOUVEAU MODELE : tache rows en liste chronologique ============ */
  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 4px 4px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
  }
  .section-head .section-count {
    background: var(--surface-alt);
    color: var(--text-dim);
    padding: 1px 6px;
    border-radius: 9px;
    font-size: 10px;
  }
  .tache-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    cursor: pointer;
    position: relative;
  }
  .tache-row:active { background: var(--surface-alt); }
  .tache-row.done { background: var(--done-bg); }
  .tache-row.done .titre-tache { text-decoration: line-through; color: var(--text-faint); }
  .tache-row.wip { border-left: 3px solid var(--current); }
  .tache-row.blocked { border-left: 3px solid var(--warning); background: var(--warning-soft); }
  .tache-row.just-updated { animation: rowFlash 1.6s ease-out; }
  @keyframes rowFlash {
    0% { background: var(--accent-soft); }
    100% { background: var(--surface); }
  }
  .tache-time {
    font-size: 11px;
    color: var(--text-faint);
    line-height: 1;
  }
  .tache-time .tache-heure {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .tache-time .tache-fin {
    font-size: 12px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }
  .tache-time .tache-duree {
    font-size: 11px;
    color: var(--text-faint);
  }
  .tache-main {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tache-main .titre-tache {
    flex: 1;
    font-size: 14px;
    line-height: 1.3;
  }
  .tache-row .toggle-subs {
    background: transparent;
    border: none;
    padding: 2px 6px;
    font-size: 11px;
    color: var(--text-faint);
    cursor: pointer;
    align-self: flex-start;
    font-variant-numeric: tabular-nums;
  }
  .tache-row .toggle-subs:hover { color: var(--current); }

  /* Section À rattraper : sticky-top sous le .page-header (fixed top:0).
     top doit etre cale a la hauteur reelle du header + safe-area, sinon le
     panneau passe DERRIERE le header (chevauchement signale par l'user). */
  #rattrapage:has(.rattrapage) {
    position: sticky;
    top: calc(env(safe-area-inset-top) + var(--page-header-h, 64px));
    z-index: 40;
    /* fond opaque pour cacher le contenu qui scroll dessous */
    background: var(--bg);
    margin: 0 -14px;
    padding: 0 14px 4px;
  }
  /* "À rattraper" ULTRA COMPACT : 1 tache = 1 ligne flex (32px haute).
     [date 52px] [titre flex ellipsis] [✓ 30x30] [→ 30x30].
     Pour autre chose que ✓Fait ou →Aujourd'hui : tap sur le titre ouvre la modal. */
  .rattrapage {
    background: var(--warning-soft);
    border: 1px solid var(--warning);
    border-radius: var(--radius-md);
    padding: 4px 6px 6px;
    display: flex;
    flex-direction: column;
    gap: 0;
    margin-bottom: 4px;
  }
  .rattrapage-head {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--warning);
    padding: 2px 4px 4px;
  }
  .ratt-task-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 2px 4px;
    min-height: 36px;
    border-top: 1px dashed var(--warning);
  }
  .ratt-task-row:first-of-type { border-top: none; }
  .ratt-when {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--warning);
    flex-shrink: 0;
    min-width: 48px;
    line-height: 1.1;
  }
  .ratt-titre {
    flex: 1;
    min-width: 0;
    font-size: 13px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    cursor: pointer;
    padding: 4px 2px;
  }
  .ratt-titre:hover, .ratt-titre:active { color: var(--current); }
  .ratt-act {
    flex-shrink: 0;
    width: 30px;
    height: 30px;
    min-height: 30px;
    padding: 0;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 700;
    line-height: 1;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
  }
  .ratt-act:hover { background: var(--surface); border-color: var(--border-strong); }
  .ratt-act:active { transform: translate(1px, 1px); }
  .ratt-act-fait { color: var(--success); border-color: var(--success); }
  .ratt-act-fait:hover { background: var(--success-soft); }
  .ratt-act-today { color: var(--current); border-color: var(--current); }
  .ratt-act-today:hover { background: var(--current-soft); }
  /* Bouton "+ voir N autres" : pleine largeur, dashed warning, discret mais cliquable.
     Apparait sous la liste rattrapage quand le backlog depasse rattrapageVisibleCount.
     Variante .ratt-show-less : meme style mais avec icone reduce. */
  .ratt-show-more {
    width: 100%;
    margin-top: 6px;
    padding: 6px 10px;
    background: transparent;
    border: 1px dashed var(--warning);
    color: var(--warning);
    border-radius: var(--radius-sm);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
    min-height: 30px;
    line-height: 1.2;
  }
  .ratt-show-more:hover { background: var(--warning-soft); border-style: solid; }
  .ratt-show-more:active { transform: translate(1px, 1px); }
  .ratt-show-less { color: var(--text-faint); border-color: var(--border-strong); }
  .ratt-show-less:hover { background: var(--surface-2); color: var(--text); border-color: var(--border-strong); }

  .modal {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.4);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 100;
    overscroll-behavior: contain;
  }
  .modal.hidden { display: none; }
  .modal-content {
    background: var(--surface);
    width: 100%;
    max-width: 480px;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    padding: 16px;
    padding-bottom: calc(16px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 88vh;
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
  }
  .modal-head { display: flex; justify-content: space-between; align-items: center; }
  .modal-content textarea {
    min-height: 110px;
    max-height: 260px;
    font-size: 14px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .modal-content .meta-info { font-size: 11px; color: var(--text-dim); padding: 4px 0; }
  .modal-content .field { display: flex; flex-direction: column; gap: 4px; }
  .modal-content .field label { font-size: 10px; }

  #error { background: var(--danger); color: var(--on-danger); padding: 10px; border-radius: 6px; font-size: 12px; display: none; }
  #error button { margin-top: 6px; background: white; color: var(--danger); border: 1px solid white; }

  /* Icône deadline externe à côté du titre de tâche */
  .ext-deadline-icon {
    flex-shrink: 0;
    font-size: 13px;
    color: var(--danger);
    margin-right: 2px;
  }

  /* Flash visuel après modification d'une tâche */
  @keyframes flashUpdate {
    0% { background: var(--current-soft); }
    100% { background: transparent; }
  }
  .just-updated { animation: flashUpdate 2s ease-out; }

  .missed-indicator {
    display: inline-flex;
    align-items: center;
    font-size: 10px;
    font-weight: 700;
    color: var(--danger);
    margin-left: 4px;
    padding: 0 4px;
    background: transparent;
    border: 1px solid var(--danger);
    border-radius: 2px;
    line-height: 1.3;
  }
</style>

<body>

<main id="app">
  <header class="page-header">
    <div class="page-header-title">
      <h1 id="date">...</h1>
      <div class="sub" id="meta"></div>
    </div>
    <div id="profile-slot" class="profile-wrap"></div>
  </header>

<nav class="bottom-nav">
  <div class="nav-tabs">

    <a href="../semaine/" class="tab">Semaine</a>
    <a href="../dashboard/" class="tab">Objectifs</a>
    <a href="../deadlines/" class="tab">Échéances</a>
  </div>

    <button class="accent nav-dump" onclick="openDump()">+ Dump</button>
    <button class="ghost nav-refresh" onclick="refresh()" title="Rafraîchir">↻</button>
  </div>

<div id="dump-modal" class="modal hidden" onclick="backdropClose(event, 'dump-modal')">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h3>Dump rapide</h3>
      <button class="ghost small" onclick="closeDump()">Annuler</button>
    </div>
    <select id="dump-contexte">
      <option value="Libre">Libre</option>
      <option value="Post-RDV">Post-RDV</option>
      <option value="Idee">Idée</option>
      <option value="Probleme">Problème</option>
      <option value="Decision">Décision</option>
    </select>
    <textarea id="dump-content" placeholder="Écris sans filtre. Claude rangera."></textarea>
    <div class="sticky-save">
      <button class="ghost small" onclick="closeDump()">Annuler</button>
      <button class="primary" onclick="submitDump()">Envoyer au dump</button>
    </div>
  </div>
</div>


<script>
const { $el, $clear } = Dom;
let tachesById = {};
// ID de la tâche flashée brièvement après édition (pour l'animation .just-updated)
let justUpdatedTaskId = null;
// Tâches dont les sous-tâches sont dépliées en ligne (persist session)
const expandedTaskIds = (() => {
  try {
    const raw = sessionStorage.getItem('wubo_jour_expanded');
    return new Set(raw ? JSON.parse(raw) : []);
  } catch (_) { return new Set(); }
})();
function persistExpanded() {
  try { sessionStorage.setItem('wubo_jour_expanded', JSON.stringify(Array.from(expandedTaskIds))); } catch (_) {}
}
function toggleSubsInline(taskId) {
  if (expandedTaskIds.has(taskId)) expandedTaskIds.delete(taskId);
  else expandedTaskIds.add(taskId);
  persistExpanded();
  render();
}
// Toggle rapide Fait / Pas commencé d'une sous-tâche (click inline ou dans la modal)
async function toggleSubtaskDone(sub) {
  const next = (sub.statut === 'Fait') ? 'Pas commence' : 'Fait';
  const fields = { statut: next };
  if (next === 'Fait') fields.date_fait = WuboGrist.nowUnix();
  try {
    await WuboGrist.updateRecord('Taches', sub.id, fields);
    justUpdatedTaskId = sub.id;
    WuboGrist.toast(next === 'Fait' ? 'Sous-tâche faite' : 'Sous-tâche ré-ouverte', 'success', 1400);
    await render();
  } catch (e) {
    WuboGrist.toast('Erreur : ' + e.message, 'error');
  }
}
// Delete définitif d'une sous-tâche (jamais appelé maintenant : la modal task gère
// les sous-tâches via WuboTaskModal. Conservé pour usage interne potentiel.)
async function deleteSubtaskHard(sub) {
  const ok = await WuboUI.confirm({
    title: 'Supprimer la sous-tâche ?',
    message: `"${sub.titre || '(sans titre)'}"`,
    yesLabel: 'Supprimer',
    danger: true
  });
  if (!ok) return;
  try {
    await WuboGrist.deleteRecord('Taches', sub.id);
    WuboGrist.toast('Sous-tâche supprimée', 'info');
    await render();
  } catch (e) {
    WuboGrist.toast('Erreur : ' + e.message, 'error');
  }
}

function statutClass(s) {
  if (!s) return 'todo';
  const k = s.toLowerCase();
  if (k.includes('fait')) return 'done';
  if (k.includes('en cours')) return 'wip';
  if (k.includes('bloque')) return 'blocked';
  if (k.includes('abandon')) return 'abandoned';
  return 'todo';
}

function unixToInputDate(ts) {
  if (!ts) return '';
  const d = new Date(ts * 1000);
  return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
}
function inputDateToUnix(s) {
  if (!s) return null;
  const [y, m, d] = s.split('-').map(Number);
  return Math.floor(Date.UTC(y, m-1, d) / 1000);
}

function currentTranche() {
  const h = new Date().getHours();
  if (h >= 8 && h < 13) return 'Matin';
  if (h >= 13 && h < 18) return 'Aprem';
  if (h >= 18 && h < 22) return 'Soir';
  return null;
}

function weekNumber(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

function showError(msg) {
  const e = document.getElementById('error');
  $clear(e);
  e.appendChild($el('div', {}, msg));
  if (!WuboGrist.inGristIframe()) {
    e.appendChild($el('button', { class: 'small', onclick: () => { WuboGrist.resetApiKey(); location.reload(); } }, 'Changer de cle API'));
  }
  e.style.display = 'block';
}
function clearError() {
  const e = document.getElementById('error');
  e.textContent = '';
  e.style.display = 'none';
}

// Modele simplifie : tout est tache. Plus de blocs.
// 3 sections : "A rattraper" (sticky), "Sans creneau" (taches du jour sans heure),
// "Aujourd'hui" (taches du jour triees par heure_debut).
async function render() {
  clearError();
  const now = new Date();
  document.getElementById('date').textContent =
    now.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });

  tachesById = {};
  let fetchOk = true;
  let myTasks = [];
  try {
    const tRaw = await WuboGrist.fetchRows('Taches');
    const t = WuboGrist.filterMineOnly(tRaw);
    t.forEach(x => { tachesById[x.id] = x; });
    myTasks = t;
  } catch (e) {
    showError(e.message);
    fetchOk = false;
  }

  const todayISO = WuboGrist.todayISO();
  const todayUnix = WuboGrist.daysFromToday(0);

  // Filtre tâches du jour (date_cible = aujourd'hui)
  // Exclut Archive et sous-tâches (parent_tache != null)
  const isActive = t => t.statut !== 'Archive' && !t.parent_tache;
  const todayTasks = myTasks.filter(t =>
    isActive(t) && t.date_cible && WuboGrist.gristDateToISO(t.date_cible) === todayISO
  );
  // À rattraper : tâches passées non-faites
  const rattrapageTasks = myTasks.filter(t =>
    isActive(t) && t.statut !== 'Fait' && t.date_cible &&
    WuboGrist.gristDateToISO(t.date_cible) < todayISO
  ).sort((a, b) => (a.date_cible || 0) - (b.date_cible || 0));

  const fait = todayTasks.filter(t => t.statut === 'Fait').length;
  const total = todayTasks.length;
  document.getElementById('meta').textContent = fetchOk
    ? `Sprint S${weekNumber(now)} · ${fait}/${total} tâches faites${rattrapageTasks.length > 0 ? ` · ${rattrapageTasks.length} en retard` : ''}`
    : `Sprint S${weekNumber(now)} · hors ligne`;

  if (!fetchOk) return;

  renderRattrapageTasks(rattrapageTasks);
  renderTodayTasks(todayTasks);

  if (justUpdatedTaskId !== null) {
    const id = justUpdatedTaskId;
    setTimeout(() => { if (justUpdatedTaskId === id) justUpdatedTaskId = null; }, 2100);
  }
}

// Rend la liste chronologique du jour : "Sans creneau" en haut, puis taches avec
// heure_debut triees par heure croissante.
function renderTodayTasks(tasks) {
  const container = document.getElementById('blocs');
  $clear(container);

  if (!tasks.length) {
    container.appendChild($el('div', {
      class: 'empty-day',
      style: 'padding:24px 16px;text-align:center;color:var(--text-faint);font-size:13px'
    }, 'Aucune tâche aujourd\'hui. Ajoute-en une.'));
    container.appendChild($el('button', {
      class: 'add-tache',
      style: 'margin:8px auto;display:block',
      onclick: () => openTaskNew(null)
    }, '+ Nouvelle tâche'));
    return;
  }

  const sansCreneau = tasks.filter(t => !t.heure_debut).sort((a, b) => (a.titre || '').localeCompare(b.titre || ''));
  const planifiees = tasks.filter(t => t.heure_debut).sort((a, b) => (a.heure_debut || '').localeCompare(b.heure_debut || ''));

  if (sansCreneau.length) {
    container.appendChild($el('div', { class: 'section-head' },
      $el('span', {}, 'Sans créneau'),
      $el('span', { class: 'section-count' }, String(sansCreneau.length))
    ));
    sansCreneau.forEach(t => container.appendChild(renderTaskRow(t)));
  }

  if (planifiees.length) {
    container.appendChild($el('div', { class: 'section-head' },
      $el('span', {}, 'Aujourd\'hui'),
      $el('span', { class: 'section-count' }, String(planifiees.length))
    ));
    planifiees.forEach(t => container.appendChild(renderTaskRow(t)));
  }

  // Bouton ajout en bas
  container.appendChild($el('button', {
    class: 'add-tache',
    style: 'margin:12px auto;display:block',
    onclick: () => openTaskNew(null)
  }, '+ Nouvelle tâche'));
}

// Calcule heure de fin a partir de heure_debut + duree_minutes
function computeHeureFin(heureDebut, dureeMinutes) {
  if (!heureDebut || !dureeMinutes) return '';
  const [h, m] = heureDebut.split(':').map(Number);
  const totalMin = h * 60 + m + dureeMinutes;
  const fh = Math.floor(totalMin / 60) % 24;
  const fm = totalMin % 60;
  return `${String(fh).padStart(2, '0')}:${String(fm).padStart(2, '0')}`;
}

function formatDuree(min) {
  if (!min) return '';
  if (min < 60) return `${min}min`;
  const h = Math.floor(min / 60);
  const r = min % 60;
  return r === 0 ? `${h}h` : `${h}h${String(r).padStart(2, '0')}`;
}

// Rendu d'une tache en row : heure(s) + titre + statut + assignees + sous-taches.
function renderTaskRow(t) {
  const liClass = ['tache-row'];
  if (t.statut === 'Fait') liClass.push('done');
  if (t.statut === 'En cours') liClass.push('wip');
  if (t.statut === 'Bloque') liClass.push('blocked');
  if (justUpdatedTaskId === t.id) liClass.push('just-updated');

  const row = $el('div', {
    class: liClass.join(' '),
    'data-claude-check': t.claude_check === false ? 'false' : 'true',
    onclick: (e) => {
      if (e.target.closest('.toggle-subs') || e.target.closest('button')) return;
      openTaskEdit(t.id);
    }
  });

  // Bandeau temps (heure + duree)
  if (t.heure_debut) {
    const fin = computeHeureFin(t.heure_debut, t.duree_minutes);
    const dureeTxt = formatDuree(t.duree_minutes);
    const timeLine = $el('div', { class: 'tache-time' },
      $el('span', { class: 'tache-heure' }, t.heure_debut),
      fin ? $el('span', { class: 'tache-fin' }, ` → ${fin}`) : null,
      dureeTxt ? $el('span', { class: 'tache-duree' }, ` · ${dureeTxt}`) : null
    );
    row.appendChild(timeLine);
  }

  // Ligne principale : statut + titre + pastilles à droite (flex row).
  // Pastilles intégrées dans .tache-main (au lieu d'être appendues à .tache-row qui
  // est flex-column → tombaient en bas). Affichage cohérent avec Semaine.
  const main = $el('div', { class: 'tache-main' },
    $el('span', { class: 'status-pill ' + statutClass(t.statut) }),
    t.est_deadline_externe ? $el('span', { class: 'ext-deadline-icon', title: 'Deadline externe' }, '⏰') : null,
    $el('span', { class: 'titre-tache' }, t.titre || '(sans titre)'),
    t.times_missed && t.times_missed > 0
      ? $el('span', { class: 'missed-indicator', title: `Ratée ${t.times_missed}x` }, `× ${t.times_missed}`)
      : null
  );
  const pastilles = WuboUI.renderAssignees(t, { size: 'sm' });
  if (pastilles) main.appendChild(pastilles);
  row.appendChild(main);

  // Sous-tâches inline
  const subs = Object.values(tachesById).filter(x => x.parent_tache === t.id && x.statut !== 'Archive');
  if (subs.length > 0) {
    const isOpen = expandedTaskIds.has(t.id);
    row.appendChild($el('button', {
      class: 'toggle-subs',
      onclick: (e) => { e.stopPropagation(); toggleSubsInline(t.id); }
    }, isOpen ? `▾ ${subs.length}` : `▸ ${subs.length}`));
    if (isOpen) {
      const subsContainer = $el('div', { class: 'subtasks-inline' });
      subs.forEach(s => {
        const subRow = $el('div', {
          class: 'subtask-inline' + (s.statut === 'Fait' ? ' done' : ''),
          onclick: async (e) => { e.stopPropagation(); await toggleSubtaskDone(s); }
        },
          $el('span', { class: 'status-pill ' + statutClass(s.statut) }),
          $el('span', { class: 'subtask-titre', title: s.titre }, s.titre || '(sans titre)')
        );
        subsContainer.appendChild(subRow);
      });
      row.appendChild(subsContainer);
    }
  }

  return row;
}

// Rend la zone "A rattraper" en haut (sticky CSS).
// Format ULTRA COMPACT : 1 tache par ligne (badge date + titre + 2 actions
// principales : ✓ Fait et → Aujourd'hui). Pour ajuster finement (+1j / +1sem /
// autre date), tap sur le titre ouvre la modal d'edition complete.
// Salves : 1 visible par defaut, +3 par clic sur "voir plus". Le compteur est
// persiste : traiter une tache n'efface pas l'expand, la suivante remplit.
const RATT_DEFAULT_VISIBLE = 1;
const RATT_BATCH_STEP = 3;
let rattrapageVisibleCount = RATT_DEFAULT_VISIBLE;

function renderRattrapageTasks(tasks) {
  const node = document.getElementById('rattrapage');
  $clear(node);
  if (!tasks.length) {
    rattrapageVisibleCount = RATT_DEFAULT_VISIBLE;
    return;
  }

  // Clamp : si le backlog a retreci sous le compteur user, on resserre.
  if (rattrapageVisibleCount > tasks.length) rattrapageVisibleCount = tasks.length;
  if (rattrapageVisibleCount < RATT_DEFAULT_VISIBLE) {
    rattrapageVisibleCount = Math.min(RATT_DEFAULT_VISIBLE, tasks.length);
  }

  const block = $el('div', { class: 'rattrapage' });
  block.appendChild($el('div', { class: 'rattrapage-head' },
    $el('span', { class: 'titre' }, `À rattraper · ${tasks.length}`)
  ));

  const toShow = tasks.slice(0, rattrapageVisibleCount);
  toShow.forEach(t => {
    // Une seule ligne flex : [badge date] [titre clickable] [✓] [→]
    const row = $el('div', { class: 'ratt-task-row' });
    row.appendChild($el('span', { class: 'ratt-when', title: fmtPastDate(t.date_cible) },
      fmtPastDate(t.date_cible)
    ));
    row.appendChild($el('span', {
      class: 'ratt-titre',
      title: 'Tap pour ajuster (+1j, +1sem, autre date…)',
      onclick: () => openTaskEdit(t.id)
    }, t.titre || '(sans titre)'));
    row.appendChild($el('button', {
      class: 'ratt-act ratt-act-fait',
      title: 'Marquer Fait',
      'aria-label': 'Marquer Fait',
      onclick: (e) => { e.stopPropagation(); markTaskFait(t); }
    }, '✓'));
    row.appendChild($el('button', {
      class: 'ratt-act ratt-act-today',
      title: 'Reporter (choisir quand)',
      'aria-label': 'Reporter cette tâche',
      onclick: (e) => { e.stopPropagation(); replanRattrapagePicker(t); }
    }, '→'));
    block.appendChild(row);
  });

  // Bouton "+ voir N autres" : annonce le nombre de la prochaine salve
  // et le total restant entre parentheses.
  const remaining = tasks.length - rattrapageVisibleCount;
  if (remaining > 0) {
    const nextBatch = Math.min(RATT_BATCH_STEP, remaining);
    block.appendChild($el('button', {
      type: 'button',
      class: 'ratt-show-more',
      onclick: () => {
        rattrapageVisibleCount += RATT_BATCH_STEP;
        renderRattrapageTasks(tasks);
      }
    }, `+ Voir ${nextBatch} autre${nextBatch > 1 ? 's' : ''} · ${remaining} restante${remaining > 1 ? 's' : ''}`));
  } else if (rattrapageVisibleCount > RATT_DEFAULT_VISIBLE) {
    // Tout est visible et l'user a expand : option pour rep replier au compact.
    block.appendChild($el('button', {
      type: 'button',
      class: 'ratt-show-more ratt-show-less',
      onclick: () => {
        rattrapageVisibleCount = RATT_DEFAULT_VISIBLE;
        renderRattrapageTasks(tasks);
      }
    }, '↑ Réduire'));
  }
  node.appendChild(block);
}

// Picker de date pour reporter une tache. 4 options + tap titre = autre date custom.
// Ouvre WuboUI.choice et delegue a replanTaskTo() ou openTaskEdit().
async function replanRattrapagePicker(task) {
  const action = await WuboUI.choice({
    title: task.titre || '(sans titre)',
    message: 'Reporter à quand ?',
    options: [
      { id: 'today',    label: "Aujourd'hui",  sub: 'au jour courant' },
      { id: 'tomorrow', label: '+1 jour',      sub: 'demain' },
      { id: 'week',     label: '+1 semaine' },
      { id: 'custom',   label: 'Autre date…',  sub: 'ouvre la modal d\'édition' }
    ]
  });
  if (!action) return;
  if (action === 'today') return replanTaskTo(task, 0);
  if (action === 'tomorrow') return replanTaskTo(task, 1);
  if (action === 'week') return replanTaskTo(task, 7);
  if (action === 'custom') return openTaskEdit(task.id);
}

async function replanTaskTo(task, daysOffset) {
  // Snapshot des valeurs actuelles pour permettre l'undo.
  const prevDate = task.date_cible || null;
  const prevPushCount = task.push_count || 0;
  try {
    const newDate = WuboGrist.daysFromToday(daysOffset);
    await WuboGrist.updateRecord('Taches', task.id, {
      date_cible: newDate,
      push_count: prevPushCount + 1
    });
    justUpdatedTaskId = task.id;
    await render();
    // Cooldown undo 8s. Restore date + push_count aux valeurs avant click.
    const label = daysOffset === 0 ? "à aujourd'hui"
               : daysOffset === 1 ? '+1 jour'
               : `+${daysOffset} jours`;
    WuboUI.cooldownNotice({
      message: `« ${task.titre || 'Tâche'} » reportée ${label}`,
      durationMs: 8000,
      onCancel: async () => {
        try {
          await WuboGrist.updateRecord('Taches', task.id, {
            date_cible: prevDate,
            push_count: prevPushCount
          });
          WuboGrist.toast('Report annulé', 'info');
          await render();
        } catch (e) {
          WuboGrist.toast('Erreur restore : ' + e.message, 'error');
        }
      }
    });
  } catch (e) {
    WuboGrist.toast('Erreur : ' + e.message, 'error');
  }
}

async function markTaskFait(task) {
  // Snapshot pour undo : statut + date_fait avant le click.
  const prevStatut = task.statut || 'Pas commence';
  const prevDateFait = (task.date_fait != null && task.date_fait !== '') ? task.date_fait : null;
  try {
    await WuboGrist.updateRecord('Taches', task.id, {
      statut: 'Fait',
      date_fait: WuboGrist.nowUnix()
    });
    justUpdatedTaskId = task.id;
    await render();
    WuboUI.cooldownNotice({
      message: `« ${task.titre || 'Tâche'} » marquée Fait`,
      durationMs: 8000,
      onCancel: async () => {
        try {
          await WuboGrist.updateRecord('Taches', task.id, {
            statut: prevStatut,
            date_fait: prevDateFait
          });
          WuboGrist.toast('Restaurée', 'info');
          await render();
        } catch (e) {
          WuboGrist.toast('Erreur restore : ' + e.message, 'error');
        }
      }
    });
  } catch (e) {
    WuboGrist.toast('Erreur : ' + e.message, 'error');
  }
}

// ============ Rattrapage : blocs passés non-faits ============
// Un bloc avec date < today ET statut != Fait/Zappe/Archive = signal d'alerte.
// "Je n'ai pas avancé comme prévu, il faut comprendre et replanifier."
const MONTHS_FR = ['janv.', 'févr.', 'mars', 'avr.', 'mai', 'juin', 'juil.', 'août', 'sept.', 'oct.', 'nov.', 'déc.'];
const DAY_NAMES_FR = ['dim', 'lun', 'mar', 'mer', 'jeu', 'ven', 'sam'];

function fmtPastDate(dateUnix) {
  const d = new Date(dateUnix * 1000);
  const todayMs = new Date();
  todayMs.setHours(0,0,0,0);
  const diffDays = Math.round((todayMs.getTime() - d.getTime()) / 86400000);
  if (diffDays === 1) return 'Hier';
  if (diffDays === 2) return 'Avant-hier';
  if (diffDays <= 6) return `Il y a ${diffDays}j`;
  return `${DAY_NAMES_FR[d.getUTCDay()]} ${d.getUTCDate()} ${MONTHS_FR[d.getUTCMonth()]}`;
}

async function openTaskEdit(taskId) {
  const t = tachesById[taskId];
  if (!t) return;
  const r = await WuboTaskModal.open({ mode: 'edit', task: t });
  if (r && r.action !== 'cancelled') {
    if (r.action === 'saved') justUpdatedTaskId = r.taskId;
    await render();
  }
}


async function openTaskNew(blocId, parentTaskId) {
  // Aujourd'hui : la nouvelle tache est par defaut sur aujourd'hui.
  const r = await WuboTaskModal.open({
    mode: 'new',
    blocId: blocId || null,
    parentTaskId: parentTaskId || null,
    defaultDate: WuboGrist.daysFromToday(0)
  });
  if (r && r.action !== 'cancelled') {
    if (r.action === 'saved') justUpdatedTaskId = r.taskId;
    await render();
  }
}


function openModal(id) {
  document.getElementById(id).classList.remove('hidden');
  WuboGrist.lockBody();
}
function closeModal(id) {
  document.getElementById(id).classList.add('hidden');
  WuboGrist.unlockBody();
}

let dumpBinding = null;
async function submitDump() {
  const ctx = document.getElementById('dump-contexte').value;
  const content = document.getElementById('dump-content').value.trim();
  if (!content) return;
  try {
    await WuboGrist.addRecord('Dump_notes', {
      timestamp: WuboGrist.nowUnix(),
      auteur: WuboGrist.getUser() || 'Taki',
      contenu: content,
      contexte: ctx,
      traite: false,
      converti_en: ''
    });
    if (dumpBinding) dumpBinding.reset();
    else document.getElementById('dump-content').value = '';
    closeDump();
    WuboGrist.toast('Note enregistrée dans le dump', 'success');
  } catch (e) {
    WuboGrist.toast('Erreur : ' + e.message, 'error');
  }
}

function openDump() { openModal('dump-modal'); }
function closeDump() { closeModal('dump-modal'); }
function backdropClose(e, id) {
  if (e.target === e.currentTarget) closeModal(id);
}
async function refresh() {
  const btn = document.querySelector('.nav-refresh');
  if (!btn) return;
  const orig = btn.textContent;
  btn.textContent = '⟳';
  btn.disabled = true;
  try { await render(); btn.textContent = '✓'; }
  catch (e) { btn.textContent = '✕'; }
  setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 1200);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeDump();
  }
});

(async () => {
  await WuboGrist.initGrist();
  // Onboarding si pas encore d'user, puis pose le bouton profil
  if (window.WuboUI) {
    await WuboUI.ensureUser(document.getElementById('profile-slot'));
  }
  try { if (typeof grist !== 'undefined' && grist.onRecords) grist.onRecords(() => render()); } catch (_) {}
  window.addEventListener('wubo-data-fresh', () => render());
  dumpBinding = WuboGrist.bindDumpTextarea(
    document.getElementById('dump-content'),
    document.getElementById('dump-contexte')
  );
  if (window.ModalSwipe) {
    ModalSwipe.enable('dump-modal', closeDump);
  }
  render();
  setInterval(render, 120000);
})();
</script>
