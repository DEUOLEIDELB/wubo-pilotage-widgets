<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Semaine">
<meta name="theme-color" content="#F4F4F1">
<link rel="apple-touch-icon" href="../../apple-touch-icon.png">
<link rel="shortcut icon" href="favicon.ico">
<link rel="icon" type="image/svg+xml" href="../../icon.svg">
<link rel="manifest" href="../../manifest.webmanifest">
<title>Semaine - Pilotage Wubo</title>
<link rel="stylesheet" href="../../lib/styles.css">
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script src="../../lib/dom.js"></script>
<script src="../../lib/grist-api.js"></script>
<script src="../../lib/modal-swipe.js"></script>
<script src="../../lib/wubo-ui.js"></script>
<style>
  #app {
    max-width: 720px;
    margin: 0 auto;
    padding: 6px 10px calc(116px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  /* Sprint-header + view-toggle regroupés en un sticky block en haut */
  .semaine-sticky-block {
    position: sticky;
    top: calc(env(safe-area-inset-top) + 4px);
    z-index: 25;
    background: var(--bg);
    padding-top: 4px;
    margin-top: -4px;
    box-shadow:
      0 10px 0 var(--bg),
      0 calc(-1 * env(safe-area-inset-top) - 12px) 0 var(--bg),
      0 12px 6px -4px rgba(0, 0, 0, 0.04);
  }
  .sprint-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    padding: 2px 4px 6px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .sprint-header .title-block { flex: 1; min-width: 0; }
  .sprint-header h1 { font-size: 16px; line-height: 1.1; }
  .sprint-header .sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .sprint-nav { display: flex; gap: 4px; flex-shrink: 0; }
  .sprint-nav button.nav-chev {
    width: 34px; height: 34px; padding: 0;
    font-size: 16px; line-height: 1;
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border-strong); border-radius: 6px;
  }
  .sprint-nav button.nav-chev:active { opacity: 0.6; }
  .sprint-nav button.nav-today {
    padding: 0 10px; height: 34px;
    font-size: 12px;
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border-strong); border-radius: 6px;
  }

  /* Toggle Liste / Agenda */
  .view-toggle {
    display: flex;
    gap: 2px;
    background: var(--done-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px;
    margin: 0 0 8px;
  }
  .view-toggle button {
    flex: 1;
    padding: 7px;
    font-size: 11px;
    font-weight: 600;
    background: transparent;
    color: var(--text-dim);
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  .view-toggle button.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }

  /* Containers swipables : will-change pour perf animation.
     min-height couvre tout l'espace visible pour que le swipe fonctionne
     même quand aucun contenu ne pousse le conteneur en bas de l'écran. */
  #liste-view, #agenda-view {
    will-change: transform;
    touch-action: pan-y;
    min-height: calc(100vh - var(--sub-sticky-top) - 160px);
  }

  /* Vue agenda : calendrier mensuel compact multi-semaines */
  .agenda-wrap {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .agenda-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    padding: 0 2px;
  }
  .agenda-weekdays span {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    text-align: center;
    padding: 2px 0;
  }
  .agenda-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .agenda-day {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    aspect-ratio: 1 / 1.1;
    padding: 4px 4px 3px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
    overflow: hidden;
    min-height: 0;
  }
  .agenda-day:active { opacity: 0.7; }
  .agenda-day.other-month { background: var(--bg); opacity: 0.55; }
  .agenda-day.today { border: 2px solid var(--current); padding: 3px; }
  .agenda-day.weekend { background: var(--bg); }
  .agenda-day-num {
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .agenda-day.today .agenda-day-num { color: var(--current); }
  .agenda-day-dots {
    display: flex;
    gap: 3px;
    justify-content: center;
    align-items: center;
    margin-top: auto;
    height: 8px;
  }
  .agenda-dot {
    flex: 0 0 6px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border-strong);
    display: inline-block;
    box-sizing: border-box;
  }
  .agenda-dot.done { background: var(--success); }
  .agenda-dot.wip { background: var(--accent-strong); }
  .agenda-dot.skip { background: var(--text-faint); opacity: 0.5; }
  .agenda-dot.current { background: var(--current); }
  /* Case sans bloc : trait horizontal discret plutôt que cercle "creux" */
  .agenda-dot.empty {
    background: var(--border);
    border-radius: 1px;
    width: 5px;
    height: 2px;
    flex: 0 0 5px;
  }
  .agenda-day-extra {
    font-size: 8px;
    color: var(--text-faint);
    line-height: 1;
    margin-top: 1px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .agenda-day.has-ext::after {
    content: "⏰";
    position: absolute;
    font-size: 8px;
    color: var(--danger);
    line-height: 1;
    top: 2px;
    right: 3px;
  }
  .agenda-day { position: relative; }
  .agenda-month-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 700;
    padding: 6px 2px 2px;
    border-top: 1px dashed var(--border);
  }
  .agenda-month-label:first-child { border-top: none; padding-top: 0; }

  /* ============ GRID DESKTOP ============ */
  .grid-week {
    display: grid;
    grid-template-columns: 32px repeat(var(--days, 4), 1fr);
    gap: 3px;
    touch-action: pan-y;
  }
  .col-head {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    padding: 3px 2px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .col-head.today { color: var(--current); }
  .col-head .d-num { font-size: 14px; color: var(--text); display: block; margin-top: 1px; }
  .col-head.today .d-num { color: var(--current); }

  .row-head {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px 0;
  }

  .cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 4px 12px 4px 4px;
    min-height: 64px;
    font-size: 9px;
    line-height: 1.2;
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
  }
  .cell:active { opacity: 0.7; }
  .cell.empty { background: var(--bg); border-style: dashed; cursor: default; }
  .cell.done { background: #EAF4EE; }
  .cell.current { background: var(--current-soft); border-color: var(--current); border-left: 3px solid var(--current); }
  .cell.skip { background: var(--done-bg); }
  .cell.wip { background: #FFFCE5; }

  .cell .status-dot { width: 6px; height: 6px; border-radius: 50%; position: absolute; top: 4px; right: 4px; }
  .status-dot.done { background: var(--success); }
  .status-dot.current { background: var(--current); }
  .status-dot.skip { background: var(--text-faint); }
  .status-dot.wip { background: var(--accent-strong); }
  .status-dot.planned { background: var(--border-strong); }

  .cell .task-main {
    font-size: 9px;
    line-height: 1.2;
    color: var(--text);
    white-space: normal;
    word-break: break-word;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    max-height: 36px;
  }
  .cell .task-extra {
    font-size: 8px;
    color: var(--text-faint);
    margin-top: 1px;
  }
  .cell.done .task-main, .cell.skip .task-main { color: var(--text-faint); text-decoration: line-through; }
  .cell .libre { font-size: 8px; color: var(--text-faint); font-style: italic; }
  .cell .note-dot { position: absolute; bottom: 3px; right: 4px; font-size: 9px; color: var(--warning); line-height: 1; }
  .cell .ext-dot { position: absolute; bottom: 3px; left: 4px; font-size: 8px; color: var(--danger); line-height: 1; }

  /* ============ LIST MOBILE ============ */
  .list-days {
    display: none;
    flex-direction: column;
    gap: 10px;
    touch-action: pan-y;
  }
  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .day-card.today {
    border-color: var(--current);
    border-left: 3px solid var(--current);
  }
  .day-card .day-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .day-card.today .day-head { background: var(--current-soft); }
  .day-card .day-head .day-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
  }
  .day-card.today .day-head .day-label { color: var(--current); }
  .day-card .day-head .day-stats {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .day-card .slots {
    display: flex;
    flex-direction: column;
  }
  .slot {
    position: relative;
    display: grid;
    grid-template-columns: 54px 1fr 14px;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    min-height: 60px;
    border-top: 1px solid var(--border);
    cursor: pointer;
  }
  .slot:first-child { border-top: none; }
  .slot:active { opacity: 0.7; }
  .slot.empty { background: var(--bg); cursor: pointer; }
  .slot.empty:active { background: var(--done-bg); }
  .slot.empty .slot-plan {
    font-size: 11px;
    color: var(--current);
    font-weight: 600;
  }
  .slot.done { background: #EAF4EE; }
  .slot.current { background: var(--current-soft); border-left: 3px solid var(--current); padding-left: 7px; }
  .slot.skip { background: var(--done-bg); }
  .slot.wip { background: #FFFCE5; }
  .slot .slot-tranche {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
  }
  .slot.current .slot-tranche { color: var(--current); }
  .slot .slot-body {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .slot .slot-title {
    font-size: 13px;
    line-height: 1.25;
    color: var(--text);
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    word-break: break-word;
  }
  .slot.done .slot-title, .slot.skip .slot-title {
    color: var(--text-faint);
    text-decoration: line-through;
  }
  .slot .slot-extra {
    font-size: 10px;
    color: var(--text-faint);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }
  .slot .slot-libre {
    font-size: 11px;
    color: var(--text-faint);
    font-style: italic;
  }
  .slot .slot-empty-label {
    font-size: 11px;
    color: var(--text-faint);
  }
  .slot .slot-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    justify-self: center;
  }
  .slot-dot.done { background: var(--success); }
  .slot-dot.current { background: var(--current); }
  .slot-dot.skip { background: var(--text-faint); }
  .slot-dot.wip { background: var(--accent-strong); }
  .slot-dot.planned { background: var(--border-strong); }
  .slot .slot-note {
    color: var(--warning);
    font-size: 11px;
    line-height: 1;
  }
  .slot .slot-ext-badge {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    font-size: 9px;
    font-weight: 700;
    color: var(--danger);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .empty-window {
    grid-column: 2 / -1;
    padding: 14px 10px;
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    border: 1px dashed var(--border-strong);
    border-radius: 6px;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .empty-window-mobile {
    padding: 24px 14px;
    text-align: center;
    font-size: 13px;
    color: var(--text-dim);
    border: 1px dashed var(--border-strong);
    border-radius: 6px;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .legend {
    display: flex;
    gap: 8px;
    font-size: 10px;
    color: var(--text-dim);
    padding: 4px 4px 0;
    flex-wrap: wrap;
    align-items: center;
  }
  .legend .lg { display: flex; align-items: center; gap: 3px; }
  .legend .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .legend .dash { display: inline-block; width: 10px; height: 0; border-top: 1px dashed var(--border-strong); }
  .legend .note-ico { color: var(--warning); font-size: 10px; line-height: 1; }
  .legend .libre-ico { font-style: italic; font-size: 9px; color: var(--text-faint); }
  .legend .ext-ico { color: var(--danger); font-weight: 700; }

  #error { background: var(--danger); color: white; padding: 10px; border-radius: 6px; font-size: 12px; display: none; }
  #error button { margin-top: 6px; background: white; color: var(--danger); border: 1px solid white; }

  /* Badge deadline externe */
  .ext-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 7px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    background: #FCE8E6;
    color: var(--danger);
    border: 1px solid var(--danger);
  }

  /* Flash animation sur cellule venant d'etre modifiee */
  @keyframes justUpdatedFlash {
    0%   { box-shadow: 0 0 0 0 var(--current); background-color: var(--current-soft); }
    50%  { box-shadow: 0 0 0 3px var(--accent); }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .just-updated {
    animation: justUpdatedFlash 1.2s ease-out;
  }

  /* Modal */
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: flex-end; justify-content: center; z-index: 100; }
  .modal.hidden { display: none; }
  .modal-content {
    background: var(--surface); width: 100%; max-width: 480px; border-radius: 12px 12px 0 0;
    padding: 16px; padding-bottom: calc(16px + env(safe-area-inset-bottom));
    display: flex; flex-direction: column; gap: 10px;
    max-height: 92vh; overflow-y: auto;
  }
  .modal-head { display: flex; justify-content: space-between; align-items: center; }
  .modal-content textarea { min-height: 100px; font-size: 14px; }
  .modal-content .field { display: flex; flex-direction: column; gap: 4px; }
  .modal-content .field label { font-size: 10px; }
  .task-list-mini { display: flex; flex-direction: column; gap: 4px; }
  .task-list-mini .task-row, .task-list-mini .subtask {
    padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px;
    font-size: 12px; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }
  .task-list-mini .task-row:active, .task-list-mini .subtask:active { opacity: 0.7; }

  /* ============ MEDIA QUERIES ============ */
  @media (max-width: 599px) {
    .grid-week { display: none; }
    .list-days { display: flex; }
  }
  @media (min-width: 600px) {
    .grid-week { display: grid; }
    .list-days { display: none; }
    .cell { font-size: 10px; min-height: 72px; }
    .cell .task-main { font-size: 10px; max-height: 40px; }
  }
</style>
</head>
<body>

<main id="app">
  <div class="semaine-sticky-block">
    <div class="sprint-header">
      <div class="title-block">
        <h1 id="title">Sprint</h1>
        <div class="sub" id="sub"></div>
      </div>
      <div class="sprint-nav">
        <button type="button" class="nav-chev" onclick="shiftWindow(-1)" aria-label="Période précédente" title="Période précédente">‹</button>
        <button type="button" class="nav-today" onclick="resetWindow()" title="Revenir à aujourd'hui">Aujourd'hui</button>
        <button type="button" class="nav-chev" onclick="shiftWindow(1)" aria-label="Période suivante" title="Période suivante">›</button>
      </div>
      <div id="profile-slot" class="profile-wrap" style="margin-left:6px"></div>
    </div>

    <div class="view-toggle" id="view-toggle">
      <button id="btn-liste" class="active" onclick="setView('liste')">Liste</button>
      <button id="btn-agenda" onclick="setView('agenda')">Agenda (4 semaines)</button>
    </div>
  </div>

  <div id="error"></div>

  <!-- Vue Liste : desktop grid 4x3 + mobile liste verticale -->
  <div id="liste-view">
    <div class="grid-week" id="grid"></div>
    <div class="list-days" id="list"></div>
  </div>

  <!-- Vue Agenda : grille calendrier 4 semaines -->
  <div id="agenda-view" class="agenda-wrap" style="display:none"></div>

  <div class="legend">
    <span class="lg"><span class="dot" style="background:#188038"></span>Fait</span>
    <span class="lg"><span class="dot" style="background:#5914D0"></span>Courant</span>
    <span class="lg"><span class="dot" style="background:#F0CC00"></span>En cours</span>
    <span class="lg"><span class="dot" style="background:#C8C8C3"></span>Planifié</span>
    <span class="lg"><span class="dot" style="background:#9A9A95"></span>Zappé</span>
    <span class="lg"><span class="note-ico">●</span>Note</span>
    <span class="lg"><span class="ext-ico">⏰</span>Deadline externe</span>
    <span class="lg"><span class="libre-ico">Libre</span> sans tâche</span>
    <span class="lg"><span class="dash"></span>pas de bloc</span>
  </div>
</main>

<nav class="bottom-nav">
  <div class="nav-tabs">
    <a href="../aujourdhui/" class="tab">Jour</a>
    <a href="../semaine/" class="tab active">Semaine</a>
    <a href="../dashboard/" class="tab">Objectifs</a>
    <a href="../deadlines/" class="tab">Échéances</a>
  </div>
  <div class="nav-actions">
    <button class="accent nav-dump" onclick="openDump()">+ Dump</button>
    <button class="ghost nav-refresh" onclick="refresh()" title="Rafraîchir">↻</button>
  </div>
</nav>

<!-- Créer un bloc : date + tranche -->
<div id="create-bloc-modal" class="modal hidden" onclick="backdropClose(event, 'create-bloc-modal')">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h3>Planifier un bloc</h3>
      <button class="ghost small" onclick="closeCreateBlocModal()">Annuler</button>
    </div>
    <div class="field"><label>Date</label><input id="create-bloc-date" type="date"></div>
    <div class="field"><label>Tranche</label>
      <select id="create-bloc-tranche">
        <option value="Matin">Matin (8-12h)</option>
        <option value="Aprem">Aprem (13-17h)</option>
        <option value="Soir">Soir (18-22h)</option>
      </select>
    </div>
    <div class="field"><label>Propriétaire</label>
      <select id="create-bloc-proprio">
        <option value="Taki" selected>Taki</option>
        <option value="Numa">Numa</option>
        <option value="Lyes">Lyes</option>
      </select>
    </div>
    <div style="font-size:11px;color:var(--text-dim);font-style:italic">Le bloc sera créé en "Planifié". Tu pourras y ajouter des tâches après.</div>
    <div class="sticky-save">
      <button class="ghost small" onclick="closeCreateBlocModal()">Annuler</button>
      <button class="primary" onclick="submitCreateBloc()">Créer le bloc</button>
    </div>
  </div>
</div>

<!-- Bloc detail modal -->
<div id="bloc-modal" class="modal hidden" onclick="backdropClose(event, 'bloc-modal')">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h3 id="bloc-modal-title">Bloc</h3>
      <button class="ghost small" onclick="closeBloc()">Fermer</button>
    </div>
    <div id="bloc-modal-meta" class="meta-info" style="font-size:11px;color:var(--text-dim)"></div>

<script>
const { $el, $clear } = Dom;
const TRANCHES = ['Matin', 'Aprem', 'Soir'];
const DAY_NAMES = ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];
const MONTHS = ['janv.', 'févr.', 'mars', 'avr.', 'mai', 'juin', 'juil.', 'août', 'sept.', 'oct.', 'nov.', 'déc.'];
let allBlocs = [], tachesById = {}, currentBlocId = null;
let currentTaskEditId = null, currentTaskNewBlocId = null, currentTaskParent = null;
let currentTaskOriginalDate = null, currentPushCount = 0;
let pendingFlashBlocId = null; // id du bloc a flasher au prochain render

// Fenêtre glissante (utilisée par la vue Liste)
let dayOffset = 0;      // offset en jours depuis today
let windowSize = 4;     // taille de la fenêtre (4 mobile, 7 desktop large)

// Vue courante ('liste' ou 'agenda') + fenêtre agenda en nombre de semaines depuis today
let currentView = (() => {
  try { return localStorage.getItem('wubo_semaine_view') || 'liste'; } catch (_) { return 'liste'; }
})();
let agendaWeekOffset = 0; // 0 = semaine courante, +1 = semaine prochaine...
const AGENDA_WEEKS = 4;

function computeWindowSize() {
  return window.innerWidth >= 900 ? 7 : 4;
}

function statutClass(s) {
  if (!s) return 'todo';
  const k = s.toLowerCase();
  if (k.includes('fait')) return 'done';
  if (k.includes('en cours')) return 'wip';
  if (k.includes('bloqu')) return 'blocked';
  if (k.includes('abandon')) return 'abandoned';
  return 'todo';
}
function unixToInputDate(ts) {
  if (!ts) return '';
  const d = new Date(ts * 1000);
  return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
}
function inputDateToUnix(s) {
  if (!s) return null;
  const [y, m, d] = s.split('-').map(Number);
  return Math.floor(Date.UTC(y, m-1, d) / 1000);
}
function openModal(id) {
  document.getElementById(id).classList.remove('hidden');
  WuboGrist.lockBody();
}
function closeModal(id) {
  document.getElementById(id).classList.add('hidden');
  WuboGrist.unlockBody();
}

function isoFromDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function addDaysISO(iso, n) {
  const [y, m, d] = iso.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  dt.setDate(dt.getDate() + n);
  return isoFromDate(dt);
}

function weekNumberISO(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

function windowDaysISO() {
  const todayISO = WuboGrist.todayISO();
  const start = addDaysISO(todayISO, dayOffset);
  const days = [];
  for (let i = 0; i < windowSize; i++) days.push(addDaysISO(start, i));
  return days;
}

function blocsByDayISO(blocs) {
  const byDay = {};
  blocs.forEach(b => {
    const iso = WuboGrist.gristDateToISO(b.date);
    if (!iso) return;
    if (!byDay[iso]) byDay[iso] = {};
    byDay[iso][b.tranche] = b;
  });
  return byDay;
}

function showError(msg) {
  const e = document.getElementById('error');
  $clear(e);
  e.appendChild($el('div', {}, msg));
  if (!WuboGrist.inGristIframe()) {
    e.appendChild($el('button', { class: 'small', onclick: () => { WuboGrist.resetApiKey(); location.reload(); } }, 'Changer de clé API'));
  }
  e.style.display = 'block';
}

function cellClass(bloc) {
  if (!bloc) return 'cell empty';
  const s = (bloc.statut || '').toLowerCase();
  if (s.includes('fait')) return 'cell done';
  if (s.includes('en cours')) return 'cell wip';
  if (s.includes('zapp')) return 'cell skip';
  return 'cell';
}
function slotClass(bloc) {
  if (!bloc) return 'slot empty';
  const s = (bloc.statut || '').toLowerCase();
  if (s.includes('fait')) return 'slot done';
  if (s.includes('en cours')) return 'slot wip';
  if (s.includes('zapp')) return 'slot skip';
  return 'slot';
}
function dotClass(bloc, isCurrent) {
  if (isCurrent) return 'status-dot current';
  if (!bloc) return '';
  const s = (bloc.statut || '').toLowerCase();
  if (s.includes('fait')) return 'status-dot done';
  if (s.includes('en cours')) return 'status-dot wip';
  if (s.includes('zapp')) return 'status-dot skip';
  return 'status-dot planned';
}
function slotDotClass(bloc, isCurrent) {
  if (isCurrent) return 'slot-dot current';
  if (!bloc) return 'slot-dot';
  const s = (bloc.statut || '').toLowerCase();
  if (s.includes('fait')) return 'slot-dot done';
  if (s.includes('en cours')) return 'slot-dot wip';
  if (s.includes('zapp')) return 'slot-dot skip';
  return 'slot-dot planned';
}

function blocHasExtDeadline(bloc) {
  if (!bloc) return false;
  const tIds = WuboGrist.refListIds(bloc.taches_liees);
  return tIds.some(id => tachesById[id] && tachesById[id].est_deadline_externe);
}

function isBlocCurrent(bloc, isToday, tranche) {
  const h = new Date().getHours();
  const curT = h >= 8 && h < 13 ? 'Matin' : h >= 13 && h < 18 ? 'Aprem' : h >= 18 && h < 22 ? 'Soir' : null;
  const blocStatut = (bloc && bloc.statut || '').toLowerCase();
  return isToday && curT === tranche && bloc && !blocStatut.includes('fait') && !blocStatut.includes('zapp');
}

function renderCell(bloc, isToday, tranche, iso) {
  const isCurrent = isBlocCurrent(bloc, isToday, tranche);
  let cls = cellClass(bloc);
  if (isCurrent) cls = 'cell current';
  if (bloc && pendingFlashBlocId === bloc.id) cls += ' just-updated';

  const cell = $el('div', { class: cls });
  if (bloc) cell.onclick = () => openBloc(bloc.id);
  else if (iso) {
    cell.style.cursor = 'pointer';
    cell.onclick = () => createBlocAt(iso, tranche);
  }
  cell.appendChild($el('span', { class: dotClass(bloc, isCurrent) }));

  if (!bloc) {
    cell.appendChild($el('div', { style: { fontSize: '8px', color: 'var(--current)', textAlign: 'center' } }, '+'));
    return cell;
  }

  const tIds = WuboGrist.refListIds(bloc.taches_liees);
  const titles = tIds.map(id => (tachesById[id] && tachesById[id].titre) || '').filter(Boolean);
  if (titles.length === 0) {
    cell.appendChild($el('div', { class: 'libre' }, 'Libre'));
  } else {
    cell.appendChild($el('div', { class: 'task-main', title: titles.join(' · ') }, titles[0]));
    if (titles.length > 1) {
      cell.appendChild($el('div', { class: 'task-extra' }, `+${titles.length - 1}`));
    }
  }

  if (bloc.note_fin_bloc) cell.appendChild($el('span', { class: 'note-dot', title: bloc.note_fin_bloc }, '●'));
  if (blocHasExtDeadline(bloc)) cell.appendChild($el('span', { class: 'ext-dot', title: 'Deadline externe' }, '⏰'));
  return cell;
}

function renderSlot(bloc, isToday, tranche, iso) {
  const isCurrent = isBlocCurrent(bloc, isToday, tranche);
  let cls = slotClass(bloc);
  if (isCurrent) cls = 'slot current';
  if (bloc && pendingFlashBlocId === bloc.id) cls += ' just-updated';

  const slot = $el('div', { class: cls });
  if (bloc) slot.onclick = () => openBloc(bloc.id);
  else if (iso) slot.onclick = () => createBlocAt(iso, tranche);

  slot.appendChild($el('div', { class: 'slot-tranche' }, tranche));

  const body = $el('div', { class: 'slot-body' });
  if (!bloc) {
    body.appendChild($el('div', { class: 'slot-plan' }, '+ Planifier ce bloc'));
    slot.appendChild(body);
    slot.appendChild($el('span', {}));
    return slot;
  }

  const tIds = WuboGrist.refListIds(bloc.taches_liees);
  const titles = tIds.map(id => (tachesById[id] && tachesById[id].titre) || '').filter(Boolean);
  if (titles.length === 0) {
    body.appendChild($el('div', { class: 'slot-libre' }, 'Libre'));
  } else {
    body.appendChild($el('div', { class: 'slot-title', title: titles.join(' · ') }, titles[0]));
    const extraBits = [];
    if (titles.length > 1) extraBits.push(`+${titles.length - 1}`);
    const extra = $el('div', { class: 'slot-extra' });
    if (extraBits.length) extra.appendChild($el('span', {}, extraBits.join(' · ')));
    if (bloc.note_fin_bloc) {
      extra.appendChild($el('span', { class: 'slot-note', title: bloc.note_fin_bloc }, '● note'));
    }
    if (blocHasExtDeadline(bloc)) {
      extra.appendChild($el('span', { class: 'slot-ext-badge' }, '⏰ deadline'));
    }
    if (extra.children.length) body.appendChild(extra);
  }
  slot.appendChild(body);
  slot.appendChild($el('span', { class: slotDotClass(bloc, isCurrent) }));
  return slot;
}

function formatRange(firstISO, lastISO) {
  const [y1, m1, d1] = firstISO.split('-').map(Number);
  const [y2, m2, d2] = lastISO.split('-').map(Number);
  const first = new Date(y1, m1-1, d1);
  const last = new Date(y2, m2-1, d2);
  const sameMonth = first.getMonth() === last.getMonth() && first.getFullYear() === last.getFullYear();
  if (sameMonth) return `${first.getDate()} au ${last.getDate()} ${MONTHS[last.getMonth()]}`;
  return `${first.getDate()} ${MONTHS[first.getMonth()]} au ${last.getDate()} ${MONTHS[last.getMonth()]}`;
}

function computeTitle(daysISO) {
  const todayISO = WuboGrist.todayISO();
  const firstISO = daysISO[0];
  const lastISO = daysISO[daysISO.length - 1];
  const midIdx = Math.floor(daysISO.length / 2);
  const [ym, mm, dm] = daysISO[midIdx].split('-').map(Number);
  const mid = new Date(ym, mm-1, dm);
  const wk = weekNumberISO(mid);

  let label;
  if (daysISO.includes(todayISO)) {
    label = `Sprint S${wk} (en cours)`;
  } else if (lastISO < todayISO) {
    label = `Semaine S${wk} (passée)`;
  } else {
    label = `Sprint S${wk} (à venir)`;
  }
  return { label, range: formatRange(firstISO, lastISO) };
}

function renderEmptyWindow(grid, daysISO) {
  grid.appendChild($el('div', {}));
  daysISO.forEach(iso => {
    const [y, m, d] = iso.split('-').map(Number);
    const dd = new Date(y, m-1, d);
    const todayISO = WuboGrist.todayISO();
    grid.appendChild($el('div', { class: 'col-head' + (iso === todayISO ? ' today' : '') },
      DAY_NAMES[dd.getDay()], $el('span', { class: 'd-num' }, String(dd.getDate()))));
  });
  const empty = $el('div', { class: 'empty-window' },
    $el('div', {}, 'Aucun bloc planifié pour cette période.'),
    $el('div', { style: { display: 'flex', gap: '6px', flexWrap: 'wrap', justifyContent: 'center' } },
      $el('button', { class: 'primary small', onclick: () => openCreateBlocModal(daysISO[0]) }, '+ Planifier un bloc'),
      $el('button', { class: 'ghost small', onclick: () => resetWindow() }, 'Aujourd\'hui')
    )
  );
  grid.appendChild(empty);
}

function renderEmptyWindowList(list, daysISO) {
  const empty = $el('div', { class: 'empty-window-mobile' },
    $el('div', {}, 'Aucun bloc planifié pour cette période.'),
    $el('div', { style: { display: 'flex', gap: '6px', flexWrap: 'wrap', justifyContent: 'center' } },
      $el('button', { class: 'primary small', onclick: () => openCreateBlocModal(daysISO && daysISO[0]) }, '+ Planifier un bloc'),
      $el('button', { class: 'ghost small', onclick: () => resetWindow() }, 'Aujourd\'hui')
    )
  );
  list.appendChild(empty);
}

function renderGrid(daysISO, byDay, todayISO) {
  const grid = document.getElementById('grid');
  $clear(grid);
  grid.style.setProperty('--days', daysISO.length);

  let countInWindow = 0;
  daysISO.forEach(iso => { if (byDay[iso]) countInWindow += Object.keys(byDay[iso]).length; });
  if (countInWindow === 0) {
    renderEmptyWindow(grid, daysISO);
    return;
  }

  grid.appendChild($el('div', {}));
  daysISO.forEach(iso => {
    const [y, m, d] = iso.split('-').map(Number);
    const dd = new Date(y, m-1, d);
    grid.appendChild($el('div', { class: 'col-head' + (iso === todayISO ? ' today' : '') },
      DAY_NAMES[dd.getDay()], $el('span', { class: 'd-num' }, String(dd.getDate()))));
  });

  TRANCHES.forEach(tranche => {
    grid.appendChild($el('div', { class: 'row-head' }, tranche));
    daysISO.forEach(iso => {
      const blocsOfDay = byDay[iso] || {};
      grid.appendChild(renderCell(blocsOfDay[tranche], iso === todayISO, tranche, iso));
    });
  });
}

function renderList(daysISO, byDay, todayISO) {
  const list = document.getElementById('list');
  $clear(list);

  let countInWindow = 0;
  daysISO.forEach(iso => { if (byDay[iso]) countInWindow += Object.keys(byDay[iso]).length; });
  if (countInWindow === 0) {
    renderEmptyWindowList(list, daysISO);
    return;
  }

  daysISO.forEach(iso => {
    const [y, m, d] = iso.split('-').map(Number);
    const dd = new Date(y, m-1, d);
    const isToday = iso === todayISO;
    const blocsOfDay = byDay[iso] || {};

    // Compte blocs faits / total du jour
    let dayFait = 0, dayTotal = 0;
    Object.values(blocsOfDay).forEach(b => {
      dayTotal++;
      if ((b.statut || '').toLowerCase().includes('fait')) dayFait++;
    });

    const dayCard = $el('div', { class: 'day-card' + (isToday ? ' today' : '') });
    const label = `${DAY_NAMES[dd.getDay()]} ${dd.getDate()} ${MONTHS[dd.getMonth()]}${isToday ? ' · aujourd\'hui' : ''}`;
    const stats = dayTotal > 0 ? `${dayFait}/${dayTotal} faits` : 'aucun bloc';
    const head = $el('div', { class: 'day-head' },
      $el('div', { class: 'day-label' }, label),
      $el('div', { class: 'day-stats' }, stats)
    );
    dayCard.appendChild(head);

    const slots = $el('div', { class: 'slots' });
    TRANCHES.forEach(tranche => {
      slots.appendChild(renderSlot(blocsOfDay[tranche], isToday, tranche, iso));
    });
    dayCard.appendChild(slots);
    list.appendChild(dayCard);
  });
}

async function render() {
  document.getElementById('error').style.display = 'none';
  windowSize = computeWindowSize();

  allBlocs = []; tachesById = {};
  try {
    const [bRaw, tRaw] = await Promise.all([WuboGrist.fetchRows('Blocs_temps'), WuboGrist.fetchRows('Taches')]);
    allBlocs = WuboGrist.filterByOwner(bRaw);
    const t = WuboGrist.filterByOwner(tRaw);
    t.forEach(x => { tachesById[x.id] = x; });
  } catch (e) {
    showError(e.message);
    document.getElementById('sub').textContent = 'Hors ligne';
    return;
  }

  const todayISO = WuboGrist.todayISO();
  const byDay = blocsByDayISO(allBlocs);

  if (currentView === 'agenda') {
    const daysISO = agendaDaysISO();
    // Titre : "Du X au Y" + compteur
    const firstISO = daysISO[0];
    const lastISO = daysISO[daysISO.length - 1];
    const midIdx = Math.floor(daysISO.length / 2);
    const [ym, mm, dm] = daysISO[midIdx].split('-').map(Number);
    const midDate = new Date(ym, mm - 1, dm);
    const wk = weekNumberISO(midDate);
    document.getElementById('title').textContent = `Agenda · S${wk}`;
    // Stats sur la fenêtre agenda
    let fait = 0, total = 0;
    daysISO.forEach(iso => {
      if (!byDay[iso]) return;
      Object.values(byDay[iso]).forEach(bloc => {
        total++;
        if ((bloc.statut || '').toLowerCase().includes('fait')) fait++;
      });
    });
    const range = formatRange(firstISO, lastISO);
    document.getElementById('sub').textContent = total === 0
      ? `${range} · aucun bloc`
      : `${range} · ${fait}/${total} blocs faits`;
    renderAgenda(byDay, todayISO);
  } else {
    const daysISO = windowDaysISO();
    const { label, range } = computeTitle(daysISO);
    document.getElementById('title').textContent = label;

    let fait = 0, total = 0;
    daysISO.forEach(iso => {
      if (!byDay[iso]) return;
      Object.values(byDay[iso]).forEach(bloc => {
        total++;
        if ((bloc.statut || '').toLowerCase().includes('fait')) fait++;
      });
    });
    document.getElementById('sub').textContent = total === 0
      ? `${range} · aucun bloc`
      : `${range} · ${fait}/${total} blocs faits`;
    renderGrid(daysISO, byDay, todayISO);
    renderList(daysISO, byDay, todayISO);
  }

  if (pendingFlashBlocId) {
    setTimeout(() => { pendingFlashBlocId = null; }, 1400);
  }
}

function shiftWindow(direction) {
  if (currentView === 'agenda') {
    agendaWeekOffset += direction * AGENDA_WEEKS;
  } else {
    dayOffset += direction * windowSize;
  }
  render();
}

function resetWindow() {
  dayOffset = 0;
  agendaWeekOffset = 0;
  render();
}

function setView(v) {
  if (v !== 'liste' && v !== 'agenda') return;
  currentView = v;
  try { localStorage.setItem('wubo_semaine_view', v); } catch (_) {}
  document.getElementById('btn-liste').classList.toggle('active', v === 'liste');
  document.getElementById('btn-agenda').classList.toggle('active', v === 'agenda');
  document.getElementById('liste-view').style.display = (v === 'liste') ? '' : 'none';
  document.getElementById('agenda-view').style.display = (v === 'agenda') ? 'flex' : 'none';
  render();
}

// Début (lundi) de la semaine ISO contenant une date donnée
function mondayOfISOWeek(d) {
  const copy = new Date(d);
  copy.setHours(0, 0, 0, 0);
  const dow = (copy.getDay() + 6) % 7; // lundi = 0
  copy.setDate(copy.getDate() - dow);
  return copy;
}

// Calcule les jours de la vue agenda : AGENDA_WEEKS semaines à partir du lundi offset
function agendaDaysISO() {
  const today = new Date();
  const monday = mondayOfISOWeek(today);
  monday.setDate(monday.getDate() + agendaWeekOffset * 7);
  const days = [];
  for (let i = 0; i < AGENDA_WEEKS * 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    days.push(isoFromDate(d));
  }
  return days;
}

function renderAgenda(byDay, todayISO) {
  const node = document.getElementById('agenda-view');
  $clear(node);
  const daysISO = agendaDaysISO();

  // En-tête Lun-Dim
  const head = $el('div', { class: 'agenda-weekdays' });
  ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'].forEach(lbl => {
    head.appendChild($el('span', {}, lbl));
  });
  node.appendChild(head);

  // Mois de la première semaine pour détecter "other-month"
  const firstDate = new Date(daysISO[0]);
  const refMonth = firstDate.getMonth();

  // Optionnel : étiquette du mois courant de chaque semaine
  const grid = $el('div', { class: 'agenda-grid' });
  daysISO.forEach(iso => {
    const [y, m, d] = iso.split('-').map(Number);
    const dd = new Date(y, m-1, d);
    const isToday = iso === todayISO;
    const dow = (dd.getDay() + 6) % 7;
    const isWeekend = dow >= 5;
    const blocs = byDay[iso] || {};

    const cls = ['agenda-day'];
    if (isToday) cls.push('today');
    if (dd.getMonth() !== refMonth) cls.push('other-month');
    if (isWeekend) cls.push('weekend');

    // ⏰ si au moins une tâche du jour a est_deadline_externe
    let hasExt = false;
    ['Matin', 'Aprem', 'Soir'].forEach(tr => {
      const b = blocs[tr];
      if (!b) return;
      const tIds = WuboGrist.refListIds(b.taches_liees);
      tIds.forEach(id => {
        if (tachesById[id] && tachesById[id].est_deadline_externe) hasExt = true;
      });
    });
    if (hasExt) cls.push('has-ext');

    const cell = $el('div', {
      class: cls.join(' '),
      onclick: () => onAgendaDayClick(iso)
    });
    cell.appendChild($el('div', { class: 'agenda-day-num' }, String(dd.getDate())));

    const dots = $el('div', { class: 'agenda-day-dots' });
    ['Matin', 'Aprem', 'Soir'].forEach(tr => {
      const b = blocs[tr];
      const isCurrent = isBlocCurrent(b, isToday, tr);
      let dotCls = 'agenda-dot empty';
      if (b) {
        const s = (b.statut || '').toLowerCase();
        if (isCurrent) dotCls = 'agenda-dot current';
        else if (s.includes('fait')) dotCls = 'agenda-dot done';
        else if (s.includes('en cours')) dotCls = 'agenda-dot wip';
        else if (s.includes('zapp')) dotCls = 'agenda-dot skip';
        else dotCls = 'agenda-dot';
      }
      dots.appendChild($el('span', { class: dotCls, title: tr + (b ? ' · ' + (b.statut || '') : ' · pas de bloc') }));
    });
    cell.appendChild(dots);

    grid.appendChild(cell);
  });
  node.appendChild(grid);

  // Note de bas pour context
  node.appendChild($el('div', { style: 'font-size:10px;color:var(--text-faint);font-style:italic;padding:4px 2px;text-align:center' },
    '3 points/jour = Matin · Aprem · Soir. Tap un jour pour voir les détails.'));
}

function onAgendaDayClick(iso) {
  // Bascule vers la vue Liste centrée sur le jour cliqué
  const today = new Date();
  const target = new Date(iso);
  today.setHours(0,0,0,0); target.setHours(0,0,0,0);
  const diffDays = Math.round((target - today) / 86400000);
  dayOffset = diffDays;
  setView('liste');
}

// Swipe horizontal avec animation visuelle (Liste + Agenda).
// Drag-suit-doigt puis slide-out + slide-in lors du changement de période.
const SWIPE_TRIGGER = 70; // px minimum pour valider un slide
function setupSwipe() {
  // On swipe sur les 2 conteneurs principaux : liste-view (contient grid + list) et agenda-view
  const containers = [
    document.getElementById('liste-view'),
    document.getElementById('agenda-view')
  ].filter(Boolean);

  containers.forEach(container => {
    let startX = 0, startY = 0, dx = 0, dragging = false, captured = false;

    function onStart(e) {
      if (e.touches.length !== 1) { dragging = false; return; }
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      dx = 0;
      dragging = true;
      captured = false;
      container.style.transition = 'none';
    }
    function onMove(e) {
      if (!dragging) return;
      const cx = e.touches[0].clientX, cy = e.touches[0].clientY;
      const rdx = cx - startX, rdy = cy - startY;
      if (!captured) {
        if (Math.abs(rdx) < 10 && Math.abs(rdy) < 10) return;
        // Si le geste est plus vertical, on laisse le scroll natif
        if (Math.abs(rdy) > Math.abs(rdx)) { dragging = false; return; }
        captured = true;
      }
      dx = rdx;
      // Résistance légère au-delà d'un certain seuil pour feedback tactile
      const cappedDx = Math.sign(dx) * Math.min(Math.abs(dx), window.innerWidth * 0.9);
      container.style.transform = `translateX(${cappedDx}px)`;
      if (e.cancelable) e.preventDefault();
    }
    function onEnd() {
      if (!dragging) return;
      dragging = false;
      const absDx = Math.abs(dx);
      const direction = dx < 0 ? 1 : -1;
      container.style.transition = 'transform 0.22s ease-out';
      if (absDx > SWIPE_TRIGGER) {
        // 1) animate out dans la même direction
        container.style.transform = `translateX(${dx < 0 ? -100 : 100}%)`;
        // 2) après l'animation, shift + reset depuis l'autre côté puis slide back à 0
        setTimeout(() => {
          container.style.transition = 'none';
          container.style.transform = `translateX(${dx < 0 ? 100 : -100}%)`;
          shiftWindow(direction);
          // force reflow avant de démarrer la 2e anim
          void container.offsetWidth;
          requestAnimationFrame(() => {
            container.style.transition = 'transform 0.22s ease-out';
            container.style.transform = '';
          });
        }, 220);
      } else {
        container.style.transform = '';
      }
    }
    function onCancel() {
      dragging = false;
      container.style.transition = 'transform 0.2s ease-out';
      container.style.transform = '';
    }

    container.addEventListener('touchstart', onStart, { passive: true });
    container.addEventListener('touchmove', onMove, { passive: false });
    container.addEventListener('touchend', onEnd, { passive: true });
    container.addEventListener('touchcancel', onCancel, { passive: true });
  });
}

// Crée un bloc Planifie pour date/tranche donnés et ouvre immédiatement la modal édition
async function createBlocAt(iso, tranche) {
  if (!iso) { openCreateBlocModal(); return; }
  // Vérifie s'il existe déjà pour éviter doublon
  const existing = allBlocs.find(b => WuboGrist.gristDateToISO(b.date) === iso && b.tranche === tranche);
  if (existing) { openBloc(existing.id); return; }
  try {
    const dateUnix = WuboGrist.dateToISO ? null : null;
    // Convert iso (YYYY-MM-DD) → unix timestamp UTC minuit
    const [y, m, d] = iso.split('-').map(Number);
    const ts = Math.floor(Date.UTC(y, m-1, d) / 1000);
    const { id } = await WuboGrist.addRecord('Blocs_temps', {
      date: ts,
      tranche,
      statut: 'Planifie',
      proprietaire: (WuboGrist.getUser() || 'Taki')
    });
    WuboGrist.toast('Bloc créé. Ajoute des tâches.', 'success');
    pendingFlashBlocId = id;
    await render();
    if (id) openBloc(id);
  } catch (e) {
    WuboGrist.toast('Erreur : ' + e.message, 'error');
  }
}

// Modal de création manuelle (quand on a pas de date évidente)
function openCreateBlocModal(preferredISO) {
  const iso = preferredISO || WuboGrist.todayISO();
  document.getElementById('create-bloc-date').value = iso;
  // Pré-selectionne la tranche en fonction de l'heure courante
  const h = new Date().getHours();
  const tranche = (h >= 13 && h < 18) ? 'Aprem' : (h >= 18 ? 'Soir' : 'Matin');
  document.getElementById('create-bloc-tranche').value = tranche;
  openModal('create-bloc-modal');
}
function closeCreateBlocModal() { closeModal('create-bloc-modal'); }
async function submitCreateBloc() {
  const dateStr = document.getElementById('create-bloc-date').value;
  const tranche = document.getElementById('create-bloc-tranche').value;
  const proprio = document.getElementById('create-bloc-proprio').value;
  if (!dateStr) { WuboGrist.toast('Choisis une date', 'warn'); return; }
  const [y, m, d] = dateStr.split('-').map(Number);
  const ts = Math.floor(Date.UTC(y, m-1, d) / 1000);
  // Anti-doublon
  const existing = allBlocs.find(b => WuboGrist.gristDateToISO(b.date) === dateStr && b.tranche === tranche);
  if (existing) {
    WuboGrist.toast('Ce bloc existe déjà', 'warn');
    closeCreateBlocModal();
    openBloc(existing.id);
    return;
  }
  try {
    const { id } = await WuboGrist.addRecord('Blocs_temps', {
      date: ts, tranche, statut: 'Planifie', proprietaire: proprio
    });
    closeCreateBlocModal();
    WuboGrist.toast('Bloc créé', 'success');
    pendingFlashBlocId = id;
    // Reposition la fenêtre liste pour voir le bloc
    const todayISOVal = WuboGrist.todayISO();
    const target = new Date(dateStr);
    const today = new Date(todayISOVal);
    const diffDays = Math.round((target - today) / 86400000);
    dayOffset = diffDays;
    setView('liste');
    if (id) openBloc(id);
  } catch (e) {
    WuboGrist.toast('Erreur : ' + e.message, 'error');
  }
}

function openBloc(blocId) {
  const bloc = allBlocs.find(b => b.id === blocId);
  if (!bloc) return;
  currentBlocId = blocId;
  const d = new Date(bloc.date * 1000);
  const dayName = DAY_NAMES[d.getUTCDay()];
  document.getElementById('bloc-modal-title').textContent = `${dayName} ${d.getUTCDate()} ${MONTHS[d.getUTCMonth()]} · ${bloc.tranche}`;
  const meta = [];
  if (bloc.proprietaire) meta.push(bloc.proprietaire);
  if (bloc.duree_reelle_h) meta.push(`${bloc.duree_reelle_h}h réelles`);
  document.getElementById('bloc-modal-meta').textContent = meta.join(' · ') || '';
  const statutSelect = document.getElementById('bloc-statut');
  const curStatut = (bloc.statut || 'Planifie').toLowerCase();
  let selectVal = 'Planifie';
  if (curStatut.includes('fait')) selectVal = 'Fait';
  else if (curStatut.includes('en cours')) selectVal = 'En cours';
  else if (curStatut.includes('zapp')) selectVal = 'Zappe';
  statutSelect.value = selectVal;
  document.getElementById('bloc-note').value = bloc.note_fin_bloc || '';

  const tasksNode = document.getElementById('bloc-tasks');
  $clear(tasksNode);
  const tIds = WuboGrist.refListIds(bloc.taches_liees);
  if (tIds.length === 0) {
    tasksNode.appendChild($el('div', { class: 'empty', style: { fontSize: '11px' } }, 'Aucune tâche liée'));
  } else {
    tIds.forEach(tid => {
      const t = tachesById[tid];
      if (!t) return;
      const row = $el('div', { class: 'task-row', onclick: () => openTaskEdit(tid) },
        $el('span', { class: 'status-pill ' + statutClass(t.statut) }),
        $el('span', { style: { flex: '1' } }, t.titre || '-'));
      if (t.est_deadline_externe) {
        row.appendChild($el('span', { class: 'ext-badge', title: 'Deadline externe' }, '⏰'));
      }
      tasksNode.appendChild(row);
    });
  }
  openModal('bloc-modal');
}
function closeBloc() { currentBlocId = null; closeModal('bloc-modal'); }

function openAddTaskToBloc() {
  if (!currentBlocId) return;
  const blocId = currentBlocId;
  closeBloc();
  setTimeout(() => openTaskNew(blocId, null), 150);
}

function openTaskNew(blocId, parentTaskId) {
  currentTaskEditId = null;
  currentTaskNewBlocId = blocId || null;
  currentTaskParent = parentTaskId || null;
  currentTaskOriginalDate = null;
  currentPushCount = 0;
  document.getElementById('task-modal-title').textContent = parentTaskId ? 'Nouvelle sous-tâche' : 'Nouvelle tâche';
  document.getElementById('task-titre').value = '';
  document.getElementById('task-desc').value = '';
  document.getElementById('task-livrable').value = '';
  document.getElementById('task-statut').value = 'Pas commence';
  document.getElementById('task-heures').value = '';
  document.getElementById('task-date').value = unixToInputDate(WuboGrist.daysFromToday(0));
  document.getElementById('task-meta').textContent = parentTaskId ? 'Sous-tâche' : 'Nouvelle tâche';
  document.getElementById('task-reporter').style.display = 'none';
  document.getElementById('subtasks-section').style.display = 'none';
  document.getElementById('task-ext-deadline').checked = false;
  const delBtn = document.getElementById('task-delete-btn');
  if (delBtn) delBtn.style.display = 'none';
  refreshTaskExtPreview();
  openModal('task-modal');
}

function refreshTaskExtPreview() {
  const box = document.getElementById('task-ext-preview');
  const checked = document.getElementById('task-ext-deadline').checked;
  $clear(box);
  if (checked) {
    box.style.display = 'block';
    box.appendChild($el('span', { class: 'ext-badge' }, '⏰ Deadline externe'));
  } else {
    box.style.display = 'none';
  }
}

function reportTaskDays(n) {
  document.getElementById('task-date').value = unixToInputDate(WuboGrist.daysFromToday(n));
  currentPushCount = (currentPushCount || 0) + 1;
  document.getElementById('push-count-info').textContent = `Nouveau push_count : ${currentPushCount} (bonus score +${Math.min(currentPushCount*3, 10)})`;
}

async function saveBloc() {
  if (!currentBlocId) return;
  const blocId = currentBlocId;
  const fields = {
    statut: document.getElementById('bloc-statut').value,
    note_fin_bloc: document.getElementById('bloc-note').value
  };
  try {
    await WuboGrist.updateRecord('Blocs_temps', blocId, fields);
    closeBloc();
    pendingFlashBlocId = blocId;
    await render();
    WuboGrist.toast('Bloc sauvegardé', 'success');
  } catch (e) {
    WuboGrist.toast('Erreur : ' + e.message, 'error', 4000);
  }
}

function openTaskEdit(taskId) {
  const t = tachesById[taskId];
  if (!t) return;
  currentTaskEditId = taskId;
  currentTaskNewBlocId = null;
  currentTaskParent = null;
  currentTaskOriginalDate = t.date_cible || null;
  currentPushCount = t.push_count || 0;
  document.getElementById('task-modal-title').textContent = 'Modifier la tâche';
  document.getElementById('task-titre').value = t.titre || '';
  document.getElementById('task-desc').value = t.description || '';
  document.getElementById('task-livrable').value = t.livrable || '';
  const statutSelect = document.getElementById('task-statut');
  const curStatut = (t.statut || 'Pas commence').toLowerCase();
  let selectVal = 'Pas commence';
  if (curStatut.includes('fait')) selectVal = 'Fait';
  else if (curStatut.includes('en cours')) selectVal = 'En cours';
  else if (curStatut.includes('bloqu')) selectVal = 'Bloque';
  else if (curStatut.includes('abandon')) selectVal = 'Abandonne';
  statutSelect.value = selectVal;
  document.getElementById('task-heures').value = t.estim_heures || '';
  document.getElementById('task-date').value = unixToInputDate(t.date_cible);
  document.getElementById('task-ext-deadline').checked = !!t.est_deadline_externe;
  refreshTaskExtPreview();
  const meta = [];
  if (t.score) meta.push(`score ${t.score}`);
  if (currentPushCount > 0) meta.push(`reportée ${currentPushCount}x`);
  document.getElementById('task-meta').textContent = meta.join(' · ');
  document.getElementById('task-reporter').style.display = 'flex';
  document.getElementById('push-count-info').textContent = currentPushCount > 0 ? `Déjà reportée ${currentPushCount}x (bonus score +${Math.min(currentPushCount*3, 10)})` : '';
  const subs = Object.values(tachesById).filter(x => x.parent_tache === taskId);
  renderSubtasksList(subs);
  document.getElementById('subtasks-section').style.display = '';
  const delBtn = document.getElementById('task-delete-btn');
  if (delBtn) delBtn.style.display = '';
  openModal('task-modal');
}

async function deleteCurrentTask() {
  if (!currentTaskEditId) return;
  const t = tachesById[currentTaskEditId];
  const titre = t ? (t.titre || '(sans titre)') : '';
  const ok = await WuboUI.confirm({
    title: 'Supprimer ?',
    message: `"${titre}" — irréversible`,
    yesLabel: 'Supprimer',
    danger: true
  });
  if (!ok) return;
  try {
    const id = currentTaskEditId;
    const blocs = await WuboGrist.fetchRows('Blocs_temps');
    for (const b of blocs) {
      const ids = WuboGrist.refListIds(b.taches_liees);
      if (ids.includes(id)) {
        const next = ids.filter(x => x !== id);
        try { await WuboGrist.updateRecord('Blocs_temps', b.id, { taches_liees: ['L', ...next] }); } catch (_) {}
      }
    }
    await WuboGrist.deleteRecord('Taches', id);
    closeTaskEdit();
    WuboGrist.toast('Tâche supprimée', 'info');
    await render();
  } catch (e) {
    WuboGrist.toast('Erreur : ' + e.message, 'error');
  }
}

function renderSubtasksList(subs) {
  const node = document.getElementById('subtasks-list');
  $clear(node);
  if (subs.length === 0) {
    node.appendChild($el('div', { class: 'empty', style: { fontSize: '11px' } }, 'Aucune sous-tâche'));
    return;
  }
  subs.forEach(s => {
    node.appendChild($el('div', { class: 'subtask', onclick: () => { closeTaskEdit(); setTimeout(() => openTaskEdit(s.id), 150); } },
      $el('span', { class: 'status-pill ' + statutClass(s.statut) }),
      $el('span', { style: { flex: '1' } }, s.titre || '-')
    ));
  });
}

function addSubtaskPrompt() {
  if (!currentTaskEditId) return;
  const parent = currentTaskEditId;
  closeTaskEdit();
  setTimeout(() => openTaskNew(null, parent), 150);
}

function closeTaskEdit() {
  currentTaskEditId = null;
  currentTaskNewBlocId = null;
  currentTaskParent = null;
  closeModal('task-modal');
}

async function saveTaskEdit() {
  const titre = document.getElementById('task-titre').value.trim();
  if (!titre) { WuboGrist.toast('Titre obligatoire', 'warn'); return; }
  const heures = parseFloat(document.getElementById('task-heures').value) || 0;
  const dateStr = document.getElementById('task-date').value;
  const dateUnix = inputDateToUnix(dateStr);
  const extDeadline = document.getElementById('task-ext-deadline').checked;
  const fields = {
    titre,
    description: document.getElementById('task-desc').value,
    livrable: document.getElementById('task-livrable').value,
    statut: document.getElementById('task-statut').value,
    estim_heures: heures,
    est_deadline_externe: extDeadline
  };
  if (dateUnix) fields.date_cible = dateUnix;
  const editingId = currentTaskEditId;
  const targetBlocId = currentTaskNewBlocId;
  const isReport = editingId && currentTaskOriginalDate && dateUnix && dateUnix > currentTaskOriginalDate;
  try {
    if (editingId) {
      if (isReport) {
        fields.push_count = currentPushCount;
      }
      await WuboGrist.updateRecord('Taches', editingId, fields);
      closeTaskEdit();
      if (targetBlocId) pendingFlashBlocId = targetBlocId;
      await render();
      if (isReport) {
        const reportDate = new Date(dateUnix * 1000);
        const reportLabel = `${reportDate.getUTCDate()} ${MONTHS[reportDate.getUTCMonth()]}`;
        WuboGrist.toast(`Tâche reportée au ${reportLabel}`, 'success');
      } else {
        WuboGrist.toast('Tâche mise à jour', 'success');
      }
    } else {
      fields.date_creation = WuboGrist.daysFromToday(0);
      fields.push_count = 0;
      fields.proprietaire = WuboGrist.getUser() || 'Taki';
      fields.cash_impact = 2;
      fields.urgency = 2;
      fields.strategic_value = 2;
      if (currentTaskParent) fields.parent_tache = currentTaskParent;
      const created = await WuboGrist.addRecord('Taches', fields);
      const newId = created && created.id;
      if (targetBlocId && newId) {
        const blocRows = await WuboGrist.fetchRows('Blocs_temps');
        const bloc = blocRows.find(b => b.id === targetBlocId);
        if (bloc) {
          const existingIds = WuboGrist.refListIds(bloc.taches_liees);
          const newList = ['L', ...existingIds, newId];
          await WuboGrist.updateRecord('Blocs_temps', targetBlocId, { taches_liees: newList });
        }
      }
      closeTaskEdit();
      if (targetBlocId) pendingFlashBlocId = targetBlocId;
      await render();
      WuboGrist.toast(targetBlocId ? 'Tâche créée et liée au bloc' : 'Tâche créée', 'success');
    }
  } catch (e) {
    WuboGrist.toast('Erreur : ' + e.message, 'error', 4000);
  }
}

let dumpBinding = null;
async function submitDump() {
  const ctx = document.getElementById('dump-contexte').value;
  const content = document.getElementById('dump-content').value.trim();
  if (!content) {
    WuboGrist.toast('Rien à envoyer', 'warn');
    return;
  }
  try {
    await WuboGrist.addRecord('Dump_notes', { timestamp: WuboGrist.nowUnix(), auteur: WuboGrist.getUser() || 'Taki', contenu: content, contexte: ctx, traite: false, converti_en: '' });
    if (dumpBinding) dumpBinding.reset();
    else document.getElementById('dump-content').value = '';
    closeDump();
    WuboGrist.toast('Note ajoutée au dump', 'success');
  } catch (e) {
    WuboGrist.toast('Erreur : ' + e.message, 'error', 4000);
  }
}
function openDump() { openModal('dump-modal'); }
function closeDump() { closeModal('dump-modal'); }
function backdropClose(e, id) { if (e.target === e.currentTarget) closeModal(id); }

async function refresh() {
  const btn = document.querySelector('.nav-refresh');
  if (!btn) return;
  const orig = btn.textContent;
  btn.textContent = '⟳';
  btn.disabled = true;
  try {
    await render();
    btn.textContent = '✓';
    WuboGrist.toast('Actualisé', 'info', 1500);
  } catch (e) {
    btn.textContent = '✕';
    WuboGrist.toast('Erreur de chargement', 'error');
  }
  setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 1000);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeBloc(); closeDump(); closeTaskEdit(); }
  else if (e.key === 'ArrowLeft' && !document.querySelector('.modal:not(.hidden)')) shiftWindow(-1);
  else if (e.key === 'ArrowRight' && !document.querySelector('.modal:not(.hidden)')) shiftWindow(1);
});

window.addEventListener('resize', () => {
  const newSize = computeWindowSize();
  if (newSize !== windowSize) { windowSize = newSize; render(); }
});

(async () => {
  await WuboGrist.initGrist();
  if (window.WuboUI) {
    await WuboUI.ensureUser(document.getElementById('profile-slot'));
  }
  try { if (typeof grist !== 'undefined' && grist.onRecords) grist.onRecords(() => render()); } catch (_) {}
  window.addEventListener('wubo-data-fresh', () => render());
  dumpBinding = WuboGrist.bindDumpTextarea(
    document.getElementById('dump-content'),
    document.getElementById('dump-contexte')
  );
  if (window.ModalSwipe) {
    ModalSwipe.enable('bloc-modal', closeBloc);
    ModalSwipe.enable('dump-modal', closeDump);
    ModalSwipe.enable('task-modal', closeTaskEdit);
    ModalSwipe.enable('create-bloc-modal', closeCreateBlocModal);
  }
  // Applique la vue restaurée depuis localStorage (fait le render une fois)
  setView(currentView);
  setupSwipe();
  const extCheckbox = document.getElementById('task-ext-deadline');
  if (extCheckbox) extCheckbox.addEventListener('change', refreshTaskExtPreview);
})();
</script>

</body>
</html>
