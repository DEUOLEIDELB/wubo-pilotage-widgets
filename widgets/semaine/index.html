<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Semaine">
<meta name="theme-color" content="#F4F4F1">
<link rel="apple-touch-icon" href="../../apple-touch-icon.png">
<link rel="shortcut icon" href="favicon.ico">
<link rel="icon" type="image/svg+xml" href="../../icon.svg">
<link rel="manifest" href="../../manifest.webmanifest">
<title>Semaine - Pilotage Wubo</title>
<link rel="stylesheet" href="../../lib/styles.css">
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script src="../../lib/dom.js"></script>
<script src="../../lib/grist-api.js"></script>
<style>
  #app {
    max-width: 720px;
    margin: 0 auto;
    padding: 10px 10px calc(70px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .sprint-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    padding: 2px 4px 6px;
    border-bottom: 1px solid var(--border);
  }
  .sprint-header .title-block { flex: 1; min-width: 0; }
  .sprint-header h1 { font-size: 16px; line-height: 1.1; }
  .sprint-header .sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .sprint-nav { display: flex; gap: 4px; flex-shrink: 0; }
  .sprint-nav button.nav-chev {
    width: 34px; height: 34px; padding: 0;
    font-size: 16px; line-height: 1;
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border-strong); border-radius: 6px;
  }
  .sprint-nav button.nav-chev:active { opacity: 0.6; }
  .sprint-nav button.nav-today {
    padding: 0 10px; height: 34px;
    font-size: 12px;
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border-strong); border-radius: 6px;
  }

  .grid-week {
    display: grid;
    grid-template-columns: 32px repeat(var(--days, 4), 1fr);
    gap: 3px;
    touch-action: pan-y;
  }
  .col-head {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    padding: 3px 2px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .col-head.today { color: var(--current); }
  .col-head .d-num { font-size: 14px; color: var(--text); display: block; margin-top: 1px; }
  .col-head.today .d-num { color: var(--current); }

  .row-head {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px 0;
  }

  .cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 4px 12px 4px 4px;
    min-height: 64px;
    font-size: 9px;
    line-height: 1.2;
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
  }
  .cell:active { opacity: 0.7; }
  .cell.empty { background: var(--bg); border-style: dashed; cursor: default; }
  .cell.done { background: #EAF4EE; }
  .cell.current { background: var(--current-soft); border-color: var(--current); border-left: 3px solid var(--current); }
  .cell.skip { background: var(--done-bg); }
  .cell.wip { background: #FFFCE5; }

  .cell .status-dot { width: 6px; height: 6px; border-radius: 50%; position: absolute; top: 4px; right: 4px; }
  .status-dot.done { background: var(--success); }
  .status-dot.current { background: var(--current); }
  .status-dot.skip { background: var(--text-faint); }
  .status-dot.wip { background: var(--accent-strong); }
  .status-dot.planned { background: var(--border-strong); }

  .cell .task-main {
    font-size: 9px;
    line-height: 1.2;
    color: var(--text);
    white-space: normal;
    word-break: break-word;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    max-height: 36px;
  }
  .cell .task-extra {
    font-size: 8px;
    color: var(--text-faint);
    margin-top: 1px;
  }
  .cell.done .task-main, .cell.skip .task-main { color: var(--text-faint); text-decoration: line-through; }
  .cell .libre { font-size: 8px; color: var(--text-faint); font-style: italic; }
  .cell .note-dot { position: absolute; bottom: 3px; right: 4px; font-size: 9px; color: var(--warning); line-height: 1; }

  .empty-window {
    grid-column: 2 / -1;
    padding: 14px 10px;
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    border: 1px dashed var(--border-strong);
    border-radius: 6px;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .bottom {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
    display: flex;
    gap: 8px;
    background: rgba(244, 244, 241, 0.95);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--border);
    z-index: 50;
  }
  .bottom button { flex: 1; padding: 13px; font-size: 14px; }

  .legend {
    display: flex;
    gap: 8px;
    font-size: 10px;
    color: var(--text-dim);
    padding: 4px 4px 0;
    flex-wrap: wrap;
    align-items: center;
  }
  .legend .lg { display: flex; align-items: center; gap: 3px; }
  .legend .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .legend .dash { display: inline-block; width: 10px; height: 0; border-top: 1px dashed var(--border-strong); }
  .legend .note-ico { color: var(--warning); font-size: 10px; line-height: 1; }
  .legend .libre-ico { font-style: italic; font-size: 9px; color: var(--text-faint); }

  #error { background: var(--danger); color: white; padding: 10px; border-radius: 6px; font-size: 12px; display: none; }
  #error button { margin-top: 6px; background: white; color: var(--danger); border: 1px solid white; }

  /* Modal */
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: flex-end; justify-content: center; z-index: 100; }
  .modal.hidden { display: none; }
  .modal-content {
    background: var(--surface); width: 100%; max-width: 480px; border-radius: 12px 12px 0 0;
    padding: 16px; padding-bottom: calc(16px + env(safe-area-inset-bottom));
    display: flex; flex-direction: column; gap: 10px;
    max-height: 92vh; overflow-y: auto;
  }
  .modal-head { display: flex; justify-content: space-between; align-items: center; }
  .modal-content textarea { min-height: 100px; font-size: 14px; }
  .modal-content .field { display: flex; flex-direction: column; gap: 4px; }
  .modal-content .field label { font-size: 10px; }
  .task-list-mini { display: flex; flex-direction: column; gap: 4px; }
  .task-list-mini .task-row, .task-list-mini .subtask {
    padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px;
    font-size: 12px; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }
  .task-list-mini .task-row:active, .task-list-mini .subtask:active { opacity: 0.7; }

  @media (min-width: 600px) {
    .bottom { max-width: 720px; left: 50%; transform: translateX(-50%); border-radius: 12px 12px 0 0; }
    .cell { font-size: 10px; min-height: 72px; }
    .cell .task-main { font-size: 10px; max-height: 40px; }
  }
</style>
</head>
<body>

<main id="app">
  <nav class="app-nav">
    <a href="../aujourdhui/" class="tab">Jour</a>
    <a href="../semaine/" class="tab active">Semaine</a>

    </div>
    <div class="sprint-nav">
      <button type="button" class="nav-chev" onclick="shiftWindow(-1)" aria-label="Période précédente" title="Période précédente">‹</button>

  <div class="grid-week" id="grid"></div>

  <div class="legend">

    <span class="lg"><span class="dot" style="background:#5914D0"></span>Courant</span>
    <span class="lg"><span class="dot" style="background:#F0CC00"></span>En cours</span>
    <span class="lg"><span class="dot" style="background:#C8C8C3"></span>Planifié</span>
    <span class="lg"><span class="dot" style="background:#9A9A95"></span>Zappé</span>
    <span class="lg"><span class="note-ico">●</span>Note</span>
    <span class="lg"><span class="libre-ico">Libre</span> sans tâche</span>

  </div>
</main>

<nav class="bottom">
  <button class="accent" onclick="openDump()">+ Dump</button>
  <button class="ghost" onclick="refresh()">↻ Refresh</button>
</nav>

      <h3 id="bloc-modal-title">Bloc</h3>

    <div id="bloc-modal-meta" class="meta-info" style="font-size:11px;color:var(--text-dim)"></div>
    <div class="field">
      <label>Statut</label>
      <select id="bloc-statut">
        <option value="Planifie">Planifié</option>

      <button class="primary" onclick="saveTaskEdit()">Enregistrer</button>
    </div>

<script>
const { $el, $clear } = Dom;
const TRANCHES = ['Matin', 'Aprem', 'Soir'];
const DAY_NAMES = ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];
const MONTHS = ['janv.', 'févr.', 'mars', 'avr.', 'mai', 'juin', 'juil.', 'août', 'sept.', 'oct.', 'nov.', 'déc.'];
let allBlocs = [], tachesById = {}, currentBlocId = null;
let currentTaskEditId = null, currentTaskNewBlocId = null, currentTaskParent = null;
let currentTaskOriginalDate = null, currentPushCount = 0;

// Fenêtre glissante
let dayOffset = 0;      // offset en jours depuis today
let windowSize = 4;     // taille de la fenêtre (4 mobile, 7 desktop large)

function computeWindowSize() {
  return window.innerWidth >= 900 ? 7 : 4;
}

function statutClass(s) {
  if (!s) return 'todo';
  const k = s.toLowerCase();
  if (k.includes('fait')) return 'done';
  if (k.includes('en cours')) return 'wip';
  if (k.includes('bloqu')) return 'blocked';
  if (k.includes('abandon')) return 'abandoned';
  return 'todo';
}
function unixToInputDate(ts) {
  if (!ts) return '';
  const d = new Date(ts * 1000);
  return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
}
function inputDateToUnix(s) {
  if (!s) return null;
  const [y, m, d] = s.split('-').map(Number);
  return Math.floor(Date.UTC(y, m-1, d) / 1000);
}
function openModal(id) {
  document.getElementById(id).classList.remove('hidden');
  WuboGrist.lockBody();
}
function closeModal(id) {
  document.getElementById(id).classList.add('hidden');
  WuboGrist.unlockBody();
}

function isoFromDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function addDaysISO(iso, n) {
  const [y, m, d] = iso.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  dt.setDate(dt.getDate() + n);
  return isoFromDate(dt);
}

function weekNumberISO(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
}

function windowDaysISO() {
  const todayISO = WuboGrist.todayISO();
  const start = addDaysISO(todayISO, dayOffset);
  const days = [];
  for (let i = 0; i < windowSize; i++) days.push(addDaysISO(start, i));
  return days;
}

function blocsByDayISO(blocs) {
  const byDay = {};
  blocs.forEach(b => {
    const iso = WuboGrist.gristDateToISO(b.date);
    if (!iso) return;
    if (!byDay[iso]) byDay[iso] = {};
    byDay[iso][b.tranche] = b;
  });
  return byDay;
}

function showError(msg) {
  const e = document.getElementById('error');
  $clear(e);
  e.appendChild($el('div', {}, msg));
  if (!WuboGrist.inGristIframe()) {
    e.appendChild($el('button', { class: 'small', onclick: () => { WuboGrist.resetApiKey(); location.reload(); } }, 'Changer de clé API'));
  }
  e.style.display = 'block';
}

function cellClass(bloc) {
  if (!bloc) return 'cell empty';
  const s = (bloc.statut || '').toLowerCase();
  if (s.includes('fait')) return 'cell done';
  if (s.includes('en cours')) return 'cell wip';
  if (s.includes('zapp')) return 'cell skip';
  return 'cell';
}
function dotClass(bloc, isCurrent) {
  if (isCurrent) return 'status-dot current';
  if (!bloc) return '';
  const s = (bloc.statut || '').toLowerCase();
  if (s.includes('fait')) return 'status-dot done';
  if (s.includes('en cours')) return 'status-dot wip';
  if (s.includes('zapp')) return 'status-dot skip';
  return 'status-dot planned';
}

function renderCell(bloc, isToday, tranche) {
  const h = new Date().getHours();
  const curT = h >= 8 && h < 13 ? 'Matin' : h >= 13 && h < 18 ? 'Aprem' : h >= 18 && h < 22 ? 'Soir' : null;
  const blocStatut = (bloc && bloc.statut || '').toLowerCase();
  const isCurrent = isToday && curT === tranche && bloc && !blocStatut.includes('fait') && !blocStatut.includes('zapp');
  let cls = cellClass(bloc);
  if (isCurrent) cls = 'cell current';

  const cell = $el('div', { class: cls });
  if (bloc) cell.onclick = () => openBloc(bloc.id);
  cell.appendChild($el('span', { class: dotClass(bloc, isCurrent) }));

  if (!bloc) {
    cell.appendChild($el('div', { style: { fontSize: '8px', color: 'var(--text-faint)' } }, '·'));
    return cell;
  }

  const tIds = WuboGrist.refListIds(bloc.taches_liees);
  const titles = tIds.map(id => (tachesById[id] && tachesById[id].titre) || '').filter(Boolean);
  if (titles.length === 0) {
    cell.appendChild($el('div', { class: 'libre' }, 'Libre'));
  } else {
    cell.appendChild($el('div', { class: 'task-main', title: titles.join(' · ') }, titles[0]));
    if (titles.length > 1) {
      cell.appendChild($el('div', { class: 'task-extra' }, `+${titles.length - 1}`));
    }
  }

  if (bloc.note_fin_bloc) cell.appendChild($el('span', { class: 'note-dot', title: bloc.note_fin_bloc }, '●'));
  return cell;
}

function formatRange(firstISO, lastISO) {
  const [y1, m1, d1] = firstISO.split('-').map(Number);
  const [y2, m2, d2] = lastISO.split('-').map(Number);
  const first = new Date(y1, m1-1, d1);
  const last = new Date(y2, m2-1, d2);
  const sameMonth = first.getMonth() === last.getMonth() && first.getFullYear() === last.getFullYear();
  if (sameMonth) return `${first.getDate()} au ${last.getDate()} ${MONTHS[last.getMonth()]}`;
  return `${first.getDate()} ${MONTHS[first.getMonth()]} au ${last.getDate()} ${MONTHS[last.getMonth()]}`;
}

function computeTitle(daysISO) {
  const todayISO = WuboGrist.todayISO();
  const firstISO = daysISO[0];
  const lastISO = daysISO[daysISO.length - 1];
  // Semaine ISO du jour du milieu pour être représentative
  const midIdx = Math.floor(daysISO.length / 2);
  const [ym, mm, dm] = daysISO[midIdx].split('-').map(Number);
  const mid = new Date(ym, mm-1, dm);
  const wk = weekNumberISO(mid);

  let label;
  if (daysISO.includes(todayISO)) {
    label = `Sprint S${wk} (en cours)`;
  } else if (lastISO < todayISO) {
    label = `Semaine S${wk} (passée)`;
  } else {
    label = `Sprint S${wk} (à venir)`;
  }
  return { label, range: formatRange(firstISO, lastISO) };
}

function renderEmptyWindow(grid, daysISO) {
  // Laisser la colonne vide pour row-head, et placer un message sur toute la largeur
  grid.appendChild($el('div', {}));
  daysISO.forEach(iso => {
    const [y, m, d] = iso.split('-').map(Number);
    const dd = new Date(y, m-1, d);
    const todayISO = WuboGrist.todayISO();
    grid.appendChild($el('div', { class: 'col-head' + (iso === todayISO ? ' today' : '') },
      DAY_NAMES[dd.getDay()], $el('span', { class: 'd-num' }, String(dd.getDate()))));
  });
  const empty = $el('div', { class: 'empty-window' },
    $el('div', {}, 'Aucun bloc planifié pour cette période.'),
    $el('button', { class: 'ghost small', onclick: () => resetWindow() }, 'Revenir à aujourd\'hui')
  );
  grid.appendChild(empty);
}

async function render() {
  document.getElementById('error').style.display = 'none';
  windowSize = computeWindowSize();

  // Titre initial (avant fetch), basé sur la fenêtre
  const daysISO = windowDaysISO();
  const { label, range } = computeTitle(daysISO);
  document.getElementById('title').textContent = label;
  document.getElementById('sub').textContent = range;

  allBlocs = []; tachesById = {};
  try {
    const [b, t] = await Promise.all([WuboGrist.fetchRows('Blocs_temps'), WuboGrist.fetchRows('Taches')]);
    allBlocs = b;
    t.forEach(x => { tachesById[x.id] = x; });
  } catch (e) {
    showError(e.message);
    document.getElementById('sub').textContent = 'Hors ligne';
    return;
  }

  const todayISO = WuboGrist.todayISO();
  const grid = document.getElementById('grid');
  $clear(grid);
  grid.style.setProperty('--days', daysISO.length);

  const byDay = blocsByDayISO(allBlocs);

  // Compter les blocs dans la fenêtre
  let countInWindow = 0;
  daysISO.forEach(iso => { if (byDay[iso]) countInWindow += Object.keys(byDay[iso]).length; });

  if (countInWindow === 0) {
    renderEmptyWindow(grid, daysISO);
    // Met à jour le sous-titre avec info
    document.getElementById('sub').textContent = `${range} · aucun bloc`;
    return;
  }

  // Stats sur la fenêtre
  let fait = 0, total = 0;
  daysISO.forEach(iso => {
    if (!byDay[iso]) return;
    Object.values(byDay[iso]).forEach(bloc => {
      total++;
      if ((bloc.statut || '').toLowerCase().includes('fait')) fait++;
    });
  });
  document.getElementById('sub').textContent = `${range} · ${fait}/${total} blocs faits`;

  // Header row
  grid.appendChild($el('div', {}));
  daysISO.forEach(iso => {
    const [y, m, d] = iso.split('-').map(Number);
    const dd = new Date(y, m-1, d);
    grid.appendChild($el('div', { class: 'col-head' + (iso === todayISO ? ' today' : '') },
      DAY_NAMES[dd.getDay()], $el('span', { class: 'd-num' }, String(dd.getDate()))));
  });

  TRANCHES.forEach(tranche => {
    grid.appendChild($el('div', { class: 'row-head' }, tranche));
    daysISO.forEach(iso => {
      const blocsOfDay = byDay[iso] || {};
      grid.appendChild(renderCell(blocsOfDay[tranche], iso === todayISO, tranche));
    });
  });
}

function shiftWindow(direction) {
  // direction = -1 (précédent) ou +1 (suivant). Pas de windowSize jours.
  dayOffset += direction * windowSize;
  render();
}

function resetWindow() {
  dayOffset = 0;
  render();
}

// Swipe sur la grille (mobile)
let touchStartX = 0, touchStartY = 0, touchActive = false;
function setupSwipe() {
  const grid = document.getElementById('grid');
  if (!grid) return;
  grid.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) { touchActive = false; return; }
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchActive = true;
  }, { passive: true });
  grid.addEventListener('touchend', (e) => {
    if (!touchActive) return;
    touchActive = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;
    // seuil horizontal ~50px et |dx| > 2 * |dy| pour distinguer du scroll vertical
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 2) {
      if (dx < 0) shiftWindow(1);  // swipe gauche = période suivante
      else shiftWindow(-1);        // swipe droite = période précédente
    }
  }, { passive: true });
  grid.addEventListener('touchcancel', () => { touchActive = false; });
}

function openBloc(blocId) {
  const bloc = allBlocs.find(b => b.id === blocId);
  if (!bloc) return;
  currentBlocId = blocId;
  const d = new Date(bloc.date * 1000);
  const dayName = DAY_NAMES[d.getUTCDay()];
  document.getElementById('bloc-modal-title').textContent = `${dayName} ${d.getUTCDate()} ${MONTHS[d.getUTCMonth()]} · ${bloc.tranche}`;
  const meta = [];
  if (bloc.proprietaire) meta.push(bloc.proprietaire);
  if (bloc.duree_reelle_h) meta.push(`${bloc.duree_reelle_h}h réelles`);
  document.getElementById('bloc-modal-meta').textContent = meta.join(' · ') || '';
  // Normalisation statut pour le select (valeurs Grist sans accents)
  const statutSelect = document.getElementById('bloc-statut');
  const curStatut = (bloc.statut || 'Planifie').toLowerCase();
  let selectVal = 'Planifie';
  if (curStatut.includes('fait')) selectVal = 'Fait';
  else if (curStatut.includes('en cours')) selectVal = 'En cours';
  else if (curStatut.includes('zapp')) selectVal = 'Zappe';
  statutSelect.value = selectVal;
  document.getElementById('bloc-note').value = bloc.note_fin_bloc || '';

  const tasksNode = document.getElementById('bloc-tasks');
  $clear(tasksNode);
  const tIds = WuboGrist.refListIds(bloc.taches_liees);
  if (tIds.length === 0) {
    tasksNode.appendChild($el('div', { class: 'empty', style: { fontSize: '11px' } }, 'Aucune tâche liée'));
  } else {
    tIds.forEach(tid => {
      const t = tachesById[tid];
      if (!t) return;
      tasksNode.appendChild($el('div', { class: 'task-row', onclick: () => openTaskEdit(tid) },
        $el('span', { class: 'status-pill ' + statutClass(t.statut) }),
        $el('span', { style: { flex: '1' } }, t.titre || '-')));
    });
  }
  openModal('bloc-modal');
}
function closeBloc() { currentBlocId = null; closeModal('bloc-modal'); }

function openAddTaskToBloc() {
  if (!currentBlocId) return;
  const blocId = currentBlocId;
  closeBloc();
  setTimeout(() => openTaskNew(blocId, null), 150);
}

function openTaskNew(blocId, parentTaskId) {
  currentTaskEditId = null;
  currentTaskNewBlocId = blocId || null;
  currentTaskParent = parentTaskId || null;
  currentTaskOriginalDate = null;
  currentPushCount = 0;
  document.getElementById('task-modal-title').textContent = parentTaskId ? 'Nouvelle sous-tâche' : 'Nouvelle tâche';
  document.getElementById('task-titre').value = '';
  document.getElementById('task-desc').value = '';
  document.getElementById('task-livrable').value = '';
  document.getElementById('task-statut').value = 'Pas commence';
  document.getElementById('task-heures').value = '';
  document.getElementById('task-date').value = unixToInputDate(WuboGrist.daysFromToday(0));
  document.getElementById('task-meta').textContent = parentTaskId ? 'Sous-tâche' : 'Nouvelle tâche';
  document.getElementById('task-reporter').style.display = 'none';
  document.getElementById('subtasks-section').style.display = 'none';
  openModal('task-modal');
}

function reportTaskDays(n) {
  document.getElementById('task-date').value = unixToInputDate(WuboGrist.daysFromToday(n));
  currentPushCount = (currentPushCount || 0) + 1;
  document.getElementById('push-count-info').textContent = `Nouveau push_count : ${currentPushCount} (bonus score +${Math.min(currentPushCount*3, 10)})`;
}

async function saveBloc() {
  if (!currentBlocId) return;
  const fields = {
    statut: document.getElementById('bloc-statut').value,
    note_fin_bloc: document.getElementById('bloc-note').value
  };
  try {
    await WuboGrist.updateRecord('Blocs_temps', currentBlocId, fields);
    closeBloc();
    render();
  } catch (e) { alert('Erreur : ' + e.message); }
}

function openTaskEdit(taskId) {
  const t = tachesById[taskId];
  if (!t) return;
  currentTaskEditId = taskId;
  currentTaskNewBlocId = null;
  currentTaskParent = null;
  currentTaskOriginalDate = t.date_cible || null;
  currentPushCount = t.push_count || 0;
  document.getElementById('task-modal-title').textContent = 'Modifier la tâche';
  document.getElementById('task-titre').value = t.titre || '';
  document.getElementById('task-desc').value = t.description || '';
  document.getElementById('task-livrable').value = t.livrable || '';
  // Normalisation statut (valeurs Grist sans accents)
  const statutSelect = document.getElementById('task-statut');
  const curStatut = (t.statut || 'Pas commence').toLowerCase();
  let selectVal = 'Pas commence';
  if (curStatut.includes('fait')) selectVal = 'Fait';
  else if (curStatut.includes('en cours')) selectVal = 'En cours';
  else if (curStatut.includes('bloqu')) selectVal = 'Bloque';
  else if (curStatut.includes('abandon')) selectVal = 'Abandonne';
  statutSelect.value = selectVal;
  document.getElementById('task-heures').value = t.estim_heures || '';
  document.getElementById('task-date').value = unixToInputDate(t.date_cible);
  const meta = [];
  if (t.score) meta.push(`score ${t.score}`);
  if (currentPushCount > 0) meta.push(`reportée ${currentPushCount}x`);
  document.getElementById('task-meta').textContent = meta.join(' · ');
  document.getElementById('task-reporter').style.display = 'flex';
  document.getElementById('push-count-info').textContent = currentPushCount > 0 ? `Déjà reportée ${currentPushCount}x (bonus score +${Math.min(currentPushCount*3, 10)})` : '';
  // Sous-tâches existantes
  const subs = Object.values(tachesById).filter(x => x.parent_tache === taskId);
  renderSubtasksList(subs);
  document.getElementById('subtasks-section').style.display = '';
  openModal('task-modal');
}

function renderSubtasksList(subs) {
  const node = document.getElementById('subtasks-list');
  $clear(node);
  if (subs.length === 0) {
    node.appendChild($el('div', { class: 'empty', style: { fontSize: '11px' } }, 'Aucune sous-tâche'));
    return;
  }
  subs.forEach(s => {
    node.appendChild($el('div', { class: 'subtask', onclick: () => { closeTaskEdit(); setTimeout(() => openTaskEdit(s.id), 150); } },
      $el('span', { class: 'status-pill ' + statutClass(s.statut) }),
      $el('span', { style: { flex: '1' } }, s.titre || '-')
    ));
  });
}

function addSubtaskPrompt() {
  if (!currentTaskEditId) return;
  const parent = currentTaskEditId;
  closeTaskEdit();
  setTimeout(() => openTaskNew(null, parent), 150);
}

function closeTaskEdit() {
  currentTaskEditId = null;
  currentTaskNewBlocId = null;
  currentTaskParent = null;
  closeModal('task-modal');
}

async function saveTaskEdit() {
  const titre = document.getElementById('task-titre').value.trim();
  if (!titre) { alert('Titre obligatoire'); return; }
  const heures = parseFloat(document.getElementById('task-heures').value) || 0;
  const dateStr = document.getElementById('task-date').value;
  const dateUnix = inputDateToUnix(dateStr);
  const fields = {
    titre,
    description: document.getElementById('task-desc').value,
    livrable: document.getElementById('task-livrable').value,
    statut: document.getElementById('task-statut').value,
    estim_heures: heures
  };
  if (dateUnix) fields.date_cible = dateUnix;
  try {
    if (currentTaskEditId) {
      if (currentTaskOriginalDate && dateUnix && dateUnix > currentTaskOriginalDate) {
        fields.push_count = currentPushCount;
      }
      await WuboGrist.updateRecord('Taches', currentTaskEditId, fields);
    } else {
      fields.date_creation = WuboGrist.daysFromToday(0);
      fields.push_count = 0;
      fields.proprietaire = 'Taki';
      fields.cash_impact = 2;
      fields.urgency = 2;
      fields.strategic_value = 2;
      if (currentTaskParent) fields.parent_tache = currentTaskParent;
      const created = await WuboGrist.addRecord('Taches', fields);
      if (currentTaskNewBlocId && created && created.records && created.records[0]) {
        const newId = created.records[0].id;
        const blocRows = await WuboGrist.fetchRows('Blocs_temps');
        const bloc = blocRows.find(b => b.id === currentTaskNewBlocId);
        if (bloc) {
          const existingIds = WuboGrist.refListIds(bloc.taches_liees);
          const newList = ['L', ...existingIds, newId];
          await WuboGrist.updateRecord('Blocs_temps', currentTaskNewBlocId, { taches_liees: newList });
        }
      }
    }
    closeTaskEdit();
    render();
  } catch (e) { alert('Erreur : ' + e.message); }
}

async function submitDump() {
  const ctx = document.getElementById('dump-contexte').value;
  const content = document.getElementById('dump-content').value.trim();
  if (!content) return;
  try {
    await WuboGrist.addRecord('Dump_notes', { timestamp: WuboGrist.nowUnix(), auteur: 'Taki', contenu: content, contexte: ctx, traite: false, converti_en: '' });
    document.getElementById('dump-content').value = '';
    closeDump();
  } catch (e) { alert('Erreur : ' + e.message); }
}
function openDump() { openModal('dump-modal'); }
function closeDump() { closeModal('dump-modal'); }
function backdropClose(e, id) { if (e.target === e.currentTarget) closeModal(id); }

async function refresh() {
  const btn = document.querySelector('nav.bottom button.ghost');
  if (!btn) return;
  const orig = btn.textContent;
  btn.textContent = '⟳';
  btn.disabled = true;
  try { await render(); btn.textContent = '✓'; }
  catch (e) { btn.textContent = '✕'; }
  setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 1000);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeBloc(); closeDump(); closeTaskEdit(); }
  else if (e.key === 'ArrowLeft' && !document.querySelector('.modal:not(.hidden)')) shiftWindow(-1);
  else if (e.key === 'ArrowRight' && !document.querySelector('.modal:not(.hidden)')) shiftWindow(1);
});

window.addEventListener('resize', () => {
  const newSize = computeWindowSize();
  if (newSize !== windowSize) { windowSize = newSize; render(); }
});

(async () => {
  await WuboGrist.initGrist();
  try { if (typeof grist !== 'undefined' && grist.onRecords) grist.onRecords(() => render()); } catch (_) {}
  await render();
  setupSwipe();
})();
</script>
