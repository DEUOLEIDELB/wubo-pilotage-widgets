<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Semaine">
<meta name="theme-color" content="#F4F4F1">
<link rel="apple-touch-icon" href="../../icon.svg">
<link rel="icon" type="image/svg+xml" href="../../icon.svg">
<link rel="manifest" href="../../manifest.webmanifest">
<title>Semaine - Pilotage Wubo</title>
<link rel="stylesheet" href="../../lib/styles.css">
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script src="../../lib/dom.js"></script>
<script src="../../lib/grist-api.js"></script>
<style>
  #app {
    max-width: 720px;
    margin: 0 auto;
    padding: 10px 10px calc(70px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .sprint-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 2px 4px 6px;
    border-bottom: 1px solid var(--border);
  }
  .sprint-header h1 { font-size: 16px; line-height: 1.1; }
  .sprint-header .sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  .grid-week {
    display: grid;
    grid-template-columns: 32px repeat(var(--days, 4), 1fr);
    gap: 3px;
  }
  .col-head {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    padding: 3px 2px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .col-head.today { color: var(--current); }
  .col-head .d-num { font-size: 14px; color: var(--text); display: block; margin-top: 1px; }
  .col-head.today .d-num { color: var(--current); }

  .row-head {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px 0;
  }

  .cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 4px 14px 4px 4px;
    min-height: 58px;
    font-size: 9px;
    line-height: 1.2;
    display: flex;
    flex-direction: column;
    gap: 1px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
  }
  .cell:active { opacity: 0.7; }
  .cell.empty { background: var(--bg); border-style: dashed; cursor: default; }
  .cell.done { background: #EAF4EE; }
  .cell.current { background: var(--current-soft); border-color: var(--current); border-left: 3px solid var(--current); }
  .cell.skip { background: var(--done-bg); }
  .cell.wip { background: #FFFCE5; }

  .cell .status-dot { width: 6px; height: 6px; border-radius: 50%; position: absolute; top: 4px; right: 4px; }
  .status-dot.done { background: var(--success); }
  .status-dot.current { background: var(--current); }
  .status-dot.skip { background: var(--text-faint); }
  .status-dot.wip { background: var(--accent-strong); }
  .status-dot.planned { background: var(--border-strong); }

  .cell ul { list-style: none; padding: 0; margin: 0; font-size: 9px; line-height: 1.2; }
  .cell li { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); max-width: 100%; }
  .cell.done li, .cell.skip li { color: var(--text-faint); text-decoration: line-through; }
  .cell .note-dot { position: absolute; bottom: 3px; right: 4px; font-size: 8px; color: var(--warning); }

  .bottom {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
    display: flex;
    gap: 8px;
    background: rgba(244, 244, 241, 0.95);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--border);
    z-index: 50;
  }
  .bottom button { flex: 1; padding: 13px; font-size: 14px; }

  .legend { display: flex; gap: 8px; font-size: 10px; color: var(--text-dim); padding: 4px 4px 0; flex-wrap: wrap; }
  .legend .lg { display: flex; align-items: center; gap: 3px; }
  .legend .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  #error { background: var(--danger); color: white; padding: 10px; border-radius: 6px; font-size: 12px; display: none; }
  #error button { margin-top: 6px; background: white; color: var(--danger); border: 1px solid white; }

  /* Modal */
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: flex-end; justify-content: center; z-index: 100; }
  .modal.hidden { display: none; }
  .modal-content {
    background: var(--surface); width: 100%; max-width: 480px; border-radius: 12px 12px 0 0;
    padding: 16px; padding-bottom: calc(16px + env(safe-area-inset-bottom));
    display: flex; flex-direction: column; gap: 10px;
    max-height: 92vh; overflow-y: auto;
  }
  .modal-head { display: flex; justify-content: space-between; align-items: center; }
  .modal-content textarea { min-height: 100px; font-size: 14px; }
  .modal-content .field { display: flex; flex-direction: column; gap: 4px; }
  .modal-content .field label { font-size: 10px; }
  .task-list-mini { display: flex; flex-direction: column; gap: 4px; }
  .task-list-mini .task-row { padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 12px; cursor: pointer; }
  .task-list-mini .task-row:active { opacity: 0.7; }

  @media (min-width: 600px) {
    .bottom { max-width: 720px; left: 50%; transform: translateX(-50%); border-radius: 12px 12px 0 0; }
    .cell { font-size: 10px; min-height: 70px; }
  }
</style>
</head>
<body>

<main id="app">
  <nav class="app-nav">
    <a href="../aujourdhui/" class="tab">Jour</a>
    <a href="../semaine/" class="tab active">Semaine</a>
    <a href="../dashboard/" class="tab">Objectifs</a>
    <a href="../deadlines/" class="tab">Échéances</a>
  </nav>

  <div class="sprint-header">
    <div>
      <h1 id="title">Sprint</h1>
      <div class="sub" id="sub"></div>
    </div>
  </div>

  <div id="error"></div>

  <div class="grid-week" id="grid"></div>

  <div class="legend">
    <span class="lg"><span class="dot" style="background:#188038"></span>Fait</span>
    <span class="lg"><span class="dot" style="background:#5914D0"></span>Courant</span>
    <span class="lg"><span class="dot" style="background:#F0CC00"></span>En cours</span>
    <span class="lg"><span class="dot" style="background:#C8C8C3"></span>Planifie</span>
    <span class="lg"><span class="dot" style="background:#9A9A95"></span>Zappe</span>
  </div>
</main>

<nav class="bottom">
  <button class="accent" onclick="openDump()">+ Dump</button>
  <button class="ghost" onclick="refresh()">↻ Refresh</button>
</nav>

<!-- Bloc detail modal -->
<div id="bloc-modal" class="modal hidden" onclick="backdropClose(event, 'bloc-modal')">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h3 id="bloc-modal-title">Bloc</h3>
      <button class="ghost small" onclick="closeBloc()">Fermer</button>
    </div>
    <div id="bloc-modal-meta" class="meta-info" style="font-size:11px;color:var(--text-dim)"></div>
    <div class="field">
      <label>Statut</label>
      <select id="bloc-statut">
        <option value="Planifie">Planifie</option>
        <option value="En cours">En cours</option>
        <option value="Fait">Fait</option>
        <option value="Zappe">Zappe</option>
      </select>
    </div>
    <div class="field">
      <label>Note / note de fin de bloc</label>
      <textarea id="bloc-note" placeholder="Ce que tu as fait, ce qui coince..."></textarea>
    </div>
    <div class="field">
      <label>Taches liees</label>
      <div id="bloc-tasks" class="task-list-mini"></div>
      <button type="button" class="ghost small" onclick="openAddTaskToBloc()" style="margin-top:4px">+ Ajouter une tache au bloc</button>
    </div>
    <button class="primary" onclick="saveBloc()">Enregistrer</button>
  </div>
</div>

<!-- Quick dump modal -->
<div id="dump-modal" class="modal hidden" onclick="backdropClose(event, 'dump-modal')">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h3>Dump rapide</h3>
      <button class="ghost small" onclick="closeDump()">Annuler</button>
    </div>
    <select id="dump-contexte">
      <option value="Libre">Libre</option>
      <option value="Post-RDV">Post-RDV</option>
      <option value="Idee">Idee</option>
      <option value="Probleme">Probleme</option>
      <option value="Decision">Decision</option>
    </select>
    <textarea id="dump-content" placeholder="Ecris sans filtre."></textarea>
    <button class="primary" onclick="submitDump()">Envoyer au dump</button>
  </div>
</div>

<!-- Task edit modal -->
<div id="task-modal" class="modal hidden" onclick="backdropClose(event, 'task-modal')">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h3 id="task-modal-title">Modifier la tache</h3>
      <button class="ghost small" onclick="closeTaskEdit()">Annuler</button>
    </div>
    <div id="task-meta" style="font-size:11px;color:var(--text-dim)"></div>
    <div class="field"><label>Titre</label><input id="task-titre"></div>
    <div class="field"><label>Description / bullets</label><textarea id="task-desc" placeholder="- detail 1&#10;- detail 2"></textarea></div>
    <div class="field"><label>Livrable</label><input id="task-livrable"></div>
    <div class="field"><label>Statut</label>
      <select id="task-statut">
        <option>Pas commence</option><option>En cours</option><option>Fait</option><option>Bloque</option><option>Abandonne</option>
      </select>
    </div>
    <div class="field" style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
      <div><label>Heures</label><input id="task-heures" type="number" step="0.5" min="0"></div>
      <div><label>Echeance</label><input id="task-date" type="date"></div>
    </div>
    <div id="task-reporter" class="field" style="display:none">
      <label>Reporter</label>
      <div style="display:flex;gap:4px;flex-wrap:wrap">
        <button type="button" class="ghost small" onclick="reportTaskDays(1)">+1j</button>
        <button type="button" class="ghost small" onclick="reportTaskDays(3)">+3j</button>
        <button type="button" class="ghost small" onclick="reportTaskDays(7)">+1sem</button>
      </div>
      <div id="push-count-info" style="font-size:10px;color:var(--warning);margin-top:3px"></div>
    </div>
    <button class="primary" onclick="saveTaskEdit()">Enregistrer</button>
  </div>
</div>

<script>
const { $el, $clear } = Dom;
const TRANCHES = ['Matin', 'Aprem', 'Soir'];
const DAY_NAMES = ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];
const MONTHS = ['janv', 'fev', 'mars', 'avr', 'mai', 'juin', 'juil', 'aout', 'sep', 'oct', 'nov', 'dec'];
let allBlocs = [], tachesById = {}, currentBlocId = null;
let currentTaskEditId = null, currentTaskNewBlocId = null, currentTaskOriginalDate = null, currentPushCount = 0;

function statutClass(s) {
  if (!s) return 'todo';
  const k = s.toLowerCase();
  if (k.includes('fait')) return 'done';
  if (k.includes('en cours')) return 'wip';
  if (k.includes('bloque')) return 'blocked';
  if (k.includes('abandon')) return 'abandoned';
  return 'todo';
}
function unixToInputDate(ts) {
  if (!ts) return '';
  const d = new Date(ts * 1000);
  return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
}
function inputDateToUnix(s) {
  if (!s) return null;
  const [y, m, d] = s.split('-').map(Number);
  return Math.floor(Date.UTC(y, m-1, d) / 1000);
}
function openModal(id) {
  document.getElementById(id).classList.remove('hidden');
  WuboGrist.lockBody();
}
function closeModal(id) {
  document.getElementById(id).classList.add('hidden');
  WuboGrist.unlockBody();
}

function groupDays(blocs) {
  const byDay = {};
  blocs.forEach(b => {
    const iso = WuboGrist.gristDateToISO(b.date);
    if (!iso) return;
    if (!byDay[iso]) byDay[iso] = {};
    byDay[iso][b.tranche] = b;
  });
  return Object.keys(byDay).sort().map(iso => ({ iso, blocs: byDay[iso] }));
}

function showError(msg) {
  const e = document.getElementById('error');
  $clear(e);
  e.appendChild($el('div', {}, msg));
  if (!WuboGrist.inGristIframe()) {
    e.appendChild($el('button', { class: 'small', onclick: () => { WuboGrist.resetApiKey(); location.reload(); } }, 'Changer de cle API'));
  }
  e.style.display = 'block';
}

function cellClass(bloc) {
  if (!bloc) return 'cell empty';
  switch (bloc.statut) {
    case 'Fait': return 'cell done';
    case 'En cours': return 'cell wip';
    case 'Zappe': return 'cell skip';
    default: return 'cell';
  }
}
function dotClass(bloc, isCurrent) {
  if (isCurrent) return 'status-dot current';
  if (!bloc) return '';
  switch (bloc.statut) {
    case 'Fait': return 'status-dot done';
    case 'En cours': return 'status-dot wip';
    case 'Zappe': return 'status-dot skip';
    default: return 'status-dot planned';
  }
}

function renderCell(bloc, isToday, tranche) {
  const h = new Date().getHours();
  const curT = h >= 8 && h < 13 ? 'Matin' : h >= 13 && h < 18 ? 'Aprem' : h >= 18 && h < 22 ? 'Soir' : null;
  const isCurrent = isToday && curT === tranche && bloc && bloc.statut !== 'Fait' && bloc.statut !== 'Zappe';
  let cls = cellClass(bloc);
  if (isCurrent) cls = 'cell current';

  const cell = $el('div', { class: cls });
  if (bloc) cell.onclick = () => openBloc(bloc.id);
  cell.appendChild($el('span', { class: dotClass(bloc, isCurrent) }));

  if (!bloc) { cell.appendChild($el('div', { style: { fontSize: '8px', color: 'var(--text-faint)' } }, '-')); return cell; }

  const tIds = WuboGrist.refListIds(bloc.taches_liees);
  const titles = tIds.map(id => (tachesById[id] && tachesById[id].titre) || '').filter(Boolean);
  if (titles.length === 0) {
    cell.appendChild($el('div', { style: { fontSize: '8px', color: 'var(--text-faint)', fontStyle: 'italic' } }, 'Libre'));
  } else {
    const ul = $el('ul', {});
    ul.appendChild($el('li', { title: titles.join(' · ') }, titles[0]));
    if (titles.length > 1) ul.appendChild($el('li', { style: { color: 'var(--text-faint)', fontSize: '8px' } }, `+${titles.length - 1}`));
    cell.appendChild(ul);
  }

  if (bloc.note_fin_bloc) cell.appendChild($el('span', { class: 'note-dot', title: bloc.note_fin_bloc }, '●'));
  return cell;
}

async function render() {
  document.getElementById('error').style.display = 'none';
  const nowForTitle = new Date();
  const wkFallback = (() => {
    const d = new Date(Date.UTC(nowForTitle.getFullYear(), nowForTitle.getMonth(), nowForTitle.getDate()));
    d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
    const start = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    return Math.ceil((((d - start) / 86400000) + 1) / 7);
  })();
  document.getElementById('title').textContent = `Sprint S${wkFallback}`;

  allBlocs = []; tachesById = {};
  try {
    const [b, t] = await Promise.all([WuboGrist.fetchRows('Blocs_temps'), WuboGrist.fetchRows('Taches')]);
    allBlocs = b;
    t.forEach(x => { tachesById[x.id] = x; });
  } catch (e) {
    showError(e.message);
    document.getElementById('sub').textContent = 'Hors ligne';
    return;
  }

  const days = groupDays(allBlocs);
  if (days.length === 0) { showError('Aucun bloc planifie. Ajoute des blocs dans Grist.'); return; }

  const todayISO = WuboGrist.todayISO();
  const grid = document.getElementById('grid');
  $clear(grid);
  grid.style.setProperty('--days', days.length);

  const firstDay = new Date(days[0].iso + 'T00:00:00');
  const lastDay = new Date(days[days.length - 1].iso + 'T00:00:00');
  const fmt = d => `${d.getDate()} ${MONTHS[d.getMonth()]}`;
  const totalFait = allBlocs.filter(b => b.statut === 'Fait').length;
  document.getElementById('sub').textContent = `${fmt(firstDay)} au ${fmt(lastDay)} · ${totalFait}/${allBlocs.length} blocs faits`;

  grid.appendChild($el('div', {}));
  days.forEach(d => {
    const dd = new Date(d.iso + 'T00:00:00');
    grid.appendChild($el('div', { class: 'col-head' + (d.iso === todayISO ? ' today' : '') },
      DAY_NAMES[dd.getDay()], $el('span', { class: 'd-num' }, String(dd.getDate()))));
  });

  TRANCHES.forEach(tranche => {
    grid.appendChild($el('div', { class: 'row-head' }, tranche));
    days.forEach(d => grid.appendChild(renderCell(d.blocs[tranche], d.iso === todayISO, tranche)));
  });
}

function openBloc(blocId) {
  const bloc = allBlocs.find(b => b.id === blocId);
  if (!bloc) return;
  currentBlocId = blocId;
  const d = new Date(bloc.date * 1000);
  const dayName = DAY_NAMES[d.getDay()];
  document.getElementById('bloc-modal-title').textContent = `${dayName} ${d.getDate()} ${MONTHS[d.getMonth()]} · ${bloc.tranche}`;
  const meta = [];
  if (bloc.proprietaire) meta.push(bloc.proprietaire);
  if (bloc.duree_reelle_h) meta.push(`${bloc.duree_reelle_h}h reelles`);
  document.getElementById('bloc-modal-meta').textContent = meta.join(' · ') || '';
  document.getElementById('bloc-statut').value = bloc.statut || 'Planifie';
  document.getElementById('bloc-note').value = bloc.note_fin_bloc || '';

  const tasksNode = document.getElementById('bloc-tasks');
  $clear(tasksNode);
  const tIds = WuboGrist.refListIds(bloc.taches_liees);
  if (tIds.length === 0) {
    tasksNode.appendChild($el('div', { class: 'empty', style: { fontSize: '11px' } }, 'Aucune tache liee'));
  } else {
    tIds.forEach(tid => {
      const t = tachesById[tid];
      if (!t) return;
      tasksNode.appendChild($el('div', { class: 'task-row', onclick: () => openTaskEdit(tid) },
        $el('span', { class: 'status-pill ' + statutClass(t.statut), style: { marginRight: '6px' } }),
        t.titre || '-'));
    });
  }
  openModal('bloc-modal');
}
function closeBloc() { currentBlocId = null; closeModal('bloc-modal'); }

function openAddTaskToBloc() {
  if (!currentBlocId) return;
  const blocId = currentBlocId;
  closeBloc();
  setTimeout(() => openTaskNew(blocId), 150);
}

function openTaskNew(blocId) {
  currentTaskEditId = null;
  currentTaskNewBlocId = blocId;
  currentTaskOriginalDate = null;
  currentPushCount = 0;
  document.getElementById('task-modal-title').textContent = 'Nouvelle tache';
  document.getElementById('task-titre').value = '';
  document.getElementById('task-desc').value = '';
  document.getElementById('task-livrable').value = '';
  document.getElementById('task-statut').value = 'Pas commence';
  document.getElementById('task-heures').value = '';
  document.getElementById('task-date').value = unixToInputDate(WuboGrist.daysFromToday(0));
  document.getElementById('task-meta').textContent = 'Nouvelle tache';
  document.getElementById('task-reporter').style.display = 'none';
  openModal('task-modal');
}

function reportTaskDays(n) {
  document.getElementById('task-date').value = unixToInputDate(WuboGrist.daysFromToday(n));
  currentPushCount = (currentPushCount || 0) + 1;
  document.getElementById('push-count-info').textContent = `Nouveau push_count : ${currentPushCount} (bonus score +${Math.min(currentPushCount*3, 10)})`;
}
async function saveBloc() {
  if (!currentBlocId) return;
  const fields = {
    statut: document.getElementById('bloc-statut').value,
    note_fin_bloc: document.getElementById('bloc-note').value
  };
  try {
    await WuboGrist.updateRecord('Blocs_temps', currentBlocId, fields);
    closeBloc();
    render();
  } catch (e) { alert('Erreur : ' + e.message); }
}

function openTaskEdit(taskId) {
  const t = tachesById[taskId];
  if (!t) return;
  currentTaskEditId = taskId;
  currentTaskNewBlocId = null;
  currentTaskOriginalDate = t.date_cible || null;
  currentPushCount = t.push_count || 0;
  document.getElementById('task-modal-title').textContent = 'Modifier la tache';
  document.getElementById('task-titre').value = t.titre || '';
  document.getElementById('task-desc').value = t.description || '';
  document.getElementById('task-livrable').value = t.livrable || '';
  document.getElementById('task-statut').value = t.statut || 'Pas commence';
  document.getElementById('task-heures').value = t.estim_heures || '';
  document.getElementById('task-date').value = unixToInputDate(t.date_cible);
  const meta = [];
  if (t.score) meta.push(`score ${t.score}`);
  if (currentPushCount > 0) meta.push(`reportee ${currentPushCount}x`);
  document.getElementById('task-meta').textContent = meta.join(' · ');
  document.getElementById('task-reporter').style.display = 'flex';
  document.getElementById('push-count-info').textContent = currentPushCount > 0 ? `Deja reportee ${currentPushCount}x (bonus score +${Math.min(currentPushCount*3, 10)})` : '';
  openModal('task-modal');
}
function closeTaskEdit() { currentTaskEditId = null; currentTaskNewBlocId = null; closeModal('task-modal'); }

async function saveTaskEdit() {
  const titre = document.getElementById('task-titre').value.trim();
  if (!titre) { alert('Titre obligatoire'); return; }
  const heures = parseFloat(document.getElementById('task-heures').value) || 0;
  const dateStr = document.getElementById('task-date').value;
  const dateUnix = inputDateToUnix(dateStr);
  const fields = {
    titre,
    description: document.getElementById('task-desc').value,
    livrable: document.getElementById('task-livrable').value,
    statut: document.getElementById('task-statut').value,
    estim_heures: heures
  };
  if (dateUnix) fields.date_cible = dateUnix;
  try {
    if (currentTaskEditId) {
      if (currentTaskOriginalDate && dateUnix && dateUnix > currentTaskOriginalDate) {
        fields.push_count = currentPushCount;
      }
      await WuboGrist.updateRecord('Taches', currentTaskEditId, fields);
    } else {
      fields.date_creation = WuboGrist.daysFromToday(0);
      fields.push_count = 0;
      fields.proprietaire = 'Taki';
      fields.cash_impact = 2;
      fields.urgency = 2;
      fields.strategic_value = 2;
      const created = await WuboGrist.addRecord('Taches', fields);
      if (currentTaskNewBlocId && created && created.records && created.records[0]) {
        const newId = created.records[0].id;
        const blocRows = await WuboGrist.fetchRows('Blocs_temps');
        const bloc = blocRows.find(b => b.id === currentTaskNewBlocId);
        if (bloc) {
          const existingIds = WuboGrist.refListIds(bloc.taches_liees);
          const newList = ['L', ...existingIds, newId];
          await WuboGrist.updateRecord('Blocs_temps', currentTaskNewBlocId, { taches_liees: newList });
        }
      }
    }
    closeTaskEdit();
    render();
  } catch (e) { alert('Erreur : ' + e.message); }
}

async function submitDump() {
  const ctx = document.getElementById('dump-contexte').value;
  const content = document.getElementById('dump-content').value.trim();
  if (!content) return;
  try {
    await WuboGrist.addRecord('Dump_notes', { timestamp: WuboGrist.nowUnix(), auteur: 'Taki', contenu: content, contexte: ctx, traite: false, converti_en: '' });
    document.getElementById('dump-content').value = '';
    closeDump();
  } catch (e) { alert('Erreur : ' + e.message); }
}
function openDump() { openModal('dump-modal'); }
function closeDump() { closeModal('dump-modal'); }
function backdropClose(e, id) { if (e.target === e.currentTarget) closeModal(id); }

async function refresh() {
  const btn = document.querySelector('nav.bottom button.ghost');
  if (!btn) return;
  const orig = btn.textContent;
  btn.textContent = '⟳';
  btn.disabled = true;
  try { await render(); btn.textContent = '✓'; }
  catch (e) { btn.textContent = '✕'; }
  setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 1000);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeBloc(); closeDump(); closeTaskEdit(); }
});

(async () => {
  await WuboGrist.initGrist();
  try { if (typeof grist !== 'undefined' && grist.onRecords) grist.onRecords(() => render()); } catch (_) {}
  render();
})();
</script>

</body>
