<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Échéances">
<meta name="theme-color" content="#F4F3F7">
<link rel="apple-touch-icon" href="../../apple-touch-icon.png">
<link rel="shortcut icon" href="favicon.ico">
<link rel="icon" type="image/svg+xml" href="../../icon.svg">
<link rel="manifest" href="../../manifest.webmanifest">
<title>Échéances - Pilotage Wubo</title>

<link rel="prefetch" href="../semaine/" as="document">
<link rel="prefetch" href="../dashboard/" as="document">

<style>
  #app {
    max-width: 560px;
    margin: 0 auto;
    padding: calc(env(safe-area-inset-top) + 76px) 14px calc(150px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .page-title {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    padding: calc(env(safe-area-inset-top) + 10px) 14px 10px;
    z-index: 45;
    background: var(--bg);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    box-shadow: 0 2px 0 var(--border);
  }
  @media (min-width: 600px) {
    .page-title {
      max-width: 560px;
      left: 50%;
      transform: translateX(-50%);
    }
  }
  .page-title-main { flex: 1; min-width: 0; }
  .page-title h1 { font-size: 18px; }
  .page-title .sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  /* Toggle Externes / Internes / Tout : .tab-group sticky sous le page-title fixe.
     - Fond --surface (blanc) distinct du page-title (cream --bg)
     - BUG CORRIGE : .tab-group de lib a width:100% qui ne s'elargit pas avec un
       margin negatif. Il faut calc(100% + 28px) pour que le fond s'etire reellement
       bord-a-bord des deux cotes (sinon asymetrie : gauche OK, droite manquante).
     - Sur mobile : #app n'a pas de max-width active -> +28px = viewport entier.
     - Sur desktop >=600px : #app est 560px centre, donc 100%+28 = 560px pile
       comme le page-title, centrage automatique via l'alignement avec #app. */
  #tab-toggle {
    position: sticky;
    top: calc(env(safe-area-inset-top) + 68px);
    z-index: 22;
    width: calc(100% + 28px);
    margin: 0 -14px;
    padding: 0 14px;
    background: var(--surface);
    box-sizing: border-box;
  }

  /* Section externes dure vs internes */
  .section-title {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 8px 2px 4px;
  }
  .section-title.externes { color: var(--danger); }
  .section-title.internes { color: var(--text-dim); }
  .section-title .pastille {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .section-title.externes .pastille { background: var(--danger); }
  .section-title.internes .pastille { background: var(--text-dim); }
  .section-sub {
    font-size: 10px;
    font-weight: 500;
    text-transform: none;
    letter-spacing: 0;
    color: var(--text-faint);
    margin-left: auto;
    font-style: italic;
  }

  .group-head {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    padding: 6px 2px 2px;
  }
  .group-head.retard { color: var(--danger); }

  .deadline-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--border-strong);
    border-radius: 5px;
    padding: 8px 10px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }
  .deadline-item:active { opacity: 0.7; }
  .deadline-item.externe { border-left-color: var(--danger); border-left-width: 4px; }
  .deadline-item.externe.late { background: var(--danger-soft); }
  .deadline-item.late { border-left-color: var(--danger); }
  .deadline-item.soon { border-left-color: var(--warning); }
  .deadline-item.ok { border-left-color: var(--success); }

  .dl-when {
    flex-shrink: 0;
    text-align: center;
    width: 56px;
    border-right: 1px solid var(--border);
    padding-right: 8px;
  }
  .dl-when .jours-label {
    font-size: 11px;
    font-weight: 700;
    line-height: 1.1;
  }
  .dl-when .jours-date {
    font-size: 10px;
    color: var(--text-faint);
    margin-top: 2px;
  }
  .deadline-item.late .dl-when .jours-label { color: var(--danger); }
  .deadline-item.soon .dl-when .jours-label { color: var(--warning); }
  .deadline-item.ok .dl-when .jours-label { color: var(--success); }
  .deadline-item.externe.late .dl-when .jours-label { color: var(--danger); }

  .dl-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
  .dl-titre-row { display: flex; align-items: center; gap: 6px; }
  .dl-titre {
    flex: 1;
    font-size: 13px;
    font-weight: 600;
    line-height: 1.25;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .dl-type {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    padding: 1px 5px;
    background: var(--done-bg);
    border-radius: 3px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .dl-type.projet { background: var(--info-soft); color: var(--info); }
  .dl-type.objectif { background: var(--current-soft); color: var(--current); }
  .dl-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--text-dim);
  }
  .dl-contexte { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ext-badge-mini {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    font-size: 9px;
    font-weight: 700;
    color: var(--danger);
    padding: 1px 4px;
    border: 1px solid var(--danger);
    border-radius: 2px;
    background: var(--surface);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }

  #error {
    background: var(--danger);
    color: white;
    padding: 8px;
    border-radius: 4px;
    font-size: 12px;
    display: none;
  }
  #error button { margin-top: 6px; background: white; color: var(--danger); border: 1px solid white; }

  /* Modals */
  .modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 100;
    overscroll-behavior: contain;
  }
  .modal.hidden { display: none; }
  .modal-content {
    background: var(--surface);
    width: 100%;
    max-width: 520px;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    padding: 16px;
    padding-bottom: calc(16px + env(safe-area-inset-bottom));
    display: flex; flex-direction: column; gap: 10px;
    max-height: 88vh;
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
  }
  .modal-head { display: flex; justify-content: space-between; align-items: center; }
  .modal-content textarea { min-height: 90px; font-size: 14px; }
  .modal-content .field { display: flex; flex-direction: column; gap: 4px; }
  .modal-content .field label { font-size: 10px; }
</style>
</head>
<body>

<main id="app">
  <div class="page-title">

  <div id="error"></div>

</main>

<nav class="bottom-nav">
  <div class="nav-tabs">
    <a href="../aujourdhui/" class="tab">Jour</a>
    <a href="../semaine/" class="tab">Semaine</a>
    <a href="../dashboard/" class="tab">Objectifs</a>
    <a href="../deadlines/" class="tab active">Échéances</a>
  </div>
  <div class="nav-actions">
    <button class="accent nav-dump" onclick="openDump()">+ Dump</button>
    <button class="ghost nav-refresh" onclick="refresh()" title="Rafraîchir">↻</button>

</nav>

<!-- Dump modal -->
<div id="dump-modal" class="modal hidden" onclick="backdropClose(event, 'dump-modal')">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h3>Dump rapide</h3>
      <button class="ghost small" onclick="closeDump()">Annuler</button>
    </div>
    <select id="dump-contexte">
      <option value="Libre">Libre</option>
      <option value="Post-RDV">Post-RDV</option>
      <option value="Idee">Idée</option>
      <option value="Probleme">Problème</option>
      <option value="Decision">Décision</option>
    </select>
    <textarea id="dump-content" placeholder="Écris sans filtre. Claude rangera."></textarea>
    <div class="sticky-save">
      <button class="ghost small" onclick="closeDump()">Annuler</button>
      <button class="primary" onclick="submitDump()">Envoyer au dump</button>
    </div>
  </div>
</div>

<!-- Task edit modal -->
<div id="task-modal" class="modal hidden" onclick="backdropClose(event, 'task-modal')">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h3 id="task-modal-title">Modifier la tâche</h3>
      <button class="ghost small" onclick="closeTaskEdit()">Annuler</button>
    </div>
    <div id="task-meta" style="font-size:11px;color:var(--text-dim)"></div>
    <div class="field"><label>Titre</label><input id="task-titre"></div>
    <div class="field"><label>Description</label><textarea id="task-desc"></textarea></div>
    <div class="field"><label>Statut</label>
      <select id="task-statut">
        <option>Pas commencé</option>
        <option>En cours</option>
        <option>Fait</option>
        <option>Bloqué</option>
        <option>Abandonné</option>
      </select>
    </div>
    <div class="field"><label>Échéance</label><input id="task-date" type="date"></div>
    <div class="field">
      <label style="display:flex;gap:6px;align-items:center;font-size:12px;text-transform:none;letter-spacing:0;color:var(--text);cursor:pointer">
        <input type="checkbox" id="task-ext-deadline" style="width:auto;margin:0">
        <span>Deadline externe dure (non repoussable)</span>
      </label>
    </div>
    <div class="sticky-save">
      <button class="ghost small" onclick="closeTaskEdit()">Annuler</button>
      <button id="task-delete-btn" class="danger small" onclick="deleteCurrentTask()" style="display:none">Supprimer</button>
      <button id="task-archive-btn" class="ghost small" onclick="archiveCurrentTask()" style="display:none">Archiver</button>
      <button class="primary" onclick="saveTaskEdit()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
const { $el, $clear } = Dom;

let taches = [], projets = [], objectifs = [];
let projetsById = {}, objectifsById = {};
let allDeadlines = [];
// Onglet courant : 'externes' (dures, non repoussables), 'internes', 'all'
let currentTab = 'externes';
let currentTaskEditId = null;

function showError(msg) {
  const e = document.getElementById('error');
  $clear(e);
  e.appendChild($el('div', {}, msg));
  if (!WuboGrist.inGristIframe()) {
    e.appendChild($el('button', {
      class: 'small',
      onclick: () => { WuboGrist.resetApiKey(); location.reload(); }
    }, 'Changer de clé API'));
  }
  e.style.display = 'block';
}

function todayUnix() {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  return Math.floor(d.getTime() / 1000);
}

function unixToInputDate(ts) {
  if (!ts) return '';
  const d = new Date(ts * 1000);
  return `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, '0')}-${String(d.getUTCDate()).padStart(2, '0')}`;
}

function inputDateToUnix(s) {
  if (!s) return null;
  const [y, m, d] = s.split('-').map(Number);
  return Math.floor(Date.UTC(y, m - 1, d) / 1000);
}

function fmtDate(ts) {
  if (!ts) return '-';
  const d = new Date(ts * 1000);
  return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' });
}

function joursRestants(ts) {
  if (!ts) return null;
  const today = todayUnix();
  return Math.round((ts - today) / 86400);
}

function labelJours(n) {
  if (n === null) return '';
  if (n < 0) return `J+${Math.abs(n)} (retard)`;
  if (n === 0) return "Aujourd'hui";
  if (n === 1) return 'Demain';
  return `J-${n}`;
}

function urgenceClass(n) {
  if (n === null) return 'ok';
  if (n < 3) return 'late';
  if (n < 7) return 'soon';
  return 'ok';
}


function isTaskActive(t) {
  const s = (t.statut || '').toLowerCase();
  if (s.includes('fait')) return false;
  if (s.includes('archive')) return false;
  if (s.includes('abandon')) return false;
  return true;
}

function isProjetActive(p) {
  const s = (p.statut || '').toLowerCase();
  if (s.includes('archive')) return false;
  if (s.includes('abandon')) return false;
  if (s.includes('termin')) return false;
  return true;
}

function isObjectifActive(o) {
  const s = (o.statut || '').toLowerCase();
  if (s.includes('archive')) return false;
  if (s.includes('abandon')) return false;
  return true;
}

function buildDeadlines() {
  const list = [];

  taches.filter(isTaskActive).forEach(t => {
    if (!t.date_cible) return;
    const projet = t.projet ? projetsById[t.projet] : null;
    list.push({
      id: 'tache-' + t.id,
      rawId: t.id,
      type: 'Tâche',
      typeKey: 'tache',
      titre: t.titre || '(sans titre)',
      ts: t.date_cible,
      statut: t.statut || 'Pas commencé',
      contexte: projet ? (projet.titre || '') : 'Hors projet',
      externe: !!t.est_deadline_externe,
      raw: t
    });
  });

  projets.filter(isProjetActive).forEach(p => {
    if (!p.date_cible) return;
    const obj = p.objectif ? objectifsById[p.objectif] : null;
    list.push({
      id: 'projet-' + p.id,
      rawId: p.id,
      type: 'Projet',
      typeKey: 'projet',
      titre: p.titre || '(sans titre)',
      ts: p.date_cible,
      statut: p.statut || '',
      contexte: obj ? (obj.titre || '') : 'Hors objectif',
      externe: !!p.est_deadline_externe,
      raw: p
    });
  });

  objectifs.filter(isObjectifActive).forEach(o => {
    if (!o.deadline) return;
    list.push({
      id: 'objectif-' + o.id,
      rawId: o.id,
      type: 'Objectif',
      typeKey: 'objectif',
      titre: o.titre || '(sans titre)',
      ts: o.deadline,
      statut: o.statut || '',
      contexte: o.trimestre || '',
      externe: !!o.est_deadline_externe,
      raw: o
    });
  });

  list.sort((a, b) => a.ts - b.ts);
  return list;
}

function statutPillClass(s) {
  if (!s) return 'todo';
  const k = s.toLowerCase();
  if (k.includes('archive')) return 'archived';
  if (k.includes('fait')) return 'done';
  if (k.includes('en cours')) return 'wip';
  if (k.includes('bloque') || k.includes('bloqué')) return 'blocked';
  if (k.includes('abandon')) return 'abandoned';
  return 'todo';
}

function renderDeadlineItem(item) {
  const jours = joursRestants(item.ts);
  const cls = urgenceClass(jours);
  const extClass = item.externe ? ' externe' : '';
  const el = $el('div', {
    class: 'deadline-item ' + cls + extClass,
    onclick: () => openItem(item)
  });

  // Colonne gauche : jours restants + date
  el.appendChild($el('div', { class: 'dl-when' },
    $el('div', { class: 'jours-label' }, labelJoursShort(jours)),
    $el('div', { class: 'jours-date' }, fmtDate(item.ts))
  ));

  // Corps : titre + type + contexte
  const body = $el('div', { class: 'dl-body' });
  const titreRow = $el('div', { class: 'dl-titre-row' });
  titreRow.appendChild($el('span', { class: 'dl-titre', title: item.titre }, item.titre));
  if (item.externe) {
    titreRow.appendChild($el('span', { class: 'ext-badge-mini', title: 'Deadline externe non repoussable' }, 'Dure'));
  }
  titreRow.appendChild($el('span', { class: 'dl-type ' + item.typeKey }, item.type));
  body.appendChild(titreRow);

  const metaParts = [];
  if (item.contexte) metaParts.push(item.contexte);
  const metaRow = $el('div', { class: 'dl-meta' },
    $el('span', { class: 'dl-contexte' }, metaParts.join(' · ')),
    $el('span', { class: 'status-pill ' + statutPillClass(item.statut), title: item.statut || '' })
  );
  body.appendChild(metaRow);
  el.appendChild(body);

  return el;
}

// Label court pour colonne gauche
function labelJoursShort(n) {
  if (n === null) return '—';
  if (n < 0) return `+${Math.abs(n)}j`;
  if (n === 0) return "Auj.";
  if (n === 1) return 'Demain';
  if (n <= 30) return `${n}j`;
  // Au-delà, en semaines
  return `${Math.round(n/7)}s`;
}

function groupByUrgency(items) {
  const today = todayUnix();
  const groups = {
    retard: [],
    cette_sem: [],
    sem_pro: [],
    mois: [],
    plus_tard: []
  };
  items.forEach(item => {
    const j = Math.round((item.ts - today) / 86400);
    if (j < 0) groups.retard.push(item);
    else if (j <= 7) groups.cette_sem.push(item);
    else if (j <= 14) groups.sem_pro.push(item);
    else if (j <= 31) groups.mois.push(item);
    else groups.plus_tard.push(item);
  });
  return groups;
}

const GROUP_LABELS = {
  retard: 'En retard',
  cette_sem: '7 jours',
  sem_pro: '8 à 14 jours',
  mois: '15 à 31 jours',
  plus_tard: 'Plus tard'
};

function renderTabToggle() {
  const externes = allDeadlines.filter(x => x.externe).length;
  const internes = allDeadlines.filter(x => !x.externe).length;
  const total = allDeadlines.length;
  const node = document.getElementById('tab-toggle');
  $clear(node);
  // Labels courts (mobile-first). Explication affichée en dessous du tab-group via section-title.
  const tabs = [
    { id: 'externes', label: 'Dures', count: externes },
    { id: 'internes', label: 'Internes', count: internes },
    { id: 'all', label: 'Tout', count: total }
  ];
  tabs.forEach(t => {
    const isActive = currentTab === t.id;
    const btn = $el('button', {
      class: isActive ? 'active' : '',
      role: 'tab',
      'aria-selected': isActive ? 'true' : 'false',
      onclick: () => { currentTab = t.id; renderList(); renderTabToggle(); }
    }, t.label);
    btn.appendChild($el('span', { class: 'badge-count' }, String(t.count)));
    node.appendChild(btn);
  });
}

function renderList() {
  const list = document.getElementById('deadlines-list');
  $clear(list);

  let filtered;
  if (currentTab === 'externes') filtered = allDeadlines.filter(x => x.externe);
  else if (currentTab === 'internes') filtered = allDeadlines.filter(x => !x.externe);
  else filtered = allDeadlines.slice();

  const nbRetard = filtered.filter(x => joursRestants(x.ts) < 0).length;
  document.getElementById('sub').textContent = filtered.length === 0
    ? 'Aucune échéance dans cette catégorie'
    : `${filtered.length} échéance${filtered.length > 1 ? 's' : ''}${nbRetard > 0 ? ` · ${nbRetard} en retard` : ''}`;

  if (filtered.length === 0) {
    const hint = currentTab === 'externes'
      ? "Pas de deadline dure à venir. Profite-en pour avancer sur les sujets stratégiques."
      : currentTab === 'internes'
        ? "Aucune cible interne datée."
        : "Aucune échéance.";
    list.appendChild($el('div', { class: 'empty' }, hint));
    return;
  }

  // Explication en tête si onglet externes/internes
  if (currentTab === 'externes') {
    list.appendChild($el('div', {
      style: 'font-size:11px;color:var(--text-dim);padding:4px 2px 8px;font-style:italic;line-height:1.4'
    }, "Ce sont les dates que tu ne peux pas bouger (AAP, events, ateliers scolaires). Priorité absolue."));
  } else if (currentTab === 'internes') {
    list.appendChild($el('div', {
      style: 'font-size:11px;color:var(--text-dim);padding:4px 2px 8px;font-style:italic;line-height:1.4'
    }, "Dates-cibles internes que tu peux repousser si besoin. Elles donnent le rythme, pas la loi."));
  }

  const groups = groupByUrgency(filtered);
  ['retard', 'cette_sem', 'sem_pro', 'mois', 'plus_tard'].forEach(key => {
    const items = groups[key];
    if (!items.length) return;
    const headClass = key === 'retard' ? 'group-head retard' : 'group-head';
    list.appendChild($el('div', { class: headClass }, `${GROUP_LABELS[key]} (${items.length})`));
    items.forEach(item => list.appendChild(renderDeadlineItem(item)));
  });
}

async function render() {
  document.getElementById('error').style.display = 'none';
  try {
    const [tRaw, pRaw, oRaw] = await Promise.all([
      WuboGrist.fetchRows('Taches'),
      WuboGrist.fetchRows('Projets'),
      WuboGrist.fetchRows('Objectifs')
    ]);
    const t = WuboGrist.filterByOwner(tRaw);
    const p = WuboGrist.filterByOwner(pRaw);
    const o = WuboGrist.filterByOwner(oRaw);
    taches = t;
    projets = p;
    objectifs = o;
    projetsById = {};
    objectifsById = {};
    p.forEach(x => { projetsById[x.id] = x; });
    o.forEach(x => { objectifsById[x.id] = x; });
    allDeadlines = buildDeadlines();
  } catch (e) {
    showError(e.message);
    document.getElementById('sub').textContent = 'Hors ligne';
    return;
  }
  renderTabToggle();
  renderList();
}

async function openItem(item) {
  if (item.typeKey === 'tache') {
    openTaskEdit(item.raw);
  } else if (item.typeKey === 'projet') {
    const r = await WuboProjetModal.open({ mode: 'edit', projet: item.raw });
    if (r && r.action !== 'cancelled') await render();
  } else if (item.typeKey === 'objectif') {
    const r = await WuboObjectifModal.open({ mode: 'edit', objectif: item.raw });
    if (r && r.action !== 'cancelled') await render();
  }
}

async function openTaskEdit(t) {
  const r = await WuboTaskModal.open({ mode: 'edit', task: t });
  if (r && r.action !== 'cancelled') {
    await render();
  }
}

async function deleteCurrentTask() {
  if (!currentTaskEditId) return;
  const t = taches.find(x => x.id === currentTaskEditId);
  const titre = t ? (t.titre || '(sans titre)') : '';
  const ok = await WuboUI.confirm({
    title: 'Supprimer ?',
    message: `"${titre}" — irréversible`,
    yesLabel: 'Supprimer',
    danger: true
  });
  if (!ok) return;
  try {
    const id = currentTaskEditId;
    await WuboGrist.deleteRecord('Taches', id);
    closeTaskEdit();
    WuboGrist.toast('Tâche supprimée', 'info');
    await render();
  } catch (e) {
    WuboGrist.toast('Erreur : ' + e.message, 'error');
  }
}

async function saveTaskEdit() {
  if (!currentTaskEditId) return;
  const titre = document.getElementById('task-titre').value.trim();
  if (!titre) { WuboGrist.toast('Titre obligatoire', 'warn'); return; }
  const dateStr = document.getElementById('task-date').value;
  const dateUnix = inputDateToUnix(dateStr);
  const extCb = document.getElementById('task-ext-deadline');
  const fields = {
    titre,
    note: document.getElementById('task-desc').value,
    statut: document.getElementById('task-statut').value,
    est_deadline_externe: extCb ? !!extCb.checked : false
  };
  if (dateUnix) fields.date_cible = dateUnix;
  try {
    await WuboGrist.updateRecord('Taches', currentTaskEditId, fields);
    closeTaskEdit();
    WuboGrist.toast('Tâche mise à jour', 'success');
    render();
  } catch (e) {
    WuboGrist.toast('Erreur : ' + e.message, 'error');
  }
}

async function archiveCurrentTask() {
  if (!currentTaskEditId) return;
  const ok = await WuboUI.confirm({ title: 'Archiver la tâche ?', yesLabel: 'Archiver' });
  if (!ok) return;
  try {
    await WuboGrist.archiveTask(currentTaskEditId);
    closeTaskEdit();
    render();
  } catch (e) {
    WuboGrist.toast('Erreur : ' + e.message, 'error');
  }
}

function closeTaskEdit() {
  currentTaskEditId = null;
  closeModal('task-modal');
}

function openModal(id) { document.getElementById(id).classList.remove('hidden'); WuboGrist.lockBody(); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); WuboGrist.unlockBody(); }
function backdropClose(e, id) { if (e.target === e.currentTarget) closeModal(id); }
function openDump() { openModal('dump-modal'); }
function closeDump() { closeModal('dump-modal'); }

let dumpBinding = null;
async function submitDump() {
  const ctx = document.getElementById('dump-contexte').value;
  const content = document.getElementById('dump-content').value.trim();
  if (!content) return;
  try {
    await WuboGrist.addRecord('Dump_notes', {
      timestamp: WuboGrist.nowUnix(),
      auteur: WuboGrist.getUser() || 'Taki',
      contenu: content,
      contexte: ctx,
      traite: false,
      converti_en: ''
    });
    if (dumpBinding) dumpBinding.reset();
    else document.getElementById('dump-content').value = '';
    closeDump();
    WuboGrist.toast('Note ajoutée au dump', 'success');
  } catch (e) {
    WuboGrist.toast('Erreur : ' + e.message, 'error');
  }
}

async function refresh() {
  const btn = document.querySelector('.nav-refresh');
  if (!btn) return;
  const orig = btn.textContent;
  btn.textContent = '⟳';
  btn.disabled = true;
  try { await render(); btn.textContent = '✓'; }
  catch (e) { btn.textContent = '✕'; }
  setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 1000);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeTaskEdit(); closeDump(); }
});

(async () => {
  await WuboGrist.initGrist();
  if (window.WuboUI) {
    await WuboUI.ensureUser(document.getElementById('profile-slot'));
  }
  try { if (typeof grist !== 'undefined' && grist.onRecords) grist.onRecords(() => render()); } catch (_) {}
  window.addEventListener('wubo-data-fresh', () => render());
  dumpBinding = WuboGrist.bindDumpTextarea(
    document.getElementById('dump-content'),
    document.getElementById('dump-contexte')
  );
  if (window.ModalSwipe) {
    ModalSwipe.enable('task-modal', closeTaskEdit);
    ModalSwipe.enable('dump-modal', closeDump);
  }
  render();
})();
</script>

</body>
</html>
